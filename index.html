<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>perfume.shoppee • Luxury Edition</title>
    <style>
        :root { 
            --bg: #ffffff; 
            --card-bg: #f9f9f9; 
            --text: #1a1a1a; 
            --sub-text: #777; 
            --border: #eee;
            --gold-gradient: linear-gradient(135deg, #fdfc47 0%, #bf9b30 50%, #fdfc47 100%);
            --gold-shine: linear-gradient(to right, #bf9b30 20%, #fdfc47 40%, #fdfc47 60%, #bf9b30 80%);
            --gold-text: #d4af37; --sale-red: #c8102e; --stock-green: #2ecc71;
        }

        body.dark-theme { 
            --bg: #0a0a0a; 
            --card-bg: #161616; 
            --text: #ffffff; 
            --sub-text: #888; 
            --border: #222; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Playfair Display', serif; 
            margin: 0; background: var(--bg); color: var(--text); 
        }
        body.modal-open { overflow: hidden; }

        /* === НОВИЙ ГЕРОЙ === */
        .hero {
            height: 520px;
            background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.55)), 
                        url('https://picsum.photos/id/1015/2000/1200') center/cover no-repeat; /* можна замінити на іншу картинку */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            color: white; 
            position: relative;
        }
        .hero::after {
            content: ''; 
            position: absolute; 
            bottom: 0; left: 0; right: 0; 
            height: 140px; 
            background: linear-gradient(transparent, var(--bg));
        }
        .hero-content h1 {
            font-size: 4.2rem; 
            font-weight: 900; 
            letter-spacing: -4px; 
            margin: 0; 
            background: var(--gold-shine); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .hero-content p {
            font-size: 1.25rem; 
            max-width: 520px; 
            margin: 20px auto 0; 
            opacity: 0.95;
        }

        header { padding: 20px 20px 10px; text-align: center; position: relative; }
        .top-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 8px; }
        .lang-switch button, .theme-toggle { background: var(--card-bg); border: 1px solid var(--border); padding: 10px 18px; border-radius: 30px; font-size: 11.5px; font-weight: 800; color: var(--sub-text); cursor: pointer; }
        .lang-switch button.active { background: var(--gold-gradient); color: #000; border: none; }

        .logo { font-size: 2.7em; font-weight: 900; letter-spacing: -2.8px; margin: 0; text-transform: lowercase; background: var(--gold-shine); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 5s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }

        .subtitle { font-size: 12.5px; color: var(--sub-text); text-transform: uppercase; letter-spacing: 2px; margin: 10px auto 30px; }

        /* решта стилів (картки, модалка, кошик) — без змін, тільки hero і footer оновлені */

        .section-header { padding: 40px 20px 12px; text-align: center; }
        .section-title { font-size: 19px; font-weight: 900; text-transform: uppercase; letter-spacing: 2.5px; color: var(--sub-text); }

        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(148px, 1fr)); 
            gap: 14px; 
            padding: 15px 20px; 
        }
        
        .card { 
            background: var(--card-bg); border-radius: 24px; padding: 12px; text-align: center; 
            border: 1px solid var(--border); display: flex; flex-direction: column; min-height: 295px; 
            position: relative; transition: all 0.4s; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }
        .card:hover { transform: translateY(-6px); box-shadow: 0 18px 35px rgba(191,155,48,0.25); }

        .sale-badge { position: absolute; top: 10px; left: 10px; background: var(--sale-red); color: white; padding: 4px 11px; border-radius: 14px; font-size: 9.5px; font-weight: 900; }
        
        .card-img { height: 125px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
        .card img { max-width: 88%; max-height: 88%; object-fit: contain; transition: 0.5s; }
        .card:hover img { transform: scale(1.07); }

        .brand { font-size: 10px; text-transform: uppercase; color: var(--sub-text); font-weight: 800; }
        .title { font-size: 14px; font-weight: 700; margin: 7px 0 5px; line-height: 1.25; height: 2.5em; overflow: hidden; }
        .price { font-weight: 900; font-size: 16.5px; color: var(--gold-text); margin-top: auto; }

        .add-to-cart { 
            margin-top: 8px; padding: 10px; background: var(--gold-gradient); color: #000; border: none; 
            border-radius: 22px; font-weight: 900; font-size: 12.5px; cursor: pointer;
        }

        .show-all-btn {
            display: block; margin: 40px auto 60px; padding: 15px 42px;
            background: var(--gold-gradient); color: #000; border: none; border-radius: 50px;
            font-size: 15px; font-weight: 900; cursor: pointer;
        }

        /* Модалка і кошик — оптимізовані як раніше */
        .modal { display: none; position: fixed; z-index: 3000; inset: 0; background: rgba(0,0,0,0.88); backdrop-filter: blur(12px); align-items: flex-end; justify-content: center; padding: 0; }
        .modal-content { background: var(--bg); width: 100%; max-width: 460px; border-radius: 28px 28px 0 0; padding: 25px 20px 30px; border: 1px solid var(--border); position: relative; max-height: 92vh; overflow-y: auto; box-shadow: 0 -10px 40px rgba(0,0,0,0.3); }
        @media (min-width: 480px) { .modal { align-items: center; padding: 20px; } .modal-content { border-radius: 32px; } }

        .close-modal { position: absolute; top: 16px; right: 16px; width: 48px; height: 48px; background: var(--card-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; cursor: pointer; border: 1px solid var(--border); }

        /* Підвал як у офіційних сайтів */
        footer {
            background: #111; 
            color: #aaa; 
            padding: 70px 20px 40px; 
            text-align: center;
        }
        .footer-links {
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap; 
            gap: 25px; 
            margin: 30px 0 40px;
        }
        .footer-links a {
            color: #ccc; 
            text-decoration: none; 
            font-size: 14.5px;
        }
        .footer-links a:hover { color: var(--gold-text); }
    </style>
</head>
<body>

<!-- НОВИЙ ГЕРОЙ -->
<div class="hero">
    <div class="hero-content">
        <h1>perfume.shoppee</h1>
        <p>Люксова колекція ароматів • Тільки оригінальна продукція</p>
    </div>
</div>

<header>
    <div class="top-bar">
        <div class="lang-switch">
            <button id="btn-pl" onclick="setLang('pl')">PL</button>
            <button id="btn-uk" onclick="setLang('uk')" class="active">UA</button>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>
    <h1 class="logo">perfume.shoppee</h1>
    <p class="subtitle" id="h-sub"></p>
    <div onclick="Cart.show()" style="position:absolute;top:25px;right:22px;font-size:26px;cursor:pointer;">
        🛍️ <span id="cart-count" style="position:absolute;top:-6px;right:-8px;background:#c8102e;color:white;font-size:10px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;">0</span>
    </div>
</header>

<!-- секції хітів, новинок, знижок і каталог — без змін -->

<div id="hits-section"></div>
<div id="news-section"></div>
<div id="sales-section"></div>

<div style="text-align:center;">
    <button onclick="showFullCatalog()" class="show-all-btn">ПЕРЕГЛЯНУТИ ВЕСЬ КАТАЛОГ →</button>
</div>

<div id="full-catalog" style="display:none;">
    <div class="section-header"><h2 class="section-title" id="catalog-title"></h2></div>
    <div id="full-grid" class="product-grid"></div>
</div>

<!-- модалка і кошик (залишаються як у попередній версії) -->

<footer>
    <p style="font-size:19px;color:#ddd;font-weight:700;margin-bottom:10px;">perfume.shoppee • Luxury Edition</p>
    <div class="footer-links">
        <a href="#">Про нас</a>
        <a href="#">Доставка та оплата</a>
        <a href="#">Контакти</a>
        <a href="#">Повернення</a>
        <a href="https://www.instagram.com/perfume.shoppee" target="_blank">Instagram</a>
        <a href="https://t.me/elenafragrance" target="_blank">Telegram</a>
    </div>
    <p style="font-size:13px;opacity:0.7;">© 2026 perfume.shoppee. Усі права захищені. Тільки оригінальна продукція.</p>
</footer>

</body>
</html>
