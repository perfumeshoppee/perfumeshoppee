<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">

    <title>perfume.shoppee — Оригінальні парфуми та пробники духів від 2 мл</title>
    <meta name="description" content="Купити оригінальні парфуми, пробники 2/5/10 мл та флакони. Для неї та для нього. Доставка Україна та Польща.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        :root { --gold: #d4af37; }
        body { font-family: system-ui, -apple-system, sans-serif; }
        .logo-font { font-family: Georgia, serif; letter-spacing: -1px; }
        .card { transition: all 0.3s; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .modal { animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Sidebar */
        #sidebar { transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
        #sidebar.open { transform: translateX(0); }
        .overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .overlay.show { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100">

<!-- МОВА + ТЕМА -->
<div class="bg-white dark:bg-gray-900 border-b sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-2 flex justify-between items-center">
    <div class="flex gap-2">
      <button onclick="setLang('uk')" id="btn-uk" class="px-4 py-1 text-xs font-bold rounded-full border">UA</button>
      <button onclick="setLang('pl')" id="btn-pl" class="px-4 py-1 text-xs font-bold rounded-full border">PL</button>
    </div>
    <button onclick="toggleTheme()" id="themeBtn" class="text-xl">🌙</button>
  </div>
</div>

<!-- ШАПКА -->
<header class="bg-black text-white sticky top-12 z-40">
  <div class="max-w-7xl mx-auto">
    <div class="flex items-center justify-between px-4 py-4">
      <button onclick="toggleSidebar()" class="text-3xl"><i class="fas fa-bars"></i></button>
      <div class="flex items-center gap-2">
        <span class="text-3xl font-bold logo-font">perfume.shoppee</span>
      </div>
      <div class="flex items-center gap-6">
        <i class="fas fa-heart text-2xl"></i>
        <i class="fas fa-balance-scale text-2xl"></i>
        <div class="relative">
          <i class="fas fa-shopping-bag text-2xl"></i>
          <span id="cart-count" class="absolute -top-1 -right-1 bg-teal-500 text-[10px] rounded-full w-4 h-4 flex items-center justify-center">0</span>
        </div>
      </div>
    </div>

    <div class="px-4 pb-4">
      <div class="relative">
        <input id="searchInput" type="text" onkeyup="refresh()" 
               class="w-full bg-white text-black rounded-3xl py-3 px-6 pl-12 text-base focus:outline-none"
               placeholder="Що ви шукаєте?">
        <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
      </div>
    </div>

    <div class="flex px-4 gap-3 pb-4">
      <button onclick="setCategory('female')" id="btn-female" class="flex-1 py-4 bg-white text-black rounded-3xl font-medium">Для неї (<span id="count-female">0</span>)</button>
      <button onclick="setCategory('male')" id="btn-male" class="flex-1 py-4 bg-white text-black rounded-3xl font-medium">Для нього (<span id="count-male">0</span>)</button>
    </div>
  </div>
</header>

<!-- БІЧНЕ МЕНЮ -->
<div id="overlay" onclick="toggleSidebar()" class="overlay fixed inset-0 bg-black/60 z-[999] hidden"></div>
<div id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-white dark:bg-gray-900 shadow-2xl z-[1000] overflow-y-auto">
  <div class="p-6">
    <div class="flex justify-between items-center mb-8">
      <span class="text-2xl font-bold logo-font">perfume.shoppee</span>
      <button onclick="toggleSidebar()" class="text-3xl">✕</button>
    </div>
    <nav class="space-y-6 text-lg">
      <a href="#" onclick="goHome(); toggleSidebar(); return false;" class="flex items-center gap-3 hover:text-teal-600">
        <i class="fas fa-home w-6"></i> Головна
      </a>
      <a href="#" onclick="showBrands(); toggleSidebar(); return false;" class="flex items-center gap-3 hover:text-teal-600">
        <i class="fas fa-tags w-6"></i> Бренды
      </a>
      <a href="#" onclick="showSales(); toggleSidebar(); return false;" class="flex items-center gap-3 hover:text-teal-600">
        <i class="fas fa-percent w-6"></i> Акции
      </a>
      <a href="#" onclick="showNews(); toggleSidebar(); return false;" class="flex items-center gap-3 hover:text-teal-600">
        <i class="fas fa-star w-6"></i> Новости
      </a>
      <a href="#" onclick="toggleSidebar(); alert('Магазины скоро'); return false;" class="flex items-center gap-3 hover:text-teal-600">
        <i class="fas fa-store w-6"></i> Магазины
      </a>
      <a href="#" onclick="toggleSidebar(); alert('eCard скоро'); return false;" class="flex items-center gap-3 hover:text-teal-600">
        <i class="fas fa-credit-card w-6"></i> eCard
      </a>
    </nav>
  </div>
</div>

<!-- ГОЛОВНИЙ ЗАГОЛОВОК -->
<div id="main-header" class="max-w-7xl mx-auto px-4 py-8">
  <h1 class="text-4xl font-bold mb-4">Оригінальні парфуми та пробники духів</h1>
  <p class="text-lg text-gray-600 dark:text-gray-400">Тільки оригінальна продукція. Доставка по Україні та Польщі.</p>
</div>

<div id="dynamic-content" class="max-w-7xl mx-auto"></div>
<div id="catalog-area" class="max-w-7xl mx-auto px-4 pb-12"></div>

<!-- МОДАЛКА (повністю робоча) -->
<div id="pModal" onclick="if(event.target===this)closeModal()" 
     class="modal hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999] p-4">
  <div onclick="event.stopImmediatePropagation()" 
       class="bg-white dark:bg-gray-900 w-full max-w-md rounded-3xl p-6 relative max-h-[90vh] overflow-y-auto">
    <button onclick="closeModal()" class="absolute top-4 right-4 text-3xl text-gray-400 hover:text-black">✕</button>
    
    <img id="m-img" class="w-full max-h-72 object-contain mx-auto mb-6 rounded-2xl" alt="" loading="lazy">
    
    <div id="m-brand" class="uppercase text-xs tracking-widest text-gray-500 mb-1"></div>
    <h2 id="m-title" class="text-2xl font-bold mb-3"></h2>
    
    <div id="m-stock" class="inline-block text-xs font-bold px-4 py-1.5 rounded-3xl mb-6"></div>
    
    <p id="m-desc" class="text-sm text-gray-600 dark:text-gray-400 mb-8 leading-relaxed"></p>
    
    <div id="m-prices" class="space-y-4 mb-10"></div>
    
    <div class="grid grid-cols-2 gap-4">
      <a id="m-tg" href="#" target="_blank" 
         class="bg-black text-white py-4 rounded-3xl text-center font-bold flex items-center justify-center gap-2 text-base">
        <i class="fab fa-telegram"></i> Telegram
      </a>
      <a id="m-inst" href="https://www.instagram.com/perfume.shoppee" target="_blank" 
         class="bg-gradient-to-r from-pink-500 to-yellow-400 text-white py-4 rounded-3xl text-center font-bold flex items-center justify-center gap-2 text-base">
        <i class="fab fa-instagram"></i> Instagram
      </a>
    </div>
  </div>
</div>

<script>
// === НАЛАШТУВАННЯ ===
const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQA6BrgyLNH6Jw3BOZKxMQ2X2MAJed7xT6CBepxG-c9D3qjKJJmPzwTPypMM3fxCLipzxHrq4exkdKS/pub?output=csv';
const INSTA_URL = 'https://www.instagram.com/perfume.shoppee';
const TG_NICK = 'elenafragrance';

let allProducts = [];
let curLang = 'uk';
let curCat = 'all';
let currentView = 'home';

const UI = {
  uk: {
    hits: "Хіти продажу", news: "Новинки", sales: "Знижки %",
    stock_in: "✓ В наявності", stock_out: "✕ Немає в наявності",
    sale_tag: "ЗНИЖКА"
  },
  pl: {
    hits: "Hity sprzedaży", news: "Nowości", sales: "Zniżki %",
    stock_in: "✓ Dostępny", stock_out: "✕ Brak w magazynie",
    sale_tag: "ZNIŻKA"
  }
};

function toggleTheme() {
  document.documentElement.classList.toggle('dark');
  document.getElementById('themeBtn').innerHTML = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  const overlay = document.getElementById('overlay');
  overlay.classList.toggle('hidden');
  overlay.classList.toggle('show');
}

function hideMainHeader() { document.getElementById('main-header').style.display = 'none'; }
function showMainHeader() { document.getElementById('main-header').style.display = 'block'; }

async function init() {
  try {
    const res = await fetch(SPREADSHEET_URL);
    const text = await res.text();
    allProducts = parseCSV(text);
    setLang('uk');
  } catch(e) {
    alert('Не вдалося завантажити товари 😔 Перевір посилання на Google-таблицю');
  }
}

function parseCSV(csv) {
  const rows = []; let cur = '', inQ = false, row = [];
  for (let i = 0; i < csv.length; i++) {
    let c = csv[i], n = csv[i+1];
    if (c === '"' && inQ && n === '"') { cur += '"'; i++; }
    else if (c === '"') inQ = !inQ;
    else if (c === ',' && !inQ) { row.push(cur); cur = ''; }
    else if ((c === '\n' || c === '\r') && !inQ) { 
      row.push(cur); rows.push(row); cur = ''; row = []; 
      if (c === '\r' && n === '\n') i++;
    } else cur += c;
  }
  if (cur || row.length) { row.push(cur); rows.push(row); }
  const headers = rows[0].map(v => v.trim());
  return rows.slice(1).map(r => {
    let o = {}; headers.forEach((k,i) => o[k] = r[i] ? r[i].trim() : ''); return o;
  });
}

function setLang(l) {
  curLang = l;
  document.getElementById('btn-uk').classList.toggle('bg-black', l==='uk');
  document.getElementById('btn-uk').classList.toggle('text-white', l==='uk');
  document.getElementById('btn-pl').classList.toggle('bg-black', l==='pl');
  document.getElementById('btn-pl').classList.toggle('text-white', l==='pl');
  refresh();
}

function setCategory(cat) {
  curCat = cat;
  currentView = 'home';
  showMainHeader();
  document.getElementById('searchInput').value = '';
  refresh();
}

function goHome() {
  currentView = 'home';
  curCat = 'all';
  document.getElementById('searchInput').value = '';
  showMainHeader();
  refresh();
}

function refresh() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  
  let filtered = allProducts.filter(p => {
    const name = curLang === 'uk' ? (p.nameUK || p.name || '') : (p.namePL || p.name || '');
    const matchSearch = (p.brand + ' ' + name).toLowerCase().includes(q);
    const matchCat = curCat === 'all' || p.category === curCat;
    return matchSearch && matchCat;
  });

  document.getElementById('count-female').textContent = allProducts.filter(p => p.category === 'female').length;
  document.getElementById('count-male').textContent = allProducts.filter(p => p.category === 'male').length;

  let html = '';
  if (currentView === 'home' && curCat === 'all' && !q) {
    const hits = allProducts.filter(p => p.isBest?.toLowerCase() === 'yes');
    const news = allProducts.filter(p => p.isNew?.toLowerCase() === 'yes');
    const sales = allProducts.filter(p => p.old2ml || p.old5ml || p.old10ml || p.oldFull);

    if (hits.length) html += createSection(UI[curLang].hits, hits);
    if (news.length) html += createSection(UI[curLang].news, news);
    if (sales.length) html += createSection(UI[curLang].sales, sales, true);
  }

  document.getElementById('dynamic-content').innerHTML = html;
  document.getElementById('catalog-area').innerHTML = `<div class="grid grid-cols-2 gap-6">${filtered.map(p => getCard(p)).join('')}</div>`;
}

function createSection(title, items, isSale = false) {
  return `
    <div class="px-4 py-6">
      <h2 class="uppercase text-sm font-bold tracking-widest mb-4 ${isSale ? 'text-red-600' : ''}">${title}</h2>
      <div class="flex overflow-x-auto gap-4 pb-4">${items.map(p => getCard(p, true)).join('')}</div>
    </div>`;
}

function getCard(p, isCarousel = false) {
  const hasSale = !!(p.old2ml || p.old5ml || p.old10ml || p.oldFull);
  const inStock = p.status?.toLowerCase() !== 'out';
  const name = curLang === 'uk' ? (p.nameUK || p.name || '') : (p.namePL || p.name || '');
  const price = p.price2ml || p.price10ml || '—';

  return `
    <div onclick="openModal(${JSON.stringify(p)})" class="bg-white dark:bg-gray-900 rounded-3xl overflow-hidden shadow-sm min-w-[170px] ${isCarousel ? '' : 'card'} relative">
      ${hasSale ? `<div class="bg-red-600 text-white text-[10px] font-bold px-3 py-1 absolute m-3 rounded-2xl z-10">${UI[curLang].sale_tag}</div>` : ''}
      <div class="h-44 flex items-center justify-center p-4 bg-gray-50 dark:bg-gray-800">
        <img src="${p.photo}" alt="${p.brand} ${name}" class="max-h-full max-w-full object-contain" loading="lazy" width="300" height="300">
      </div>
      <div class="p-4">
        <div class="text-xs text-gray-500">${p.brand}</div>
        <div class="font-semibold text-sm leading-tight mt-1 line-clamp-2">${name}</div>
        <div class="mt-4 flex justify-between items-baseline">
          <div class="text-lg font-bold text-teal-600">${price} zł</div>
          <div class="text-xs ${inStock ? 'text-emerald-600' : 'text-gray-400'}">${inStock ? UI[curLang].stock_in : UI[curLang].stock_out}</div>
        </div>
      </div>
    </div>`;
}

function openModal(p) {
  const name = curLang === 'uk' ? (p.nameUK || p.name || '') : (p.namePL || p.name || '');
  const inStock = p.status?.toLowerCase() !== 'out';
  
  // Заповнення модалки
  document.getElementById('m-img').src = p.photo || '';
  document.getElementById('m-brand').textContent = p.brand || '';
  document.getElementById('m-title').textContent = name;
  
  document.getElementById('m-stock').innerHTML = `
    <span class="${inStock ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-200 text-gray-500'} px-4 py-1.5 rounded-3xl text-xs font-medium">
      ${inStock ? UI[curLang].stock_in : UI[curLang].stock_out}
    </span>`;

  document.getElementById('m-desc').textContent = curLang === 'uk' ? (p.descUK || p.desc || 'Опис відсутній') : (p.descPL || p.desc || 'Opis niedostępny');

  // Ціни з перекресленням
  let pricesHTML = '';
  const variants = [
    { label: '2 мл', price: p.price2ml, old: p.old2ml },
    { label: '5 мл', price: p.price5ml, old: p.old5ml },
    { label: '10 мл', price: p.price10ml, old: p.old10ml },
    { label: 'Флакон', price: p.fullPrice, old: p.oldFull }
  ];

  variants.forEach(v => {
    if (v.price && parseFloat(v.price) > 0) {
      pricesHTML += `
        <div class="flex justify-between items-center border-b border-gray-100 dark:border-gray-700 pb-3 last:border-none">
          <span class="font-medium">${v.label}</span>
          <div class="text-right">
            ${v.old ? `<span class="line-through text-gray-400 text-sm mr-2">${v.old} zł</span>` : ''}
            <span class="font-bold text-lg ${v.old ? 'text-red-600' : 'text-teal-600'}">${v.price} zł</span>
          </div>
        </div>`;
    }
  });

  document.getElementById('m-prices').innerHTML = pricesHTML || '<p class="text-gray-400 text-center py-4">Ціни оновлюються...</p>';

  // Посилання
  document.getElementById('m-tg').href = `https://t.me/${TG_NICK}?text=Хочу%20замовити:%20${encodeURIComponent(p.brand + ' ' + name)}`;

  // Показуємо модалку
  document.getElementById('pModal').classList.remove('hidden');
  document.getElementById('pModal').classList.add('flex');
}

function closeModal() {
  const modal = document.getElementById('pModal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
}

// === ФУНКЦІЇ МЕНЮ ===
function showBrands() {
  currentView = 'brands';
  hideMainHeader();
  const brands = [...new Set(allProducts.map(p => p.brand).filter(Boolean))].sort();
  let html = `<div class="px-4 py-6"><h2 class="text-xl font-bold mb-6">Бренды</h2>`;
  brands.forEach(b => {
    const count = allProducts.filter(p => p.brand === b).length;
    html += `
      <div onclick="filterByBrand('${b}'); toggleSidebar();" 
           class="flex justify-between py-4 border-b hover:bg-gray-50 dark:hover:bg-gray-800 px-3 rounded-2xl cursor-pointer">
        <span class="font-medium">${b}</span>
        <span class="text-sm text-gray-500">${count}</span>
      </div>`;
  });
  html += `</div>`;
  document.getElementById('dynamic-content').innerHTML = html;
  document.getElementById('catalog-area').innerHTML = '';
}

function showSales() {
  currentView = 'sales';
  hideMainHeader();
  curCat = 'all';
  document.getElementById('searchInput').value = '';
  refresh();
}

function showNews() {
  currentView = 'news';
  hideMainHeader();
  curCat = 'all';
  document.getElementById('searchInput').value = '';
  refresh();
}

function filterByBrand(brand) {
  currentView = 'brands';
  hideMainHeader();
  const filtered = allProducts.filter(p => p.brand === brand);
  document.getElementById('catalog-area').innerHTML = `<div class="grid grid-cols-2 gap-6">${filtered.map(p => getCard(p)).join('')}</div>`;
  document.getElementById('dynamic-content').innerHTML = '';
}

// Запуск сайту
init();
</script>
</body>
</html>
