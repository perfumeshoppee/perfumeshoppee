<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>perfume.shoppee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap');
        
        :root { --brand-deep: #062C22; --brand-accent: #C5A059; --bg-light: #FDFCFB; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-light); color: var(--brand-deep); overflow-x: hidden; }
        .logo-font { font-family: 'Playfair Display', serif; }

        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(6, 44, 34, 0.08); }

        /* Горизонтальна прокрутка */
        .scroll-x { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 16px; padding-bottom: 20px; }
        .scroll-x::-webkit-scrollbar { display: none; }
        .scroll-item { flex: 0 0 170px; scroll-snap-align: start; }

        .product-card { background: white; border-radius: 24px; transition: all 0.3s ease; border: 1px solid rgba(0,0,0,0.03); }
        
        #sidebar { background: var(--brand-deep); transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        #sidebar.open { transform: translateX(0); }

        .lang-node.active { background: var(--brand-accent); color: white; border-color: var(--brand-accent); }
        
        /* Менша модалка */
        .modal-content { max-width: 400px; width: 90%; border-radius: 32px; padding: 24px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<nav class="glass-nav sticky top-0 z-50 px-6 py-4">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <button onclick="toggleSidebar()" class="text-2xl text-[#062C22]"><i class="fa-solid fa-bars-staggered"></i></button>
    <span onclick="goHome()" class="text-xl font-bold logo-font cursor-pointer tracking-tighter">perfume.shoppee</span>
    <button onclick="toggleCart()" class="relative text-[#062C22]">
        <i class="fa-solid fa-bag-shopping text-xl"></i>
        <span id="cart-count" class="absolute -top-2 -right-2 bg-[#C5A059] text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
    </button>
  </div>
</nav>

<div class="px-6 py-4 bg-white">
    <div class="relative max-w-2xl mx-auto">
        <input id="searchInput" type="text" onkeyup="refreshCatalog()" 
               class="w-full bg-neutral-100 rounded-2xl py-4 px-12 text-sm outline-none" 
               data-i18n-placeholder="search_placeholder">
        <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-neutral-300 text-xs"></i>
    </div>
</div>

<div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[1001] hidden"></div>
<div id="sidebar" class="fixed top-0 left-0 h-full w-[280px] z-[1002] shadow-2xl p-8 flex flex-col text-white font-semibold">
    <div class="mb-10 flex justify-between items-center">
        <span class="logo-font text-lg">perfume.shoppee</span>
        <button onclick="toggleSidebar()" class="text-white/30"><i class="fa-solid fa-xmark text-xl"></i></button>
    </div>
    
    <div class="flex gap-2 mb-10">
        <button onclick="setLang('UA')" id="btn-ua" class="lang-node flex-1 py-2 rounded-xl border border-white/10 text-[10px] active">UA</button>
        <button onclick="setLang('PL')" id="btn-pl" class="lang-node flex-1 py-2 rounded-xl border border-white/10 text-[10px]">PL</button>
    </div>

    <nav class="space-y-6 text-xs uppercase tracking-widest">
        <a href="#" onclick="goHome(); toggleSidebar(); return false;" data-i18n="menu_home" class="block"></a>
        <a href="#" onclick="showAllCatalog(); toggleSidebar(); return false;" data-i18n="menu_catalog" class="block"></a>
        <a href="#" onclick="showBrandList(); toggleSidebar(); return false;" data-i18n="menu_brands" class="block"></a>
        <a href="#" onclick="filterBy('hit'); toggleSidebar(); return false;" data-i18n="menu_hits" class="block"></a>
        <a href="#" onclick="filterBy('new'); toggleSidebar(); return false;" data-i18n="menu_news" class="block"></a>
        <a href="#" onclick="filterBy('sale'); toggleSidebar(); return false;" data-i18n="menu_sale" class="block text-red-400"></a>
    </nav>

    <div class="mt-auto">
        <a href="https://www.instagram.com/perfume.shoppee?igsh=MWdya2RqbHpweW5vbQ==" target="_blank" class="flex items-center gap-3 text-[#C5A059]">
            <i class="fa-brands fa-instagram text-xl"></i>
            <span class="text-[9px] uppercase tracking-widest">Instagram</span>
        </a>
    </div>
</div>

<main class="max-w-7xl mx-auto pb-20">
    <div id="catalog-filters" class="hidden px-6 mb-6 overflow-x-auto no-scrollbar flex gap-2">
      <button onclick="setCategory('all')" id="cat-all" class="px-6 py-2 bg-[#062C22] text-white rounded-xl text-[9px] font-bold uppercase tracking-widest" data-i18n="cat_all"></button>
      <button onclick="setCategory('female')" id="cat-female" class="px-6 py-2 bg-white border border-neutral-100 text-neutral-400 rounded-xl text-[9px] font-bold uppercase tracking-widest" data-i18n="cat_female"></button>
      <button onclick="setCategory('male')" id="cat-male" class="px-6 py-2 bg-white border border-neutral-100 text-neutral-400 rounded-xl text-[9px] font-bold uppercase tracking-widest" data-i18n="cat_male"></button>
    </div>
    <div id="catalog-area" class="px-6"></div>
</main>

<div id="cart-panel" class="fixed top-0 right-0 h-full w-full max-w-md bg-white z-[10000] shadow-2xl transform translate-x-full transition-transform duration-500 flex flex-col">
    <div class="p-6 border-b flex justify-between items-center bg-[#062C22] text-white">
        <h2 class="text-[10px] font-bold uppercase tracking-widest" data-i18n="cart_title"></h2>
        <button onclick="toggleCart()"><i class="fa-solid fa-xmark text-xl"></i></button>
    </div>
    <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
    <div class="p-8 border-t bg-neutral-50 space-y-6">
        <div class="flex justify-between items-center">
            <span class="text-[10px] font-bold uppercase text-neutral-400" data-i18n="cart_total_label"></span>
            <span id="cart-total" class="text-xl font-bold">0 zł</span>
        </div>
        <button onclick="sendOrder()" class="w-full bg-[#062C22] text-white py-5 rounded-2xl text-[10px] font-bold uppercase tracking-widest" data-i18n="cart_order_btn"></button>
    </div>
</div>

<div id="pModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md z-[9999] flex items-center justify-center p-4" onclick="closeModal()">
  <div class="modal-content bg-white relative overflow-y-auto max-h-[90vh]" onclick="event.stopPropagation()">
    <button onclick="closeModal()" class="absolute top-5 right-5 text-neutral-300"><i class="fa-solid fa-xmark text-xl"></i></button>
    <div class="flex flex-col items-center">
        <img id="m-img" class="w-40 h-40 object-contain mb-6 mix-blend-multiply" src="">
        <div id="m-brand" class="text-[8px] font-black text-[#C5A059] uppercase tracking-[0.3em] mb-2"></div>
        <h2 id="m-title" class="text-lg font-bold text-center mb-4 logo-font"></h2>
        <div class="w-full space-y-2 mb-8" id="m-prices"></div>
        <button id="add-to-cart-btn" class="w-full bg-[#062C22] text-white py-5 rounded-2xl text-[10px] font-bold uppercase tracking-widest opacity-20 cursor-not-allowed" data-i18n="add_to_cart"></button>
    </div>
  </div>
</div>

<script>
const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQA6BrgyLNH6Jw3BOZKxMQ2X2MAJed7xT6CBepxG-c9D3qjKJJmPzwTPypMM3fxCLipzxHrq4exkdKS/pub?output=csv';
const TG_NICK = 'elenafragrance';

let allProducts = [], cart = JSON.parse(localStorage.getItem('ps_cart')) || [];
let curCat = 'all', currentFilter = 'home', selectedOption = null, currentLang = 'UA';

const i18n = {
    UA: {
        search_placeholder: "Пошук аромату...", menu_home: "Головна", menu_catalog: "Каталог", menu_brands: "Бренди", menu_hits: "Хіти", menu_news: "Новинки", menu_sale: "Акції %",
        cat_all: "Усі", cat_female: "Жіночі", cat_male: "Чоловічі", hits_title: "Хіти продажу", news_title: "Новинки", cart_title: "Ваш кошик", cart_total_label: "Разом",
        cart_order_btn: "Оформити в Telegram", add_to_cart: "Додати в кошик", empty_cart: "Кошик порожній", order_msg: "Нове замовлення"
    },
    PL: {
        search_placeholder: "Szukaj zapachu...", menu_home: "Główna", menu_catalog: "Katalog", menu_brands: "Marki", menu_hits: "Hity", menu_news: "Nowości", menu_sale: "Promocje %",
        cat_all: "Wszystkie", cat_female: "Damskie", cat_male: "Męskie", hits_title: "Bestsellery", news_title: "Nowości", cart_title: "Twój koszyk", cart_total_label: "Suma",
        cart_order_btn: "Zamów przez Telegram", add_to_cart: "Dodaj do koszyka", empty_cart: "Koszyk jest pusty", order_msg: "Nowe zamówienie"
    }
};

async function init() {
    const res = await fetch(SPREADSHEET_URL);
    const text = await res.text();
    allProducts = parseCSV(text);
    updateUI();
    refreshCatalog();
    renderCart();
}

function parseCSV(text) {
    let rows = [], row = [], col = '', q = false;
    for (let i = 0; i < text.length; i++) {
        let c = text[i], n = text[i+1];
        if (c === '"' && q && n === '"') { col += '"'; i++; }
        else if (c === '"') q = !q;
        else if (c === ',' && !q) { row.push(col.trim()); col = ''; }
        else if ((c === '\r' || c === '\n') && !q) {
            if (col || row.length) { row.push(col.trim()); rows.push(row); }
            row = []; col = ''; if (c === '\r' && n === '\n') i++;
        } else col += c;
    }
    if (col || row.length) { row.push(col.trim()); rows.push(row); }
    const h = rows[0];
    return rows.slice(1).map(r => {
        let o = {}; h.forEach((k, i) => o[k] = r[i] || "");
        return o;
    });
}

function setLang(l) {
    currentLang = l;
    document.querySelectorAll('.lang-node').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + l.toLowerCase()).classList.add('active');
    updateUI();
    refreshCatalog();
    renderCart();
}

function updateUI() {
    document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = i18n[currentLang][el.getAttribute('data-i18n')]);
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => el.placeholder = i18n[currentLang][el.getAttribute('data-i18n-placeholder')]);
}

function refreshCatalog() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const area = document.getElementById('catalog-area');
    document.getElementById('catalog-filters').classList.toggle('hidden', currentFilter !== 'all');

    if (currentFilter === 'home' && q === '') {
        // Тут логіка банера з таблиці: якщо в таблиці є рядок з назвою "BANNER", беремо його фото
        const banner = allProducts.find(p => p.brand === "BANNER");
        area.innerHTML = `
            ${banner ? `<div class="mb-10 rounded-[32px] overflow-hidden shadow-sm"><img src="${banner.photo}" class="w-full object-cover"></div>` : ''}
            <div class="mb-12">
                <h2 class="text-xs font-bold uppercase tracking-widest mb-6">${i18n[currentLang].hits_title}</h2>
                <div class="scroll-x">${renderScrollList(allProducts.filter(p => p.isBest?.toLowerCase() === 'yes'))}</div>
            </div>
            <div class="mb-12">
                <h2 class="text-xs font-bold uppercase tracking-widest mb-6">${i18n[currentLang].news_title}</h2>
                <div class="scroll-x">${renderScrollList(allProducts.filter(p => p.isNew?.toLowerCase() === 'yes'))}</div>
            </div>
        `;
        return;
    }

    let filtered = allProducts.filter(p => {
        if(p.brand === "BANNER") return false;
        const matchSearch = (p.brand + ' ' + (p.nameUK || p.name)).toLowerCase().includes(q);
        const catValue = p.category?.toLowerCase().trim();
        let matchSpecial = true;
        if (currentFilter === 'new') matchSpecial = p.isNew?.toLowerCase() === 'yes';
        if (currentFilter === 'hit') matchSpecial = p.isBest?.toLowerCase() === 'yes';
        if (currentFilter === 'sale') matchSpecial = !!(p.old2ml || p.oldFull);
        if (currentFilter === 'brand') matchSpecial = p.brand === curCat;
        const matchCat = (curCat === 'all' || currentFilter !== 'all') || (catValue === curCat);
        return matchSearch && matchCat && matchSpecial;
    });

    area.innerHTML = `<div class="grid grid-cols-2 md:grid-cols-4 gap-4">${renderList(filtered)}</div>`;
}

function renderScrollList(list) {
    return list.map(p => `
        <div onclick="openModal(${allProducts.indexOf(p)})" class="scroll-item product-card p-4 flex flex-col h-full">
            <div class="aspect-square bg-neutral-50 rounded-2xl flex items-center justify-center p-4 mb-3">
                <img src="${p.photo}" class="max-h-full object-contain mix-blend-multiply">
            </div>
            <div class="text-[7px] font-black text-[#C5A059] uppercase tracking-widest mb-1">${p.brand}</div>
            <div class="text-[10px] font-bold leading-tight truncate mb-2">${p.nameUK || p.name}</div>
            <div class="text-[10px] font-black mt-auto text-[#062C22]">${p.price2ml || p.fullPrice} zł</div>
        </div>
    `).join('');
}

function renderList(list) {
    return list.map(p => `
    <div onclick="openModal(${allProducts.indexOf(p)})" class="product-card p-4 flex flex-col h-full">
        <div class="aspect-square bg-neutral-50 rounded-2xl flex items-center justify-center p-6 mb-4">
            <img src="${p.photo}" class="max-h-full object-contain mix-blend-multiply">
        </div>
        <div class="text-[7px] font-black text-[#C5A059] uppercase tracking-widest mb-1">${p.brand}</div>
        <div class="text-[11px] font-bold leading-tight mb-2 truncate">${p.nameUK || p.name}</div>
        <div class="text-xs font-black text-[#062C22]">${p.price2ml || p.fullPrice} zł</div>
    </div>`).join('');
}

function showAllCatalog() { currentFilter = 'all'; curCat = 'all'; refreshCatalog(); }
function showBrandList() {
    currentFilter = 'brand';
    const brands = [...new Set(allProducts.filter(p => p.brand !== "BANNER").map(p => p.brand))].sort();
    document.getElementById('catalog-area').innerHTML = `<div class="grid grid-cols-1 gap-2">` + brands.map(b => `
        <button onclick="filterBy('brand', '${b}')" class="w-full text-left py-5 px-6 bg-white rounded-2xl border border-neutral-50 flex justify-between items-center text-[10px] font-bold uppercase tracking-widest">
            ${b} <i class="fa-solid fa-chevron-right text-[#C5A059]"></i>
        </button>
    `).join('') + `</div>`;
}

function filterBy(type, val = null) { currentFilter = type; if (val) curCat = val; window.scrollTo({top: 0, behavior: 'smooth'}); refreshCatalog(); }
function goHome() { currentFilter = 'home'; curCat = 'all'; refreshCatalog(); }
function setCategory(c) { curCat = c; refreshCatalog(); }

function openModal(idx) {
    const p = allProducts[idx]; selectedOption = null;
    const btn = document.getElementById('add-to-cart-btn');
    btn.classList.add('opacity-20', 'cursor-not-allowed');
    btn.innerText = i18n[currentLang].add_to_cart;

    document.getElementById('m-img').src = p.photo;
    document.getElementById('m-brand').innerText = p.brand;
    document.getElementById('m-title').innerText = p.nameUK || p.name;
    
    let html = '';
    [{l:'2ml', p:p.price2ml}, {l:'5ml', p:p.price5ml}, {l:'10ml', p:p.price10ml}, {l:'Full', p:p.fullPrice}].forEach(o => {
        if(o.p && o.p !== '---' && o.p !== '') {
            html += `<div onclick="selectSize(this, '${o.l}', '${o.p}', '${p.brand}', '${p.nameUK || p.name}', '${p.photo}')" 
                class="border border-neutral-100 flex justify-between items-center p-4 rounded-xl cursor-pointer text-xs font-bold">
                <span>${o.l}</span><span>${o.p} zł</span>
            </div>`;
        }
    });
    document.getElementById('m-prices').innerHTML = html;
    document.getElementById('pModal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
}

function selectSize(el, size, price, brand, name, img) {
    document.querySelectorAll('#m-prices div').forEach(d => d.style.borderColor = '#F0F0F0');
    el.style.borderColor = '#C5A059';
    selectedOption = { size, price, brand, name, img, id: Date.now() };
    const btn = document.getElementById('add-to-cart-btn');
    btn.classList.remove('opacity-20', 'cursor-not-allowed');
    btn.innerText = `${i18n[currentLang].add_to_cart} • ${price} zł`;
}

function addToCart() {
    if(!selectedOption) return;
    cart.push(selectedOption);
    localStorage.setItem('ps_cart', JSON.stringify(cart));
    renderCart(); closeModal(); toggleCart(true);
}

function renderCart() {
    const c = document.getElementById('cart-items');
    document.getElementById('cart-count').innerText = cart.length;
    document.getElementById('cart-count').classList.toggle('hidden', cart.length === 0);
    let total = 0;
    if (cart.length === 0) {
        c.innerHTML = `<div class="text-center py-10 text-neutral-300 text-[9px] uppercase font-bold">${i18n[currentLang].empty_cart}</div>`;
    } else {
        c.innerHTML = cart.map((item, i) => {
            total += parseFloat(item.price);
            return `<div class="flex gap-4 items-center">
                <img src="${item.img}" class="w-16 h-16 object-contain bg-neutral-50 rounded-xl p-2">
                <div class="flex-1 min-w-0">
                    <div class="text-[7px] font-black text-[#C5A059] uppercase">${item.brand}</div>
                    <div class="text-[10px] font-bold truncate">${item.name}</div>
                    <div class="text-[9px] text-neutral-400">${item.size} • ${item.price} zł</div>
                </div>
                <button onclick="removeFromCart(${i})" class="text-neutral-200"><i class="fa-solid fa-xmark"></i></button>
            </div>`;
        }).join('');
    }
    document.getElementById('cart-total').innerText = total.toFixed(2) + ' zł';
}

function removeFromCart(i) { cart.splice(i, 1); localStorage.setItem('ps_cart', JSON.stringify(cart)); renderCart(); }

function sendOrder() {
    if (cart.length === 0) return;
    let t = `${i18n[currentLang].order_msg}!\n\n`;
    cart.forEach((it, i) => t += `${i+1}. ${it.brand} ${it.name} (${it.size}) - ${it.price} zł\n`);
    t += `\n💰 ${i18n[currentLang].cart_total_label}: ${document.getElementById('cart-total').innerText}`;
    window.open(`https://t.me/${TG_NICK}?text=${encodeURIComponent(t)}`, '_blank');
}

function toggleSidebar() { 
    document.getElementById('sidebar').classList.toggle('open'); 
    document.getElementById('overlay').classList.toggle('hidden');
}
function toggleCart(st) { 
    const p = document.getElementById('cart-panel');
    if (st === true) p.classList.remove('translate-x-full'); else p.classList.toggle('translate-x-full');
}
function closeModal() { document.getElementById('pModal').classList.add('hidden'); document.body.style.overflow = ''; }

document.getElementById('add-to-cart-btn').onclick = addToCart;
init();
</script>
</body>
</html>
