<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>perfume.shoppee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap');
        
        :root { --brand-deep: #062C22; --brand-accent: #C5A059; --bg-light: #FDFCFB; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-light); color: var(--brand-deep); overflow-x: hidden; scroll-behavior: smooth; }
        .logo-font { font-family: 'Playfair Display', serif; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(6, 44, 34, 0.08); }

        .img-container { 
            display: flex; align-items: center; justify-content: center; overflow: hidden; 
            background: #f9f9f9; border-radius: 20px; padding: 12px; height: 180px; width: 100%; position: relative;
        }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .product-title {
            font-size: 11px; font-weight: 700; line-height: 1.2; margin-bottom: 8px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; text-overflow: ellipsis; min-height: 28px;
        }

        .scroll-x { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 12px; padding-bottom: 15px; -webkit-overflow-scrolling: touch; }
        .scroll-x::-webkit-scrollbar { display: none; }
        .scroll-item { flex: 0 0 160px; scroll-snap-align: start; }
        .scroll-item .img-container { height: 150px; }

        .product-card { 
            background: white; border-radius: 24px; border: 1px solid rgba(0,0,0,0.03); 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); position: relative; cursor: pointer;
        }

        .out-of-stock { opacity: 0.5; filter: grayscale(0.8); }
        .stock-badge { 
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #fff; 
            font-size: 7px; padding: 4px 8px; border-radius: 8px; text-transform: uppercase; font-weight: 800; z-index: 10;
        }

        #sidebar { background: var(--brand-deep); transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        #sidebar.open { transform: translateX(0); }
        .lang-node.active { background: var(--brand-accent); color: white; border-color: var(--brand-accent); }
        .cat-btn.active { background: var(--brand-deep) !important; color: white !important; }
        .lock-scroll { overflow: hidden; }
        .price-new { color: #ef4444; font-weight: 900; }
        .price-old { color: #a3a3a3; text-decoration: line-through; font-size: 0.85em; margin-left: 5px; font-weight: 400; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<nav class="glass-nav sticky top-0 z-50 px-6 py-4">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <button onclick="toggleSidebar()" class="text-2xl text-[#062C22]"><i class="fa-solid fa-bars-staggered"></i></button>
    <span onclick="goHome()" class="text-xl font-bold logo-font cursor-pointer tracking-tighter">perfume.shoppee</span>
    <button onclick="toggleCart()" class="relative text-[#062C22]"><i class="fa-solid fa-bag-shopping text-xl"></i><span id="cart-count" class="absolute -top-2 -right-2 bg-[#C5A059] text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center hidden">0</span></button>
  </div>
</nav>

<div class="px-6 py-4 bg-white" data-aos="fade-down">
    <div class="relative max-w-2xl mx-auto">
        <input id="searchInput" type="text" onkeyup="refreshCatalog()" class="w-full bg-neutral-100 rounded-2xl py-4 px-12 text-sm outline-none" data-i18n-placeholder="search_placeholder">
        <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-neutral-300 text-xs"></i>
    </div>
</div>

<div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[1001] hidden"></div>
<div id="sidebar" class="fixed top-0 left-0 h-full w-[280px] z-[1002] shadow-2xl p-8 flex flex-col text-white font-semibold">
    <div class="mb-8 flex justify-between items-center">
        <span class="logo-font text-lg">perfume.shoppee</span>
        <button onclick="toggleSidebar()" class="text-white/30"><i class="fa-solid fa-xmark text-xl"></i></button>
    </div>
    
    <div class="flex gap-2 mb-8">
        <button onclick="setLang('UA')" id="btn-ua" class="lang-node flex-1 py-2 rounded-xl border border-white/10 text-[10px] active">UA</button>
        <button onclick="setLang('PL')" id="btn-pl" class="lang-node flex-1 py-2 rounded-xl border border-white/10 text-[10px]">PL</button>
    </div>

    <nav class="space-y-6 text-[11px] uppercase tracking-widest">
        <a href="#" onclick="goHome(); toggleSidebar(); return false;" data-i18n="menu_home" class="block"></a>
        <a href="#" onclick="showAllCatalog(); toggleSidebar(); return false;" data-i18n="menu_catalog" class="block"></a>
        <a href="#" onclick="filterBy('hit'); toggleSidebar(); return false;" data-i18n="menu_hits" class="block"></a>
        <a href="#" onclick="filterBy('new'); toggleSidebar(); return false;" data-i18n="menu_news" class="block"></a>
        <a href="#" onclick="filterBy('sale'); toggleSidebar(); return false;" data-i18n="menu_sale" class="block text-red-400"></a>
    </nav>
</div>

<main class="max-w-7xl mx-auto pb-20">
    <div id="catalog-filters" class="hidden px-6 mb-6 overflow-x-auto no-scrollbar flex gap-2">
      <button onclick="setCategory('all')" id="cat-all" class="cat-btn px-6 py-2 bg-white border border-neutral-100 text-neutral-400 rounded-xl text-[9px] font-bold uppercase tracking-widest active" data-i18n="cat_all"></button>
      <button onclick="setCategory('female')" id="cat-female" class="cat-btn px-6 py-2 bg-white border border-neutral-100 text-neutral-400 rounded-xl text-[9px] font-bold uppercase tracking-widest" data-i18n="cat_female"></button>
      <button onclick="setCategory('male')" id="cat-male" class="cat-btn px-6 py-2 bg-white border border-neutral-100 text-neutral-400 rounded-xl text-[9px] font-bold uppercase tracking-widest" data-i18n="cat_male"></button>
      <button onclick="setCategory('uniseks')" id="cat-uniseks" class="cat-btn px-6 py-2 bg-white border border-neutral-100 text-neutral-400 rounded-xl text-[9px] font-bold uppercase tracking-widest" data-i18n="cat_uniseks"></button>
      <button onclick="setCategory('sets')" id="cat-sets" class="cat-btn px-6 py-2 bg-white border border-neutral-100 text-neutral-400 rounded-xl text-[9px] font-bold uppercase tracking-widest" data-i18n="cat_sets"></button>
    </div>
    <div id="catalog-area" class="px-6"></div>
</main>

<div id="cart-panel" class="fixed top-0 right-0 h-full w-full max-w-md bg-white z-[10000] shadow-2xl transform translate-x-full transition-transform duration-500 flex flex-col">
    <div class="p-6 border-b flex justify-between items-center bg-[#062C22] text-white">
        <h2 class="text-[10px] font-bold uppercase tracking-widest" data-i18n="cart_title"></h2>
        <button onclick="toggleCart()"><i class="fa-solid fa-xmark text-xl"></i></button>
    </div>
    <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
    <div class="p-8 border-t bg-neutral-50 space-y-6">
        <div class="flex justify-between items-center"><span class="text-[10px] font-bold uppercase text-neutral-400" data-i18n="cart_total_label"></span><span id="cart-total" class="text-xl font-bold">0 zł</span></div>
        <button onclick="sendOrder()" class="w-full bg-[#062C22] text-white py-5 rounded-2xl text-[10px] font-bold uppercase tracking-widest" data-i18n="cart_order_btn"></button>
    </div>
</div>

<div id="pModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md z-[9999] flex items-center justify-center p-4" onclick="closeModal()">
  <div class="modal-content bg-white relative overflow-y-auto max-h-[95vh] shadow-2xl p-6 rounded-[32px]" onclick="event.stopPropagation()">
    <button onclick="closeModal()" class="absolute top-5 right-5 text-neutral-300 z-10"><i class="fa-solid fa-xmark text-xl"></i></button>
    <div class="flex flex-col items-center">
        <div class="img-container w-44 h-44 mb-6 shadow-sm"><img id="m-img" src=""></div>
        <div id="m-brand" class="text-[8px] font-black text-[#C5A059] uppercase tracking-[0.3em] mb-1"></div>
        <h2 id="m-title" class="text-lg font-bold text-center mb-3 logo-font leading-tight"></h2>
        <p id="m-desc" class="text-[11px] text-neutral-400 text-center mb-6 px-2"></p>
        <div class="w-full space-y-2 mb-8" id="m-prices"></div>
        <button id="add-to-cart-btn" class="w-full bg-[#062C22] text-white py-5 rounded-2xl text-[10px] font-bold uppercase tracking-widest opacity-20 cursor-not-allowed transition-all" data-i18n="add_to_cart"></button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
// ТВОЯ НОВА ТАБЛИЦЯ (Прямий експорт CSV)
const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/17lsowoX7ko9bhSjNjHcMUypha_PKMsj_uuUhCPwTKhA/export?format=csv';
const TG_NICK = 'elenafragrance';

let allProducts = [], cart = JSON.parse(localStorage.getItem('ps_cart')) || [];
let curCat = 'all', currentFilter = 'home', selectedOption = null, currentLang = 'UA';

const i18n = {
    UA: {
        search_placeholder: "Пошук аромату...", menu_home: "Головна", menu_catalog: "Каталог", menu_hits: "Хіти", menu_news: "Новинки", menu_sale: "Акції %",
        cat_all: "Усі", cat_female: "Жіночі", cat_male: "Чоловічі", cat_uniseks: "Унісекс", cat_sets: "Набори", hits_title: "Хіти продажу", news_title: "Новинки", cart_title: "Ваш кошик", cart_total_label: "Разом",
        cart_order_btn: "Оформити в Telegram", add_to_cart: "Додати в кошик", empty_cart: "Кошик порожній", order_msg: "Нове замовлення", default_desc: "Вишуканий аромат з унікальним шлейфом.",
        sold_badge: "Sold Out", out_of_stock_btn: "Немає в наявності"
    },
    PL: {
        search_placeholder: "Szukaj zapachu...", menu_home: "Główna", menu_catalog: "Katalog", menu_hits: "Hity", menu_news: "Nowości", menu_sale: "Promocje %",
        cat_all: "Wszystkie", cat_female: "Damskie", cat_male: "Męskie", cat_uniseks: "Uniseks", cat_sets: "Zestawy", hits_title: "Bestsellery", news_title: "Nowości", cart_title: "Twój koszyk", cart_total_label: "Suma",
        cart_order_btn: "Zamów przez Telegram", add_to_cart: "Dodaj do koszyka", empty_cart: "Koszyk jest pusty", order_msg: "Nowe zamówienie", default_desc: "Wyrafunowany zapach o wyjątkowym charakterze.",
        sold_badge: "Sold Out", out_of_stock_btn: "Brak w magazynie"
    }
};

async function init() {
    try {
        const res = await fetch(SPREADSHEET_URL);
        const text = await res.text();
        allProducts = parseCSV(text).filter(p => p.brand);
        updateUI(); 
        refreshCatalog(); 
        renderCart();
        setTimeout(() => AOS.init({ duration: 800, once: true }), 200);
    } catch (e) { console.error("Data error", e); }
}

// Потужний парсер для 400+ рядків
function parseCSV(text) {
    let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
    for (l of text) {
        if ('"' === l) { if (s && l === p) row[r] += l; s = !s; } 
        else if (',' === l && s) l = row[++r] = '';
        else if ('\n' === l && s) { if ('\r' === p) row[r] = row[r].slice(0, -1); row = ret[++i] = [l = '']; r = 0; } 
        else row[r] += l;
        p = l;
    }
    const h = ret[0].map(v => v.trim());
    return ret.slice(1).map(r => {
        let o = {}; h.forEach((k, idx) => o[k] = r[idx] || "");
        return o;
    });
}

function refreshCatalog() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const area = document.getElementById('catalog-area');
    document.getElementById('catalog-filters').classList.toggle('hidden', currentFilter !== 'all');

    if (currentFilter === 'home' && q === '') {
        const banner = allProducts.find(p => p.brand === "BANNER");
        const hits = allProducts.filter(p => p.isbest?.toLowerCase() === 'yes');
        const news = allProducts.filter(p => p.isnew?.toLowerCase() === 'yes');
        area.innerHTML = `
            ${banner ? `<div class="mb-10 rounded-[28px] overflow-hidden shadow-sm"><img src="${banner.photo}" class="w-full object-cover"></div>` : ''}
            <div class="mb-12"><h2 class="text-[10px] font-black uppercase tracking-widest mb-6 opacity-40">${i18n[currentLang].hits_title}</h2><div class="scroll-x">${renderList(hits, true)}</div></div>
            <div class="mb-12"><h2 class="text-[10px] font-black uppercase tracking-widest mb-6 opacity-40">${i18n[currentLang].news_title}</h2><div class="scroll-x">${renderList(news, true)}</div></div>
        `;
    } else {
        const filtered = allProducts.filter(p => {
            if(p.brand === "BANNER") return false;
            const name = (currentLang === 'UA' ? (p.nameuk || p.name) : (p.namepl || p.name)).toLowerCase();
            const matchSearch = (p.brand.toLowerCase() + ' ' + name).includes(q);
            const matchCat = curCat === 'all' || p.category?.toLowerCase() === curCat;
            let matchFilter = true;
            if (currentFilter === 'hit') matchFilter = p.isbest?.toLowerCase() === 'yes';
            if (currentFilter === 'new') matchFilter = p.isnew?.toLowerCase() === 'yes';
            if (currentFilter === 'sale') matchFilter = !!(p.old2ml || p.oldfull);
            return matchSearch && matchCat && matchFilter;
        });
        area.innerHTML = `<div class="grid grid-cols-2 md:grid-cols-4 gap-4">${renderList(filtered, false)}</div>`;
    }
    AOS.refresh();
}

function renderList(list, isScroll) {
    return list.map(p => {
        const avail = (p.status || "").toLowerCase() !== 'out';
        const name = currentLang === 'UA' ? (p.nameuk || p.name) : (p.namepl || p.name);
        const price = p.price2ml || p.fullprice;
        const oldPrice = p.price2ml ? p.old2ml : p.oldfull;
        const hasDiscount = oldPrice && oldPrice !== '---' && oldPrice !== '';
        
        return `
            <div onclick="openModal(${allProducts.indexOf(p)})" class="${isScroll ? 'scroll-item' : ''} product-card p-4 flex flex-col h-full ${!avail ? 'out-of-stock' : ''}" data-aos="fade-up">
                <div class="img-container mb-3">
                    ${!avail ? `<div class="stock-badge">${i18n[currentLang].sold_badge}</div>` : ''}
                    <img src="${p.photo}" loading="lazy">
                </div>
                <div class="text-[7px] font-black text-[#C5A059] uppercase tracking-widest mb-1">${p.brand}</div>
                <div class="product-title">${name}</div>
                <div class="text-[10px] font-black mt-auto text-[#062C22]">
                    ${hasDiscount ? `<span class="price-new">${price} zł</span><span class="price-old">${oldPrice} zł</span>` : `<span>${price} zł</span>`}
                </div>
            </div>
        `;
    }).join('');
}

function openModal(idx) {
    const p = allProducts[idx]; selectedOption = null;
    const avail = (p.status || "").toLowerCase() !== 'out';
    const btn = document.getElementById('add-to-cart-btn');
    
    btn.classList.add('opacity-20', 'cursor-not-allowed');
    btn.innerText = avail ? i18n[currentLang].add_to_cart : i18n[currentLang].out_of_stock_btn;

    document.getElementById('m-img').src = p.photo;
    document.getElementById('m-brand').innerText = p.brand;
    document.getElementById('m-title').innerText = currentLang === 'UA' ? (p.nameuk || p.name) : (p.namepl || p.name);
    document.getElementById('m-desc').innerText = currentLang === 'UA' ? (p.descuk || i18n.UA.default_desc) : (p.descpl || i18n.PL.default_desc);
    
    let html = '';
    const sizes = [{l:'2ml', p:p.price2ml, o:p.old2ml}, {l:'5ml', p:p.price5ml, o:p.old5ml}, {l:'10ml', p:p.price10ml, o:p.old10ml}, {l:'Full', p:p.fullprice, o:p.oldfull}];
    sizes.forEach(s => {
        if(s.p && s.p !== '---') {
            html += `<div onclick="${avail ? `selectSize(this, '${s.l}', '${s.p}', '${p.brand}', '${currentLang === 'UA' ? (p.nameuk || p.name) : (p.namepl || p.name)}', '${p.photo}')` : ''}" 
                class="border border-neutral-100 flex justify-between p-4 rounded-xl ${avail ? 'cursor-pointer hover:bg-neutral-50' : 'opacity-40'} text-xs font-bold transition-all">
                <span>${s.l}</span><span>${s.p} zł</span>
            </div>`;
        }
    });
    document.getElementById('m-prices').innerHTML = html;
    document.getElementById('pModal').classList.remove('hidden');
    document.body.classList.add('lock-scroll');
}

function selectSize(el, size, price, brand, name, img) {
    document.querySelectorAll('#m-prices div').forEach(d => { d.style.borderColor = '#eee'; d.style.background = 'white'; });
    el.style.borderColor = '#C5A059'; el.style.background = '#fdfaf3';
    selectedOption = { size, price, brand, name, img };
    const btn = document.getElementById('add-to-cart-btn');
    btn.classList.remove('opacity-20', 'cursor-not-allowed');
    btn.innerText = `${i18n[currentLang].add_to_cart} • ${price} zł`;
}

function addToCart() {
    if(!selectedOption) return;
    cart.push(selectedOption);
    localStorage.setItem('ps_cart', JSON.stringify(cart));
    renderCart(); closeModal(); toggleCart(true);
}

function renderCart() {
    const c = document.getElementById('cart-items');
    document.getElementById('cart-count').innerText = cart.length;
    document.getElementById('cart-count').classList.toggle('hidden', cart.length === 0);
    let total = 0;
    if (cart.length === 0) {
        c.innerHTML = `<div class="text-center py-10 opacity-30 text-[9px] font-bold uppercase">${i18n[currentLang].empty_cart}</div>`;
    } else {
        c.innerHTML = cart.map((item, i) => {
            total += parseFloat(item.price);
            return `<div class="flex gap-4 items-center">
                <img src="${item.img}" class="w-12 h-12 rounded-lg object-contain bg-gray-50 p-1">
                <div class="flex-1"><div class="text-[10px] font-bold truncate">${item.name}</div><div class="text-[8px] text-neutral-400">${item.size} • ${item.price} zł</div></div>
                <button onclick="removeFromCart(${i})" class="text-neutral-300"><i class="fa-solid fa-xmark"></i></button>
            </div>`;
        }).join('');
    }
    document.getElementById('cart-total').innerText = total.toFixed(2) + ' zł';
}

function removeFromCart(i) { cart.splice(i, 1); localStorage.setItem('ps_cart', JSON.stringify(cart)); renderCart(); }
function sendOrder() {
    if (cart.length === 0) return;
    let t = `${i18n[currentLang].order_msg}!\n\n`;
    cart.forEach((it, i) => t += `${i+1}. ${it.brand} ${it.name} (${it.size}) - ${it.price} zł\n`);
    t += `\n💰 Разом: ${document.getElementById('cart-total').innerText}`;
    window.open(`https://t.me/${TG_NICK}?text=${encodeURIComponent(t)}`);
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('hidden'); document.body.classList.toggle('lock-scroll'); }
function toggleCart(st) { document.getElementById('cart-panel').classList.toggle('translate-x-full', !st); if(st === undefined) document.getElementById('cart-panel').classList.toggle('translate-x-full'); }
function closeModal() { document.getElementById('pModal').classList.add('hidden'); document.body.classList.remove('lock-scroll'); }
function setLang(l) { currentLang = l; document.querySelectorAll('.lang-node').forEach(b => b.classList.toggle('active', b.id === 'btn-'+l.toLowerCase())); updateUI(); refreshCatalog(); renderCart(); }
function updateUI() { document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = i18n[currentLang][el.getAttribute('data-i18n')]); document.querySelectorAll('[data-i18n-placeholder]').forEach(el => el.placeholder = i18n[currentLang][el.getAttribute('data-i18n-placeholder')]); }
function showAllCatalog() { currentFilter = 'all'; curCat = 'all'; updateCatButtons(); refreshCatalog(); }
function setCategory(c) { curCat = c; updateCatButtons(); refreshCatalog(); }
function updateCatButtons() { document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.toggle('active', btn.id === 'cat-' + curCat)); }
function filterBy(type) { currentFilter = type; refreshCatalog(); toggleSidebar(); }
function goHome() { currentFilter = 'home'; refreshCatalog(); }

document.getElementById('add-to-cart-btn').onclick = addToCart;
init();
</script>
</body>
</html>
