<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>perfume.shoppee • Lena</title>
    <style>
        :root {
            --gold: #d4af37; --gold-dark: #aa882c; --text: #1a1a1a; 
            --sub: #777; --bg: #ffffff; --card: #fcfcfc;
            --green: #28a745; /* Зелений для наявності */
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent;
            line-height: 1.5;
        }

        header { padding: 40px 20px 10px; text-align: center; }
        
        .lang-switch { display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; }
        .lang-switch button { 
            background: #f0f0f0; border: none; padding: 8px 18px; border-radius: 25px; 
            font-size: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; color: #888;
        }
        .lang-switch button.active { background: var(--gold); color: #fff; box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3); }

        .logo { font-size: 2.5em; font-weight: 900; letter-spacing: -1.5px; margin: 0; color: var(--gold-dark); text-transform: lowercase; }
        .subtitle { font-size: 14px; color: var(--sub); max-width: 300px; margin: 12px auto; font-weight: 400; }

        .controls { padding: 0 20px; max-width: 600px; margin: 0 auto; }
        #searchInput { 
            width: 100%; padding: 16px 24px; border-radius: 30px; border: 1px solid #eee; 
            font-size: 16px; box-sizing: border-box; outline: none; background: #f8f8f8; transition: 0.3s;
        }
        .filter-bar { display: flex; overflow-x: auto; gap: 10px; margin: 20px 0; padding-bottom: 5px; scrollbar-width: none; }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-btn { 
            flex: 0 0 auto; background: #fff; border: 1px solid #eee; padding: 10px 20px; 
            border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

        .section-title { 
            padding: 20px 20px 10px; font-size: 1.8em; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 1px; color: var(--text);
            max-width: 1100px; margin: 0 auto;
        }

        .product-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 15px; padding: 0 15px 80px; max-width: 1100px; margin: 0 auto;
        }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; } }

        .card { 
            background: var(--card); border-radius: 25px; padding: 15px; 
            text-align: center; border: 1px solid #f2f2f2; transition: 0.3s;
            display: flex; flex-direction: column; justify-content: space-between;
            position: relative;
        }
        .card:active { transform: scale(0.97); }
        
        .card-img { height: 150px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
        .card img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* БЕДЖ СТАТУСУ */
        .status-badge { position: absolute; top: 10px; right: 10px; font-size: 10px; background: #fff; padding: 4px 8px; border-radius: 10px; border: 1px solid #eee; font-weight: 800;}
        .status-badge.in-stock { color: var(--green); border-color: var(--green); } /* Зелений колір */

        .brand { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: #aaa; font-weight: 700; margin-bottom: 4px; }
        .title { font-size: 14px; font-weight: 700; margin: 0 0 8px; height: 2.6em; line-height: 1.3; overflow: hidden; }
        .price { color: var(--gold-dark); font-weight: 800; font-size: 15px; }

        /* МОДАЛКА */
        .modal { display: none; position: fixed; z-index: 2000; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); overflow-y: auto; }
        .modal-content { 
            background: #fff; width: 100%; max-width: 450px; margin: auto; position: relative; 
            border-radius: 35px; padding: 30px 25px; box-sizing: border-box; top: 50%; transform: translateY(-50%);
        }
        @media (max-width: 500px) {
            .modal-content { width: 90%; }
        }
        
        .close-bar { width: 40px; height: 5px; background: #ddd; border-radius: 10px; margin: -10px auto 20px; cursor: pointer; }
        .price-list { background: #f8f8f8; padding: 18px; border-radius: 20px; margin: 20px 0; font-size: 15px; text-align: left; }
        .price-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .price-row b { color: var(--gold-dark); }
        
        .btn-wrapper { display: flex; justify-content: center; width: 100%; margin-top: 10px; }
        .buy-btn { 
            display: inline-block; width: 100%; padding: 18px; background: #24A1DE; color: #fff; 
            text-align: center; border-radius: 22px; text-decoration: none; font-weight: 800; font-size: 16px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<header>
    <div class="lang-switch">
        <button id="btn-pl" onclick="setLang('pl')">PL</button>
        <button id="btn-uk" onclick="setLang('uk')" class="active">UA</button>
    </div>
    <h1 class="logo">perfume.shoppee</h1>
    <p class="subtitle" id="h-sub"></p>
</header>

<div class="controls">
    <input type="text" id="searchInput" onkeyup="filterProducts()">
    <div class="filter-bar" id="filterBar"></div>
</div>

<h2 class="section-title" id="cat-title">Каталог</h2>
<div class="product-grid" id="grid"></div>

<div id="pModal" class="modal" onclick="if(event.target == this) closeModal()">
    <div class="modal-content">
        <div class="close-bar" onclick="closeModal()"></div>
        <div style="text-align:center"><img id="m-img" style="max-height:200px; margin-bottom:20px;"></div>
        <div id="m-brand" class="brand"></div>
        <h2 id="m-title" style="margin:5px 0 10px; font-size: 22px; text-align: center;"></h2>
        <p id="m-desc" style="font-size:14px; color:#666; line-height:1.5; margin-bottom:20px; text-align: center;"></p>
        <div class="price-list" id="m-prices"></div>
        <div class="btn-wrapper">
            <a href="#" id="m-tg" class="buy-btn"></a>
        </div>
    </div>
</div>

<script>
    const SHEET_LINK = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQA6BrgyLNH6Jw3BOZKxMQ2X2MAJed7xT6CBepxG-c9D3qjKJJmPzwTPypMM3fxCLipzxHrq4exkdKS/pub?output=csv";
    const TELEGRAM_NICK = "elenafragrance";
    
    let allProducts = [];
    let curLang = 'uk';
    let curCat = 'all';

    const UI = {
        uk: { sub: "Твоя колекція ароматів. Оригінальна продукція.", search: "Пошук за брендом або назвою...", catalog: "Каталог", order: "Замовити у Telegram", from: "від", in: "В наявності", order_st: "Під замовлення", out: "Немає", cats: {all:"Усі", female:"Жіночі", male:"Чоловічі", uniseks:"Унісекс", set:"Набори"} },
        pl: { sub: "Twoja kolekcja zapachów. Oryginalne produkty.", search: "Szukaj według marki lub nazwy...", catalog: "Katalog", order: "Zamów na Telegramie", from: "od", in: "Dostępny", order_st: "Na zamówienie", out: "Brak", cats: {all:"Wszystkie", female:"Damskie", male:"Męskie", uniseks:"Unisex", set:"Zestawy"} }
    };

    async function init() {
        try {
            const response = await fetch(SHEET_LINK);
            const data = await response.text();
            allProducts = parseCSV(data);
            setLang('uk');
        } catch(e) { console.error("Помилка:", e); }
    }

    function parseCSV(csv) {
        const lines = csv.split('\n');
        const result = [];
        const headers = lines[0].split(',').map(h => h.trim().replace(/[\r\n]/g, ''));
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const obj = {};
            headers.forEach((header, index) => {
                let val = currentline[index] ? currentline[index].trim().replace(/^"|"$/g, '') : "";
                obj[header] = val;
            });
            result.push(obj);
        }
        return result;
    }

    // Функція для перевірки: посилання це чи назва файлу
    function getImgUrl(photoValue) {
        if (!photoValue) return 'img/placeholder.jpg'; // якщо пусто
        if (photoValue.startsWith('http')) return photoValue; // якщо це посилання
        return 'img/' + photoValue; // якщо просто назва файлу на GitHub
    }

    function setLang(l) {
        curLang = l;
        document.getElementById('btn-pl').className = (l === 'pl' ? 'active' : '');
        document.getElementById('btn-uk').className = (l === 'uk' ? 'active' : '');
        document.getElementById('h-sub').innerText = UI[l].sub;
        document.getElementById('cat-title').innerText = UI[l].catalog;
        document.getElementById('searchInput').placeholder = UI[l].search;
        renderFilters();
        filterProducts();
    }

    function renderFilters() {
        const bar = document.getElementById('filterBar');
        bar.innerHTML = Object.keys(UI[curLang].cats).map(key => `
            <button class="filter-btn ${curCat === key ? 'active' : ''}" onclick="setCategory('${key}')">${UI[curLang].cats[key]}</button>
        `).join('');
    }

    function setCategory(c) { curCat = c; renderFilters(); filterProducts(); }

    function filterProducts() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allProducts.filter(p => {
            const name = (curLang === 'uk' ? (p.nameUK || "") : (p.namePL || "")).toLowerCase();
            const brand = (p.brand || "").toLowerCase();
            let matchCat = (curCat === 'all' || p.category === curCat);
            if (curCat === 'female' && p.category === 'uniseks') matchCat = true;
            if (curCat === 'male' && p.category === 'uniseks') matchCat = true;
            return (brand.includes(q) || name.includes(q)) && matchCat;
        });
        renderGrid(filtered);
    }

    function renderGrid(data) {
        document.getElementById('grid').innerHTML = data.map(p => {
            let stText = UI[curLang].in;
            let stClass = "";
            if(p.status === 'order') stText = UI[curLang].order_st;
            else if(p.status === 'out') stText = UI[curLang].out;
            else if(p.status === 'in_stock') stClass = "in-stock";

            return `
            <div class="card" onclick='openModal(${JSON.stringify(p)})'>
                <div class="status-badge ${stClass}">${stText}</div>
                <div class="card-img"><img src="${getImgUrl(p.photo)}"></div>
                <div class="brand">${p.brand}</div>
                <div class="title">${curLang === 'uk' ? p.nameUK : p.namePL}</div>
                <div class="price">${UI[curLang].from} ${(p.price2ml || p.price10ml)} zł</div>
            </div>`;
        }).join('');
    }

    function openModal(p) {
        document.getElementById('m-img').src = getImgUrl(p.photo);
        document.getElementById('m-brand').innerText = p.brand;
        document.getElementById('m-title').innerText = curLang === 'uk' ? p.nameUK : p.namePL;
        document.getElementById('m-desc').innerText = curLang === 'uk' ? p.descUK : p.descPL;
        
        let pricesHTML = '';
        if(p.category === 'set') {
            pricesHTML = `<div class="price-row"><span>Набір</span><b>${p.price10ml} zł</b></div>`;
        } else {
            if(p.price2ml > 0) pricesHTML += `<div class="price-row"><span>2 ml</span><b>${p.price2ml} zł</b></div>`;
            if(p.price5ml > 0) pricesHTML += `<div class="price-row"><span>5 ml</span><b>${p.price5ml} zł</b></div>`;
            if(p.price10ml > 0) pricesHTML += `<div class="price-row"><span>10 ml</span><b>${p.price10ml} zł</b></div>`;
            if (p.fullPrice > 0) {
                pricesHTML += `<div class="price-row" style="margin-top:15px; border-top:1px solid #eee; padding-top:15px; font-weight:bold;"><span>Флакон (${p.fullVol})</span><b>${p.fullPrice} zł</b></div>`;
            }
        }
        
        document.getElementById('m-prices').innerHTML = pricesHTML;
        const btn = document.getElementById('m-tg');
        btn.innerText = UI[curLang].order;
        const msg = encodeURIComponent(`Доброго дня! Хочу замовити ${p.brand} ${p.nameUK}`);
        btn.href = `https://t.me/${TELEGRAM_NICK}?text=${msg}`;
        
        document.getElementById('pModal').style.display = "block";
        document.body.style.overflow = "hidden";
    }

    function closeModal() { document.getElementById('pModal').style.display = "none"; document.body.style.overflow = "auto"; }
    init();
</script>
</body>
</html>
