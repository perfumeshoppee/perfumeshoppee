<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>perfume.shoppee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; }
        body { font-family: system-ui, -apple-system, sans-serif; }
        .logo-font { font-family: Georgia, serif; letter-spacing: -1px; }
        .card { transition: all 0.3s; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .modal { animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50">

<!-- МОВА + ТЕМА (як у твоєму оригіналі) -->
<div class="bg-white border-b sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-2 flex justify-between items-center">
    <div class="flex gap-2">
      <button onclick="setLang('uk')" id="btn-uk" class="px-4 py-1 text-xs font-bold rounded-full border">UA</button>
      <button onclick="setLang('pl')" id="btn-pl" class="px-4 py-1 text-xs font-bold rounded-full border">PL</button>
    </div>
    <button onclick="toggleTheme()" id="themeBtn" class="text-xl">🌙</button>
  </div>
</div>

<!-- ШАПКА BROСARD-STYLE -->
<header class="bg-black text-white sticky top-12 z-40">
  <div class="max-w-7xl mx-auto">
    <div class="flex items-center justify-between px-4 py-4">
      <button class="text-3xl"><i class="fas fa-bars"></i></button>
      <div class="flex items-center gap-2">
        <span class="text-3xl font-bold logo-font">perfume.shoppee</span>
      </div>
      <div class="flex items-center gap-6">
        <i class="fas fa-heart text-2xl"></i>
        <i class="fas fa-balance-scale text-2xl"></i>
        <div class="relative">
          <i class="fas fa-shopping-bag text-2xl"></i>
          <span id="cart-count" class="absolute -top-1 -right-1 bg-teal-500 text-[10px] rounded-full w-4 h-4 flex items-center justify-center">0</span>
        </div>
      </div>
    </div>

    <!-- Пошук -->
    <div class="px-4 pb-4">
      <div class="relative">
        <input id="searchInput" type="text" onkeyup="refresh()" 
               class="w-full bg-white text-black rounded-3xl py-3 px-6 pl-12 text-base focus:outline-none"
               placeholder="Що ви шукаєте?">
        <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
      </div>
    </div>

    <!-- Фільтри Для неї / Для нього -->
    <div class="flex px-4 gap-3 pb-4">
      <button onclick="setCategory('female')" id="btn-female"
              class="flex-1 py-4 bg-white text-black rounded-3xl font-medium flex items-center justify-center gap-2">
        Для неї (<span id="count-female">0</span>)
      </button>
      <button onclick="setCategory('male')" id="btn-male"
              class="flex-1 py-4 bg-white text-black rounded-3xl font-medium flex items-center justify-center gap-2">
        Для нього (<span id="count-male">0</span>)
      </button>
    </div>
  </div>
</header>

<!-- Хлібні крихти + Заголовок -->
<div class="max-w-7xl mx-auto px-4 py-3 text-sm text-gray-500 flex items-center gap-2">
  <span>Головна</span> • <span class="text-teal-600 font-medium">Духи</span>
</div>
<div class="max-w-7xl mx-auto px-4">
  <h1 class="text-3xl font-bold">Духи</h1>
</div>

<!-- ДИНАМІЧНИЙ КОНТЕНТ (хіти, новинки, знижки) -->
<div id="dynamic-content" class="max-w-7xl mx-auto"></div>

<!-- ОСНОВНА СІТКА ТОВАРІВ -->
<div id="catalog-area" class="max-w-7xl mx-auto px-4 pb-12"></div>

<!-- МОДАЛКА -->
<div id="pModal" onclick="if(event.target===this)closeModal()" 
     class="modal hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999] p-4">
  <div onclick="event.stopImmediatePropagation()" 
       class="bg-white dark:bg-gray-900 w-full max-w-md rounded-3xl p-6 relative">
    <button onclick="closeModal()" class="absolute top-4 right-4 text-2xl">✕</button>
    
    <img id="m-img" class="w-full max-h-64 object-contain mx-auto mb-4" alt="">
    <div id="m-brand" class="uppercase text-xs tracking-widest text-gray-500"></div>
    <h2 id="m-title" class="text-2xl font-bold mt-1 mb-2"></h2>
    <div id="m-stock" class="inline-block text-xs font-bold px-3 py-1 rounded-2xl mb-4"></div>
    
    <p id="m-desc" class="text-sm text-gray-600 dark:text-gray-400 mb-6 leading-relaxed"></p>
    
    <div id="m-prices" class="space-y-3 mb-8"></div>
    
    <div class="grid grid-cols-2 gap-4">
      <a id="m-tg" href="#" target="_blank"
         class="bg-black text-white py-4 rounded-3xl text-center font-bold flex items-center justify-center gap-2">
        <i class="fab fa-telegram"></i> Telegram
      </a>
      <a id="m-inst" href="#" target="_blank"
         class="bg-gradient-to-r from-pink-500 to-yellow-400 text-white py-4 rounded-3xl text-center font-bold flex items-center justify-center gap-2">
        <i class="fab fa-instagram"></i> Instagram
      </a>
    </div>
  </div>
</div>

<script>
// === ТВОЇ ДАНІ ===
const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQA6BrgyLNH6Jw3BOZKxMQ2X2MAJed7xT6CBepxG-c9D3qjKJJmPzwTPypMM3fxCLipzxHrq4exkdKS/pub?output=csv';
const INSTA_URL = 'https://www.instagram.com/perfume.shoppee';
const TG_NICK = 'elenafragrance';

let allProducts = [];
let curLang = 'uk';
let curCat = 'all';

const UI = {
  uk: {
    sub: "Твоя колекція ароматів починається тут. Працюємо виключно з оригінальною продукцією.",
    search: "Що ви шукаєте?",
    female: "Для неї", male: "Для нього",
    from: "від", hits: "Хіти продажу", news: "Новинки", sales: "Знижки %", catalog: "Каталог",
    stock_in: "✓ В наявності", stock_out: "✕ Немає в наявності",
    sale_tag: "ЗНИЖКА"
  },
  pl: {
    sub: "Twoja kolekcja zapachów zaczyna się tutaj. Pracujemy wyłącznie z oryginalnymi produktami.",
    search: "Szukaj...",
    female: "Dla niej", male: "Dla niego",
    from: "od", hits: "Hity sprzedaży", news: "Nowości", sales: "Zniżki %", catalog: "Katalog",
    stock_in: "✓ Dostępny", stock_out: "✕ Brak w magazynie",
    sale_tag: "ZNIŻKA"
  }
};

function toggleTheme() {
  document.documentElement.classList.toggle('dark');
  document.getElementById('themeBtn').innerHTML = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
}

async function init() {
  try {
    const res = await fetch(SPREADSHEET_URL);
    const text = await res.text();
    allProducts = parseCSV(text);
    setLang('uk');
  } catch(e) { alert('Не вдалося завантажити товари 😔 Перевір посилання на таблицю'); }
}

function parseCSV(csv) { /* той самий надійний парсер як раніше */ 
  const rows = []; let cur = '', inQ = false, row = [];
  for (let i = 0; i < csv.length; i++) {
    let c = csv[i], n = csv[i+1];
    if (c === '"' && inQ && n === '"') { cur += '"'; i++; }
    else if (c === '"') inQ = !inQ;
    else if (c === ',' && !inQ) { row.push(cur); cur = ''; }
    else if ((c === '\n' || c === '\r') && !inQ) { 
      row.push(cur); rows.push(row); cur = ''; row = []; 
      if (c === '\r' && n === '\n') i++;
    } else cur += c;
  }
  if (cur || row.length) { row.push(cur); rows.push(row); }
  const headers = rows[0].map(v => v.trim());
  return rows.slice(1).map(r => {
    let o = {}; headers.forEach((k,i) => o[k] = r[i] ? r[i].trim() : ''); return o;
  });
}

function setLang(l) {
  curLang = l;
  document.getElementById('btn-uk').classList.toggle('bg-black', l==='uk');
  document.getElementById('btn-uk').classList.toggle('text-white', l==='uk');
  document.getElementById('btn-pl').classList.toggle('bg-black', l==='pl');
  document.getElementById('btn-pl').classList.toggle('text-white', l==='pl');
  refresh();
}

function setCategory(cat) {
  curCat = cat;
  document.getElementById('btn-female').classList.toggle('bg-teal-600', cat==='female');
  document.getElementById('btn-female').classList.toggle('text-white', cat==='female');
  document.getElementById('btn-male').classList.toggle('bg-teal-600', cat==='male');
  document.getElementById('btn-male').classList.toggle('text-white', cat==='male');
  refresh();
}

function refresh() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  
  let filtered = allProducts.filter(p => {
    const name = curLang === 'uk' ? p.nameUK : p.namePL;
    const matchSearch = (p.brand + ' ' + name).toLowerCase().includes(q);
    const matchCat = curCat === 'all' || p.category === curCat;
    return matchSearch && matchCat;
  });

  // Підрахунок для кнопок
  const femaleCount = allProducts.filter(p => p.category === 'female').length;
  const maleCount = allProducts.filter(p => p.category === 'male').length;
  document.getElementById('count-female').textContent = femaleCount;
  document.getElementById('count-male').textContent = maleCount;

  // Каруселі
  let html = '';
  if (curCat === 'all' && !q) {
    const hits = allProducts.filter(p => p.isBest?.toLowerCase() === 'yes');
    const news = allProducts.filter(p => p.isNew?.toLowerCase() === 'yes');
    const sales = allProducts.filter(p => p.old2ml || p.old5ml || p.old10ml || p.oldFull);

    if (hits.length) html += createSection(UI[curLang].hits, hits);
    if (news.length) html += createSection(UI[curLang].news, news);
    if (sales.length) html += createSection(UI[curLang].sales, sales, true);
  }

  document.getElementById('dynamic-content').innerHTML = html;

  // Основна сітка
  const gridHTML = filtered.map(p => getCard(p)).join('');
  document.getElementById('catalog-area').innerHTML = `
    <div class="grid grid-cols-2 gap-6">${gridHTML}</div>
  `;
}

function createSection(title, items, isSale = false) {
  return `
    <div class="px-4 py-6">
      <h2 class="uppercase text-sm font-bold tracking-widest mb-4 ${isSale ? 'text-red-600' : ''}">${title}</h2>
      <div class="flex overflow-x-auto gap-4 pb-4 scrollbar-hide">${items.map(p => getCard(p, true)).join('')}</div>
    </div>`;
}

function getCard(p, isCarousel = false) {
  const hasSale = !!(p.old2ml || p.old5ml || p.old10ml || p.oldFull);
  const inStock = p.status?.toLowerCase() !== 'out';
  const name = curLang === 'uk' ? p.nameUK : p.namePL;
  const price = p.price2ml || p.price10ml || '—';

  return `
    <div onclick="openModal(${JSON.stringify(p)})" class="bg-white rounded-3xl overflow-hidden shadow-sm min-w-[170px] ${isCarousel ? '' : 'card'}">
      ${hasSale ? `<div class="bg-red-600 text-white text-[10px] font-bold px-3 py-1 absolute m-3 rounded-2xl">${UI[curLang].sale_tag}</div>` : ''}
      <div class="h-44 flex items-center justify-center p-4 bg-gray-50">
        <img src="${p.photo}" class="max-h-full max-w-full object-contain">
      </div>
      <div class="p-4">
        <div class="text-xs text-gray-500">${p.brand}</div>
        <div class="font-semibold text-sm leading-tight mt-1 line-clamp-2">${name}</div>
        <div class="mt-4 flex justify-between items-baseline">
          <div class="text-lg font-bold text-teal-600">${price} zł</div>
          <div class="text-xs ${inStock ? 'text-emerald-600' : 'text-gray-400'}">
            ${inStock ? UI[curLang].stock_in : UI[curLang].stock_out}
          </div>
        </div>
      </div>
    </div>`;
}

function openModal(p) {
  const name = curLang === 'uk' ? p.nameUK : p.namePL;
  const inStock = p.status?.toLowerCase() !== 'out';
  
  document.getElementById('m-img').src = p.photo;
  document.getElementById('m-brand').textContent = p.brand;
  document.getElementById('m-title').textContent = name;
  document.getElementById('m-stock').innerHTML = `
    <span class="${inStock ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-200 text-gray-500'} px-4 py-1 rounded-3xl text-xs">
      ${inStock ? UI[curLang].stock_in : UI[curLang].stock_out}
    </span>`;
  document.getElementById('m-desc').textContent = curLang === 'uk' ? p.descUK : p.descPL;

  // Ціни
  let pricesHTML = '';
  const variants = [
    {l: '2 ml', v: p.price2ml, o: p.old2ml},
    {l: '5 ml', v: p.price5ml, o: p.old5ml},
    {l: '10 ml', v: p.price10ml, o: p.old10ml},
    {l: 'Флакон', v: p.fullPrice, o: p.oldFull}
  ];
  variants.forEach(s => {
    if (s.v && parseFloat(s.v) > 0) {
      pricesHTML += `
        <div class="flex justify-between items-center border-b pb-3 last:border-none last:pb-0">
          <span class="font-medium">${s.l}</span>
          <div class="text-right">
            ${s.o ? `<span class="line-through text-gray-400 text-sm mr-2">${s.o} zł</span>` : ''}
            <span class="font-bold ${s.o ? 'text-red-600' : 'text-teal-600'}">${s.v} zł</span>
          </div>
        </div>`;
    }
  });
  document.getElementById('m-prices').innerHTML = pricesHTML || '<p class="text-gray-400">Ціни оновлюються...</p>';

  document.getElementById('m-tg').href = `https://t.me/${TG_NICK}?text=Хочу%20замовити:%20${encodeURIComponent(p.brand + ' ' + name)}`;
  document.getElementById('m-inst').href = INSTA_URL;

  document.getElementById('pModal').classList.remove('hidden');
  document.getElementById('pModal').classList.add('flex');
}

function closeModal() {
  const modal = document.getElementById('pModal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
}

function setLang(l) { /* вже є вище */ curLang = l; refresh(); }

// Запуск
init();
</script>
</body>
</html>
