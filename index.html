<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>perfume.shoppee • Luxury Edition</title>
    <style>
        :root { 
            /* Темна тема (Default) */
            --bg: #0a0a0a;
            --card-bg: #161616;
            --text: #ffffff;
            --sub-text: #666666;
            --border: #222222;
            --search-bg: rgba(30, 30, 30, 0.9);
            
            --gold-gradient: linear-gradient(135deg, #fdfc47 0%, #bf9b30 50%, #fdfc47 100%);
            --gold-shine: linear-gradient(to right, #bf9b30 20%, #fdfc47 40%, #fdfc47 60%, #bf9b30 80%);
            --gold-text: #d4af37;
            --sale-red: #e74c3c;
        }

        /* Клас для Світлої теми */
        body.light-theme {
            --bg: #ffffff;
            --card-bg: #f9f9f9;
            --text: #1a1a1a;
            --sub-text: #999999;
            --border: #eeeeee;
            --search-bg: rgba(255, 255, 255, 0.9);
        }
        
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; -webkit-tap-highlight-color: transparent; line-height: 1.4; overflow-x: hidden; }
        
        .fade-in { animation: fadeIn 0.8s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        header { padding: 40px 20px 10px; text-align: center; position: relative; }
        
        /* КНОПКИ ЗВЕРХУ */
        .top-bar { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 25px; }
        .lang-switch { display: flex; gap: 8px; }
        .lang-switch button, .theme-toggle { background: var(--card-bg); border: 1px solid var(--border); padding: 10px 18px; border-radius: 25px; font-size: 11px; font-weight: 800; color: var(--sub-text); cursor: pointer; transition: 0.3s; }
        .lang-switch button.active { background: var(--gold-gradient); color: #000; border: none; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        .theme-toggle { font-size: 14px; padding: 8px 12px; }

        /* ЛОГОТИП */
        .logo { 
            font-size: 2.6em; font-weight: 900; letter-spacing: -2px; margin: 0; text-transform: lowercase; 
            background: var(--gold-shine); background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .subtitle { font-size: 11px; color: var(--sub-text); text-transform: uppercase; letter-spacing: 2px; margin: 8px auto 25px; }

        /* ПОШУК */
        .controls { padding: 0 15px; max-width: 600px; margin: 0 auto; position: sticky; top: 15px; z-index: 100; }
        #searchInput { width: 100%; padding: 16px 25px; border-radius: 35px; border: 1px solid var(--border); font-size: 16px; outline: none; background: var(--search-bg); backdrop-filter: blur(20px); color: var(--text); box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        /* ФІЛЬТРИ */
        .filter-section { padding: 25px 20px 10px; display: flex; justify-content: center; }
        .filter-toggle-btn { background: var(--gold-gradient); color: #000; border: none; padding: 12px 30px; border-radius: 25px; font-weight: 800; font-size: 14px; cursor: pointer; box-shadow: 0 5px 20px rgba(166, 124, 0, 0.3); }
        
        .filter-menu { display: none; padding: 10px 20px; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 10px; }
        .filter-menu.active { display: flex; animation: slideDown 0.3s ease; }
        
        .f-btn { background: var(--card-bg); border: 1px solid var(--border); padding: 10px 18px; border-radius: 18px; font-size: 12px; font-weight: 700; color: var(--sub-text); cursor: pointer; }
        .f-btn.active { background: var(--gold-gradient); color: #000; border: none; }

        /* ТОВАРИ */
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 15px 100px; }
        .card { background: var(--card-bg); border-radius: 25px; padding: 15px; text-align: center; border: 1px solid var(--border); position: relative; display: flex; flex-direction: column; min-height: 280px; transition: 0.3s; }
        .card-img { height: 130px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .card img { max-width: 90%; max-height: 90%; object-fit: contain; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2)); }
        
        .status-badge { position: absolute; top: 12px; right: 12px; font-size: 8px; background: rgba(0,0,0,0.1); color: var(--sub-text); padding: 4px 8px; border-radius: 10px; border: 1px solid var(--border); }
        .sale-badge { position: absolute; top: 12px; left: 12px; font-size: 9px; background: var(--sale-red); color: #fff; padding: 4px 10px; border-radius: 10px; font-weight: 900; }

        .brand { font-size: 10px; text-transform: uppercase; color: var(--sub-text); font-weight: 800; margin-top: auto; }
        .title { font-size: 14px; font-weight: 700; margin: 6px 0; color: var(--text); }
        .price { font-weight: 900; font-size: 16px; color: var(--gold-text); }

        /* МОДАЛКА */
        .modal { display: none; position: fixed; z-index: 3000; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); }
        .modal-content { background: var(--bg); width: 92%; max-width: 400px; margin: auto; position: relative; top: 50%; transform: translateY(-50%); border-radius: 35px; padding: 30px; box-sizing: border-box; text-align: center; border: 1px solid var(--border); color: var(--text); }
        #m-img { max-height: 180px; margin-bottom: 20px; }
        .price-list { background: var(--card-bg); padding: 18px; border-radius: 20px; margin: 20px 0; border: 1px solid var(--border); }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { padding: 16px; border-radius: 20px; text-decoration: none; font-weight: 800; font-size: 13px; transition: 0.3s; }
        .btn-tg { background: var(--border); color: var(--text); }
        .btn-inst { background: var(--gold-gradient); color: #000; }
    </style>
</head>
<body>

<header>
    <div class="top-bar">
        <div class="lang-switch">
            <button id="btn-pl" onclick="setLang('pl')">PL</button>
            <button id="btn-uk" onclick="setLang('uk')" class="active">UA</button>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>
    <h1 class="logo">perfume.shoppee</h1>
    <p class="subtitle" id="h-sub"></p>
</header>

<div class="controls">
    <input type="text" id="searchInput" onkeyup="filterProducts()">
</div>

<div id="home-carousels"></div>

<div class="filter-section">
    <button class="filter-toggle-btn" onclick="toggleFilterMenu()" id="filter-label">Фільтри ↓</button>
</div>

<div class="filter-menu" id="filterMenu"></div>

<div id="main-content">
    <div class="product-grid" id="productGrid"></div>
</div>

<div id="pModal" class="modal" onclick="if(event.target == this) closeModal()">
    <div class="modal-content">
        <img id="m-img" src="">
        <div id="m-brand" class="brand"></div>
        <h2 id="m-title" style="margin:8px 0 5px;"></h2>
        <p id="m-desc" style="font-size:13px; margin-bottom:20px;"></p>
        <div class="price-list" id="m-prices"></div>
        <div class="btn-group">
            <a href="#" id="m-tg" class="btn btn-tg">Telegram</a>
            <a href="#" id="m-inst" target="_blank" class="btn btn-inst">Instagram</a>
        </div>
    </div>
</div>

<script>
    const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQA6BrgyLNH6Jw3BOZKxMQ2X2MAJed7xT6CBepxG-c9D3qjKJJmPzwTPypMM3fxCLipzxHrq4exkdKS/pub?output=csv'; 
    const INSTA_URL = 'https://www.instagram.com/perfume.shoppee?igsh=MWdya2RqbHpweW5vbQ==';
    const TG_NICK = "elenafragrance";

    let allProducts = [];
    let curLang = 'uk';
    let curCat = 'all';

    const UI = {
        uk: { sub: "Оригінальна парфумерія • Luxury Collection", search: "Пошук бренду...", from: "від", in: "В наявності", order: "Замовлення", out: "Немає", hits: "Хіти", news: "Новинки", catalog: "Каталог", filter: "Фільтри ↓", sale_tag: "АКЦІЯ", cats: {all: "Усі", sale: "Акції %", female: "Жіночі", male: "Чоловічі", uniseks: "Унісекс", set: "Набори"} },
        pl: { sub: "Oryginalne perfumy • Luxury Collection", search: "Szukaj...", from: "od", in: "Dostępny", order: "Na zamówienie", out: "Brak", hits: "Hity", news: "Nowości", catalog: "Katalog", filter: "Filtry ↓", sale_tag: "PROMOCJA", cats: {all: "Wszystkie", sale: "Promocje %", female: "Damskie", male: "Męskie", uniseks: "Unisex", set: "Zestawy"} }
    };

    // ТЕМА
    function toggleTheme() {
        const body = document.body;
        body.classList.toggle('light-theme');
        const isLight = body.classList.contains('light-theme');
        document.getElementById('themeBtn').innerText = isLight ? '☀️' : '🌙';
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }

    // Завантаження теми
    if(localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-theme');
        document.getElementById('themeBtn').innerText = '☀️';
    }

    async function init() {
        try {
            const response = await fetch(SPREADSHEET_URL);
            const text = await response.text();
            allProducts = parseCSV(text);
            setLang('uk');
        } catch(e) { console.error("Load error"); }
    }

    function parseCSV(csv) {
        const lines = csv.split('\n');
        const headers = lines[0].split(',').map(h => h.trim());
        let result = [];
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i]) continue;
            const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^2]*$)/); 
            const obj = {};
            headers.forEach((header, index) => {
                obj[header] = currentline[index] ? currentline[index].trim().replace(/^"|"$/g, '') : "";
            });
            result.push(obj);
        }
        return result.sort((a, b) => (a.brand || "").localeCompare(b.brand || ""));
    }

    function setLang(l) {
        curLang = l;
        document.querySelectorAll('.lang-switch button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + l).classList.add('active');
        document.getElementById('h-sub').innerText = UI[l].sub;
        document.getElementById('searchInput').placeholder = UI[l].search;
        document.getElementById('filter-label').innerText = UI[l].filter;
        renderFilterMenu();
        refreshDisplay();
    }

    function renderFilterMenu() {
        document.getElementById('filterMenu').innerHTML = Object.keys(UI[curLang].cats).map(key => `
            <button class="f-btn ${curCat === key ? 'active' : ''}" onclick="setCategory('${key}')">${UI[curLang].cats[key]}</button>
        `).join('');
    }

    function toggleFilterMenu() { document.getElementById('filterMenu').classList.toggle('active'); }

    function setCategory(c) {
        curCat = c;
        renderFilterMenu();
        refreshDisplay();
        if(c !== 'all') document.getElementById('filterMenu').classList.remove('active');
    }

    function refreshDisplay() {
        const hits = allProducts.filter(p => p.isBest?.toLowerCase() === 'yes');
        const news = allProducts.filter(p => p.isNew?.toLowerCase() === 'yes');
        let html = '';
        if(curCat === 'all') {
            if(hits.length) html += `<div class="section-header fade-in"><h2 style="color:var(--sub-text); font-size:14px; letter-spacing:2px; text-transform:uppercase;">${UI[curLang].hits}</h2></div><div class="carousel fade-in">${hits.map(p => getCardHTML(p)).join('')}</div>`;
            if(news.length) html += `<div class="section-header fade-in"><h2 style="color:var(--sub-text); font-size:14px; letter-spacing:2px; text-transform:uppercase;">${UI[curLang].news}</h2></div><div class="carousel fade-in">${news.map(p => getCardHTML(p)).join('')}</div>`;
        }
        document.getElementById('home-carousels').innerHTML = html;
        filterProducts();
    }

    function filterProducts() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allProducts.filter(p => {
            const matchSearch = (p.brand + (curLang==='uk'?p.nameUK:p.namePL)).toLowerCase().includes(q);
            let matchCat = (curCat === 'all' || p.category === curCat);
            if(curCat === 'sale') matchCat = (p.old2ml || p.old5ml || p.old10ml || p.oldFull);
            return matchSearch && matchCat;
        });
        document.getElementById('productGrid').innerHTML = filtered.map((p, i) => getCardHTML(p, i)).join('');
    }

    function getCardHTML(p, index = 0) {
        const imgPath = p.photo.includes('http') ? p.photo : 'img/' + p.photo;
        const hasSale = (p.old2ml || p.old5ml || p.old10ml || p.oldFull);
        return `
            <div class="card fade-in" style="animation-delay: ${index * 0.05}s" onclick='openModal(${JSON.stringify(p)})'>
                ${hasSale ? `<div class="sale-badge">${UI[curLang].sale_tag}</div>` : ''}
                <div class="card-img"><img src="${imgPath}"></div>
                <div class="brand">${p.brand}</div>
                <div class="title">${curLang === 'uk' ? p.nameUK : p.namePL}</div>
                <div class="price">${UI[curLang].from} ${p.price2ml || p.price10ml} zł</div>
            </div>`;
    }

    function openModal(p) {
        const imgPath = p.photo.includes('http') ? p.photo : 'img/' + p.photo;
        const name = curLang === 'uk' ? p.nameUK : p.namePL;
        document.getElementById('m-img').src = imgPath;
        document.getElementById('m-brand').innerText = p.brand;
        document.getElementById('m-title').innerText = name;
        document.getElementById('m-desc').innerText = curLang === 'uk' ? p.descUK : p.descPL;
        
        let pr = '';
        const sizes = [
            {v: '2 ml', p: p.price2ml, o: p.old2ml},
            {v: '5 ml', p: p.price5ml, o: p.old5ml},
            {v: '10 ml', p: p.price10ml, o: p.old10ml},
            {v: `Full Bottle`, p: p.fullPrice, o: p.oldFull}
        ];
        sizes.forEach(s => {
            if(parseFloat(s.p) > 0) {
                pr += `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span style="color:var(--sub-text)">${s.v}</span>
                    <div>
                        ${s.o ? `<span style="text-decoration:line-through; color:var(--sub-text); margin-right:8px; font-size:12px;">${s.o} zł</span>` : ''}
                        <span style="color:${s.o?'#e74c3c':'var(--gold-text)'}; font-weight:900;">${s.p} zł</span>
                    </div>
                </div>`;
            }
        });
        document.getElementById('m-prices').innerHTML = pr;
        document.getElementById('m-tg').href = `https://t.me/${TG_NICK}?text=Замовлення: ${p.brand} ${name}`;
        document.getElementById('m-inst').href = INSTA_URL;
        document.getElementById('pModal').style.display = "block";
    }

    function closeModal() { document.getElementById('pModal').style.display = "none"; }
    init();
</script>
</body>
</html>
