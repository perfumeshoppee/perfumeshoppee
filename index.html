<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>perfume.shoppee — Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body.lock-scroll { overflow: hidden; }
        .logo-font { font-family: Georgia, serif; letter-spacing: -1px; }
        #sidebar { transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #sidebar.open { transform: translateX(0); }
        .overlay { display: none; background: rgba(0,0,0,0.6); position: fixed; inset: 0; z-index: 1001; backdrop-filter: blur(4px); }
        .overlay.show { display: block; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-lang { border-color: #14b8a6 !important; color: #14b8a6 !important; opacity: 1 !important; }
        .card-anim { animation: fadeInUp 0.3s ease forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F8F9FA] dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors">

<div class="bg-white dark:bg-gray-900 border-b sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
    <button onclick="toggleSidebar()" class="text-2xl p-1"><i class="fas fa-bars"></i></button>
    <span onclick="goHome()" class="text-2xl font-bold logo-font cursor-pointer">perfume.shoppee</span>
    <button onclick="toggleCart()" class="relative p-1">
        <i class="fas fa-shopping-bag text-2xl"></i>
        <span id="cart-count" class="absolute -top-1 -right-1 bg-teal-500 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center hidden">0</span>
    </button>
  </div>
</div>

<header id="main-header-bar" class="bg-black text-white p-4">
  <div class="max-w-7xl mx-auto">
    <div class="relative mb-5">
        <input id="searchInput" type="text" onkeyup="refreshCatalog()" 
               class="w-full bg-white text-black rounded-2xl py-3.5 px-6 pl-12 text-base outline-none" placeholder="...">
        <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
    </div>
    
    <div id="category-panel" class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
      <button onclick="setCategory('all')" id="cat-all" class="cat-btn px-5 py-2.5 bg-white/20 rounded-xl text-xs font-bold whitespace-nowrap">УСІ</button>
      <button onclick="setCategory('female')" id="cat-female" class="cat-btn px-5 py-2.5 bg-white/10 rounded-xl text-xs font-bold whitespace-nowrap">ДЛЯ НЕЇ</button>
      <button onclick="setCategory('male')" id="cat-male" class="cat-btn px-5 py-2.5 bg-white/10 rounded-xl text-xs font-bold whitespace-nowrap">ДЛЯ НЬОГО</button>
      <button onclick="setCategory('unisex')" id="cat-unisex" class="cat-btn px-5 py-2.5 bg-white/10 rounded-xl text-xs font-bold whitespace-nowrap">УНІСЕКС</button>
      <button onclick="setCategory('set')" id="cat-set" class="cat-btn px-5 py-2.5 bg-white/10 rounded-xl text-xs font-bold whitespace-nowrap border border-teal-500/30">НАБОРИ</button>
    </div>
  </div>
</header>

<div id="sort-bar" class="max-w-7xl mx-auto px-4 py-2 flex justify-end gap-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">
    <button onclick="setSort('cheap')" id="sort-cheap">ДЕШЕВШІ</button>
    <button onclick="setSort('expensive')" id="sort-expensive">ДОРОЖЧІ</button>
</div>

<div id="overlay" onclick="toggleSidebar()" class="overlay"></div>
<div id="sidebar" class="fixed top-0 left-0 h-full w-[85%] max-w-[320px] bg-white dark:bg-gray-900 z-[1002] shadow-2xl flex flex-col">
  <div class="bg-[#1a1a1a] text-white p-5 flex justify-between items-center">
    <div class="flex items-center gap-3"><i class="fas fa-circle-user text-2xl text-teal-400"></i><span id="side-login" class="font-bold uppercase tracking-tight">Вхід</span></div>
    <div class="flex items-center gap-4">
        <button onclick="toggleTheme()" class="text-xl">🌙</button>
        <button onclick="toggleSidebar()" class="text-xl">✕</button>
    </div>
  </div>
  <div class="flex-1 overflow-y-auto p-6">
    <div class="flex gap-4 mb-8">
        <button onclick="setLang('uk')" id="btn-lang-uk" class="flex-1 py-2 rounded-lg border-2 border-gray-100 font-bold text-xs">UA</button>
        <button onclick="setLang('pl')" id="btn-lang-pl" class="flex-1 py-2 rounded-lg border-2 border-gray-100 font-bold text-xs">PL</button>
    </div>
    <nav class="space-y-1">
        <a href="#" onclick="goHome(); toggleSidebar(); return false;" class="flex items-center gap-4 py-4 border-b dark:border-gray-800 font-bold"><i class="fas fa-house text-teal-500 w-5"></i> <span id="nav-home">Головна</span></a>
        <a href="#" onclick="showBrandList(); toggleSidebar(); return false;" class="flex items-center gap-4 py-4 border-b dark:border-gray-800 font-bold"><i class="fas fa-tag text-teal-500 w-5"></i> <span id="nav-brands">Бренди</span></a>
        <a href="#" onclick="filterBy('new'); toggleSidebar(); return false;" class="flex items-center gap-4 py-4 border-b dark:border-gray-800 font-bold"><i class="fas fa-star text-teal-500 w-5"></i> <span id="nav-news">Новинки</span></a>
        <a href="#" onclick="filterBy('hit'); toggleSidebar(); return false;" class="flex items-center gap-4 py-4 border-b dark:border-gray-800 font-bold text-orange-500"><i class="fas fa-fire w-5"></i> <span id="nav-hits">Хіти</span></a>
        <a href="#" onclick="setCategory('set'); toggleSidebar(); return false;" class="flex items-center gap-4 py-4 border-b dark:border-gray-800 font-bold"><i class="fas fa-box-open text-teal-500 w-5"></i> <span id="nav-sets">Набори</span></a>
        <a href="#" onclick="filterBy('sale'); toggleSidebar(); return false;" class="flex items-center gap-4 py-4 border-b dark:border-gray-800 font-bold text-red-500"><i class="fas fa-percent w-5"></i> <span id="nav-sales">Акції</span></a>
    </nav>
  </div>
</div>

<main class="max-w-7xl mx-auto pb-24">
    <div id="page-header" class="px-4 py-6">
        <h1 id="page-title" class="text-2xl font-black italic">Каталог</h1>
        <p id="page-subtitle" class="text-gray-400 text-xs mt-1">Оригінальна продукція</p>
    </div>
    <div id="catalog-area" class="px-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
</main>

<div id="cart-panel" class="fixed top-0 right-0 h-full w-full max-w-md bg-white dark:bg-gray-900 z-[10000] shadow-2xl transform translate-x-full transition-transform duration-300 flex flex-col">
    <div class="p-5 border-b flex justify-between items-center bg-gray-50 dark:bg-gray-800">
        <h2 id="cart-title" class="text-xl font-black uppercase tracking-tighter">Кошик</h2>
        <button onclick="toggleCart()" class="text-2xl">✕</button>
    </div>
    <div id="cart-items" class="flex-1 overflow-y-auto p-5 space-y-4"></div>
    <div class="p-6 border-t dark:border-gray-800">
        <div class="flex justify-between items-center mb-6">
            <span id="cart-total-label" class="text-gray-400 font-bold">РАЗОМ:</span>
            <span id="cart-total" class="text-2xl font-black text-teal-600">0 zł</span>
        </div>
        <button onclick="sendOrder()" id="cart-send-btn" class="w-full bg-black text-white py-5 rounded-2xl font-black flex items-center justify-center gap-3 uppercase">Замовити</button>
    </div>
</div>

<div id="pModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999] p-4 backdrop-blur-sm" onclick="closeModal()">
  <div class="bg-white dark:bg-gray-900 w-full max-w-md rounded-[40px] p-8 relative max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
    <button onclick="closeModal()" class="absolute top-6 right-6 text-2xl text-gray-300">✕</button>
    <img id="m-img" class="w-44 h-44 mx-auto object-contain mb-4 rounded-2xl" src="">
    <div id="m-brand" class="text-center text-[10px] font-black text-teal-500 uppercase tracking-widest mb-1"></div>
    <h2 id="m-title" class="text-center text-2xl font-black mb-4 tracking-tight leading-tight px-4"></h2>
    <p id="m-desc" class="text-center text-sm text-gray-500 dark:text-gray-400 mb-6 leading-relaxed italic px-2"></p>
    <div id="m-prices" class="space-y-2 mb-8"></div>
    <button id="add-to-cart-btn" class="w-full bg-teal-500 text-white py-5 rounded-2xl font-black shadow-lg uppercase">Додати</button>
  </div>
</div>

<script>
const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQA6BrgyLNH6Jw3BOZKxMQ2X2MAJed7xT6CBepxG-c9D3qjKJJmPzwTPypMM3fxCLipzxHrq4exkdKS/pub?output=csv';
const TG_NICK = 'elenafragrance';

const langData = {
    uk: {
        search: "Шукайте аромат...", home: "Головна", brands: "Бренди", new: "Новинки", hit: "Хіти", sets: "Набори", sale: "Акції",
        all: "УСІ", female: "ДЛЯ НЕЇ", male: "ДЛЯ НЬОГО", unisex: "УНІСЕКС", set: "НАБОРИ",
        sort_cheap: "ДЕШЕВШІ", sort_exp: "ДОРОЖЧІ", login: "ВХІД", catalog: "Каталог парфумів", subtitle: "Тільки оригінальна продукція",
        cart: "МІЙ КОШИК", total: "РАЗОМ", send: "ОФОРМИТИ В TELEGRAM", add: "ДОДАТИ В КОШИК", empty: "Кошик порожній"
    },
    pl: {
        search: "Szukaj...", home: "Główna", brands: "Marki", new: "Nowości", hit: "Hity", sets: "Zestawy", sale: "Promocje",
        all: "WSZYSTKO", female: "DLA NIEJ", male: "DLA NIEGO", unisex: "UNISEX", set: "ZESTAWY",
        sort_cheap: "NAJTAŃSZE", sort_exp: "NAJDROŻSZE", login: "ZALOGUJ", catalog: "Katalog perfum", subtitle: "Oryginalne produkty",
        cart: "MÓJ KOSZYK", total: "RAZEM", send: "ZAMÓW PRZEZ TELEGRAM", add: "DODAJ DO KOSZYKA", empty: "Koszyk jest pusty"
    }
};

let allProducts = [];
let cart = JSON.parse(localStorage.getItem('ps_cart')) || [];
let curLang = localStorage.getItem('ps_lang') || 'uk';
let curCat = 'all';
let curSort = 'none';
let currentFilter = 'all'; 

async function init() {
    try {
        const res = await fetch(SPREADSHEET_URL);
        const text = await res.text();
        allProducts = parseCSV(text);
        allProducts.sort((a, b) => a.brand.localeCompare(b.brand));
        setLang(curLang);
        renderCart();
    } catch (e) { console.error(e); }
}

function parseCSV(text) {
    let rows = [], row = [], col = '', q = false;
    for (let i = 0; i < text.length; i++) {
        let c = text[i], n = text[i+1];
        if (c === '"' && q && n === '"') { col += '"'; i++; }
        else if (c === '"') q = !q;
        else if (c === ',' && !q) { row.push(col.trim()); col = ''; }
        else if ((c === '\r' || c === '\n') && !q) {
            if (col || row.length) { row.push(col.trim()); rows.push(row); }
            row = []; col = ''; if (c === '\r' && n === '\n') i++;
        } else col += c;
    }
    if (col || row.length) { row.push(col.trim()); rows.push(row); }
    const h = rows[0];
    return rows.slice(1).map(r => {
        let o = {}; h.forEach((k, i) => o[k] = r[i] || "");
        return o;
    });
}

function setLang(l) {
    curLang = l; localStorage.setItem('ps_lang', l);
    const t = langData[l];
    document.getElementById('searchInput').placeholder = t.search;
    document.getElementById('nav-home').innerText = t.home;
    document.getElementById('nav-brands').innerText = t.brands;
    document.getElementById('nav-news').innerText = t.new;
    document.getElementById('nav-hits').innerText = t.hit;
    document.getElementById('nav-sets').innerText = t.sets;
    document.getElementById('nav-sales').innerText = t.sale;
    document.getElementById('cat-all').innerText = t.all;
    document.getElementById('cat-female').innerText = t.female;
    document.getElementById('cat-male').innerText = t.male;
    document.getElementById('cat-unisex').innerText = t.unisex;
    document.getElementById('cat-set').innerText = t.set;
    document.getElementById('sort-cheap').innerText = t.sort_cheap;
    document.getElementById('sort-expensive').innerText = t.sort_exp;
    document.getElementById('side-login').innerText = t.login;
    document.getElementById('page-title').innerText = t.catalog;
    document.getElementById('page-subtitle').innerText = t.subtitle;
    document.getElementById('cart-title').innerText = t.cart;
    document.getElementById('cart-total-label').innerText = t.total;
    document.getElementById('cart-send-btn').innerText = t.send;
    document.getElementById('add-to-cart-btn').innerText = t.add;
    document.getElementById('btn-lang-uk').className = `flex-1 py-2 rounded-lg border-2 font-bold text-xs ${l==='uk'?'active-lang':'opacity-50 border-gray-100'}`;
    document.getElementById('btn-lang-pl').className = `flex-1 py-2 rounded-lg border-2 font-bold text-xs ${l==='pl'?'active-lang':'opacity-50 border-gray-100'}`;
    refreshCatalog();
}

function filterBy(type, brandName = null) {
    currentFilter = type;
    if (brandName) curCat = brandName;
    document.getElementById('page-title').innerText = brandName || langData[curLang][type] || langData[curLang].catalog;
    
    // ХОВАЄМО ПАНЕЛЬ КАТЕГОРІЙ ДЛЯ БРЕНДІВ І СПЕЦ-ФІЛЬТРІВ
    const catPanel = document.getElementById('category-panel');
    if(type === 'brand' || type === 'new' || type === 'hit' || type === 'sale') {
        catPanel.classList.add('hidden');
    } else {
        catPanel.classList.remove('hidden');
    }
    
    refreshCatalog();
}

function showBrandList() {
    const brands = [...new Set(allProducts.map(p => p.brand))].sort();
    const area = document.getElementById('catalog-area');
    area.className = "px-4 space-y-2";
    area.innerHTML = brands.map(b => `
        <button onclick="filterBy('brand', '${b}');" class="w-full text-left p-4 bg-white dark:bg-gray-900 rounded-2xl font-bold shadow-sm flex justify-between items-center active:scale-95 transition-all">
            ${b} <i class="fas fa-chevron-right text-teal-500 text-xs"></i>
        </button>
    `).join('');
    document.getElementById('page-title').innerText = langData[curLang].brands;
    document.getElementById('category-panel').classList.add('hidden');
}

function refreshCatalog() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const area = document.getElementById('catalog-area');
    if (area.className.includes("space-y-2")) area.className = "px-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4";
    
    let filtered = allProducts.filter(p => {
        const name = curLang === 'uk' ? (p.nameUK || p.name) : (p.namePL || p.name);
        const matchSearch = (p.brand + ' ' + name).toLowerCase().includes(q);
        const catValue = p.category.toLowerCase().trim();
        
        let matchSpecial = true;
        if (currentFilter === 'new') matchSpecial = p.isNew?.toLowerCase() === 'yes';
        if (currentFilter === 'hit') matchSpecial = p.isHit?.toLowerCase() === 'yes';
        if (currentFilter === 'sale') matchSpecial = !!(p.old2ml || p.oldFull || p.old5ml || p.old10ml);
        if (currentFilter === 'brand') matchSpecial = p.brand === curCat;

        const isUnisex = (curCat === 'unisex') && (catValue === 'unisex' || catValue === 'uniseks');
        const matchCat = (curCat === 'all' || currentFilter === 'brand' || currentFilter === 'new' || currentFilter === 'hit' || currentFilter === 'sale') || isUnisex || (catValue === curCat);
        
        return matchSearch && matchCat && matchSpecial;
    });

    if (curSort === 'cheap') filtered.sort((a,b) => parseFloat(a.price2ml || a.fullPrice) - parseFloat(b.price2ml || b.fullPrice));
    if (curSort === 'expensive') filtered.sort((a,b) => parseFloat(b.price2ml || b.fullPrice) - parseFloat(a.price2ml || a.fullPrice));

    area.innerHTML = filtered.map((p, i) => `
    <div onclick="openModal(${allProducts.indexOf(p)})" class="card-anim bg-white dark:bg-gray-900 rounded-[24px] p-3 border border-transparent hover:border-teal-500 transition-all cursor-pointer relative" style="animation-delay: ${i*0.02}s">
        <div class="aspect-square mb-3 bg-gray-50 dark:bg-gray-800 rounded-2xl flex items-center justify-center p-3"><img src="${p.photo}" class="max-h-full object-contain" loading="lazy"></div>
        <div class="text-[9px] text-teal-500 font-black uppercase tracking-widest">${p.brand}</div>
        <div class="text-[11px] font-bold truncate dark:text-white">${curLang === 'uk' ? (p.nameUK || p.name) : (p.namePL || p.name)}</div>
        <div class="mt-2 flex justify-between items-center">
            <div class="text-sm font-black">${p.price2ml || p.fullPrice} zł</div>
            <div class="w-7 h-7 bg-black text-white rounded-full flex items-center justify-center text-[10px]"><i class="fas fa-plus"></i></div>
        </div>
    </div>`).join('');
}

let sel = null;
function openModal(idx) {
    const p = allProducts[idx]; sel = null;
    const name = curLang === 'uk' ? (p.nameUK || p.name) : (p.namePL || p.name);
    const desc = curLang === 'uk' ? (p.descUK || p.desc) : (p.descPL || p.desc);
    document.getElementById('m-img').src = p.photo;
    document.getElementById('m-brand').innerText = p.brand;
    document.getElementById('m-title').innerText = name;
    document.getElementById('m-desc').innerText = desc || "";
    let html = '';
    [{l:'2ml', p:p.price2ml}, {l:'5ml', p:p.price5ml}, {l:'10ml', p:p.price10ml}, {l:'Full', p:p.fullPrice}].forEach(o => {
        if(o.p && o.p !== '---') {
            html += `<div onclick="selectOpt(this, '${o.l}', '${o.p}', '${p.brand}', '${name}', '${p.photo}')" class="flex justify-between p-4 border-2 border-gray-100 dark:border-gray-800 rounded-2xl cursor-pointer hover:border-teal-500 transition-all">
                <span class="font-bold">${o.l}</span><span class="font-black text-teal-600">${o.p} zł</span>
            </div>`;
        }
    });
    document.getElementById('m-prices').innerHTML = html;
    document.getElementById('pModal').classList.remove('hidden');
    document.body.classList.add('lock-scroll');
}

function selectOpt(el, size, price, brand, name, img) {
    document.querySelectorAll('#m-prices div').forEach(d => d.classList.remove('border-teal-500', 'bg-teal-50'));
    el.classList.add('border-teal-500', 'bg-teal-50');
    sel = { size, price, brand, name, img, id: Date.now() };
}

function addToCart() {
    if(!sel) return alert(curLang === 'uk' ? "Оберіть об'єм!" : "Wybierz pojemność!");
    cart.push(sel); saveCart(); renderCart(); closeModal(); toggleCart(true);
}

function renderCart() {
    const c = document.getElementById('cart-items');
    const b = document.getElementById('cart-count');
    b.innerText = cart.length; b.classList.toggle('hidden', cart.length === 0);
    let total = 0;
    c.innerHTML = cart.map((item, i) => {
        total += parseFloat(item.price);
        return `<div class="flex gap-4 bg-gray-50 dark:bg-gray-800 p-3 rounded-2xl relative">
            <img src="${item.img}" class="w-16 h-16 object-contain bg-white rounded-lg">
            <div class="flex-1">
                <div class="text-[9px] font-black text-teal-500 uppercase">${item.brand}</div>
                <div class="text-xs font-bold leading-tight">${item.name}</div>
                <div class="flex justify-between items-center mt-1"><span class="text-[10px] text-gray-400">${item.size}</span><span class="font-black text-sm">${item.price} zł</span></div>
            </div>
            <button onclick="removeFromCart(${i})" class="absolute -top-2 -right-2 bg-white shadow-md w-6 h-6 rounded-full text-[10px]">✕</button>
        </div>`;
    }).join('');
    document.getElementById('cart-total').innerText = total.toFixed(2) + ' zł';
}

function sendOrder() {
    if (cart.length === 0) return alert(langData[curLang].empty);
    let t = curLang === 'uk' ? "👋 Нове замовлення!\n\n" : "👋 Nowe zamówienie!\n\n";
    cart.forEach((it, i) => t += `${i+1}. ${it.brand} ${it.name} (${it.size}) - ${it.price} zł\n`);
    t += `\n💰 ${langData[curLang].total}: ${document.getElementById('cart-total').innerText}`;
    window.open(`https://t.me/${TG_NICK}?text=${encodeURIComponent(t)}`, '_blank');
}

function saveCart() { localStorage.setItem('ps_cart', JSON.stringify(cart)); }
function removeFromCart(i) { cart.splice(i, 1); saveCart(); renderCart(); }

function toggleSidebar() { 
    const s = document.getElementById('sidebar');
    s.classList.toggle('open'); document.getElementById('overlay').classList.toggle('show');
    document.body.classList.toggle('lock-scroll', s.classList.contains('open'));
}

function toggleCart(st) { 
    const p = document.getElementById('cart-panel');
    if (st === true) p.classList.remove('translate-x-full');
    else p.classList.toggle('translate-x-full');
    document.body.classList.toggle('lock-scroll', !p.classList.contains('translate-x-full'));
}

function closeModal() { document.getElementById('pModal').classList.add('hidden'); document.body.classList.remove('lock-scroll'); }

function setCategory(c) { 
    curCat = c; currentFilter = 'all';
    document.getElementById('category-panel').classList.remove('hidden');
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.replace('bg-white/20', 'bg-white/10'));
    if(document.getElementById('cat-'+c)) document.getElementById('cat-'+c).classList.replace('bg-white/10', 'bg-white/20');
    document.getElementById('page-title').innerText = langData[curLang].catalog;
    refreshCatalog(); 
}

function setSort(s) { curSort = s; refreshCatalog(); }

function goHome() { 
    curCat = 'all'; currentFilter = 'all'; 
    document.getElementById('searchInput').value = ''; 
    document.getElementById('category-panel').classList.remove('hidden');
    document.getElementById('page-title').innerText = langData[curLang].catalog;
    refreshCatalog(); 
}

function toggleTheme() { document.documentElement.classList.toggle('dark'); }
document.getElementById('add-to-cart-btn').onclick = addToCart;

init();
</script>
</body>
</html>
