<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>perfume.shoppee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap');
        :root { --brand-deep: #062C22; --brand-accent: #C5A059; --bg-light: #FDFCFB; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-light); color: var(--brand-deep); overflow-x: hidden; }
        .logo-font { font-family: 'Playfair Display', serif; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(6, 44, 34, 0.08); }
        .img-container { display: flex; align-items: center; justify-content: center; background: #f9f9f9; border-radius: 20px; padding: 12px; height: 180px; position: relative; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .product-title { font-size: 11px; font-weight: 700; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 28px; }
        .scroll-x { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 15px; scroll-snap-type: x mandatory; }
        .scroll-x::-webkit-scrollbar { display: none; }
        .scroll-item { flex: 0 0 160px; scroll-snap-align: start; }
        .product-card { background: white; border-radius: 24px; border: 1px solid rgba(0,0,0,0.03); transition: all 0.3s ease; cursor: pointer; }
        .out-of-stock { opacity: 0.5; filter: grayscale(1); }
        .stock-badge { position: absolute; top: 10px; right: 10px; background: #000; color: #fff; font-size: 8px; padding: 4px 8px; border-radius: 8px; font-weight: 800; }
        #sidebar { background: var(--brand-deep); transform: translateX(-100%); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        #sidebar.open { transform: translateX(0); }
        .lang-node.active { background: var(--brand-accent); color: white; }
        .cat-btn.active { background: var(--brand-deep) !important; color: white !important; }
        .price-new { color: #ef4444; font-weight: 900; }
        .price-old { color: #a3a3a3; text-decoration: line-through; font-size: 0.85em; margin-left: 5px; }
    </style>
</head>
<body>

<nav class="glass-nav sticky top-0 z-50 px-6 py-4">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <button onclick="toggleSidebar()" class="text-2xl"><i class="fa-solid fa-bars-staggered"></i></button>
    <span onclick="goHome()" class="text-xl font-bold logo-font cursor-pointer">perfume.shoppee</span>
    <button onclick="toggleCart()" class="relative"><i class="fa-solid fa-bag-shopping text-xl"></i><span id="cart-count" class="absolute -top-2 -right-2 bg-[#C5A059] text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center hidden">0</span></button>
  </div>
</nav>

<div class="px-6 py-4 bg-white">
    <div class="relative max-w-2xl mx-auto">
        <input id="searchInput" type="text" onkeyup="refreshCatalog()" class="w-full bg-neutral-100 rounded-2xl py-4 px-12 text-sm outline-none" data-i18n-placeholder="search_placeholder">
        <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-neutral-300"></i>
    </div>
</div>

<div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[1001] hidden"></div>
<div id="sidebar" class="fixed top-0 left-0 h-full w-[280px] z-[1002] p-8 flex flex-col text-white shadow-2xl">
    <div class="mb-8 flex justify-between items-center">
        <span class="logo-font text-lg">perfume.shoppee</span>
        <button onclick="toggleSidebar()"><i class="fa-solid fa-xmark text-xl"></i></button>
    </div>
    <div class="flex gap-2 mb-8">
        <button onclick="setLang('UA')" id="btn-ua" class="lang-node flex-1 py-2 rounded-xl border border-white/10 text-[10px] active">UA</button>
        <button onclick="setLang('PL')" id="btn-pl" class="lang-node flex-1 py-2 rounded-xl border border-white/10 text-[10px]">PL</button>
    </div>
    <nav class="space-y-6 text-[11px] uppercase tracking-widest">
        <a href="#" onclick="goHome(); toggleSidebar(); return false;" data-i18n="menu_home" class="block"></a>
        <a href="#" onclick="showAllCatalog(); toggleSidebar(); return false;" data-i18n="menu_catalog" class="block"></a>
        <a href="#" onclick="filterBy('hit'); toggleSidebar(); return false;" data-i18n="menu_hits" class="block"></a>
        <a href="#" onclick="filterBy('new'); toggleSidebar(); return false;" data-i18n="menu_news" class="block"></a>
        <a href="#" onclick="filterBy('sale'); toggleSidebar(); return false;" data-i18n="menu_sale" class="block text-red-400"></a>
    </nav>
</div>

<main class="max-w-7xl mx-auto pb-20">
    <div id="catalog-filters" class="hidden px-6 mb-6 overflow-x-auto flex gap-2">
      <button onclick="setCategory('all')" id="cat-all" class="cat-btn px-6 py-2 bg-white border border-neutral-100 rounded-xl text-[9px] font-bold uppercase active" data-i18n="cat_all"></button>
      <button onclick="setCategory('female')" id="cat-female" class="cat-btn px-6 py-2 bg-white border border-neutral-100 rounded-xl text-[9px] font-bold uppercase" data-i18n="cat_female"></button>
      <button onclick="setCategory('male')" id="cat-male" class="cat-btn px-6 py-2 bg-white border border-neutral-100 rounded-xl text-[9px] font-bold uppercase" data-i18n="cat_male"></button>
      <button onclick="setCategory('uniseks')" id="cat-uniseks" class="cat-btn px-6 py-2 bg-white border border-neutral-100 rounded-xl text-[9px] font-bold uppercase" data-i18n="cat_uniseks"></button>
      <button onclick="setCategory('sets')" id="cat-sets" class="cat-btn px-6 py-2 bg-white border border-neutral-100 rounded-xl text-[9px] font-bold uppercase" data-i18n="cat_sets"></button>
    </div>
    <div id="catalog-area" class="px-6"></div>
</main>

<div id="cart-panel" class="fixed top-0 right-0 h-full w-full max-w-md bg-white z-[10000] shadow-2xl transform translate-x-full transition-transform duration-500 flex flex-col">
    <div class="p-6 border-b flex justify-between items-center bg-[#062C22] text-white">
        <h2 class="text-[10px] font-bold uppercase tracking-widest" data-i18n="cart_title"></h2>
        <button onclick="toggleCart()"><i class="fa-solid fa-xmark text-xl"></i></button>
    </div>
    <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
    <div class="p-8 border-t bg-neutral-50 space-y-6">
        <div class="flex justify-between items-center"><span class="text-[10px] font-bold uppercase text-neutral-400" data-i18n="cart_total_label"></span><span id="cart-total" class="text-xl font-bold">0 zł</span></div>
        <button onclick="sendOrder()" class="w-full bg-[#062C22] text-white py-5 rounded-2xl text-[10px] font-bold uppercase tracking-widest" data-i18n="cart_order_btn"></button>
    </div>
</div>

<div id="pModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md z-[9999] flex items-center justify-center p-4" onclick="closeModal()">
  <div class="bg-white relative overflow-y-auto max-h-[90vh] shadow-2xl p-6 rounded-[32px] w-full max-w-[400px]" onclick="event.stopPropagation()">
    <button onclick="closeModal()" class="absolute top-5 right-5 text-neutral-300"><i class="fa-solid fa-xmark text-xl"></i></button>
    <div class="flex flex-col items-center">
        <div class="img-container w-44 h-44 mb-4"><img id="m-img" src=""></div>
        <div id="m-brand" class="text-[8px] font-black text-[#C5A059] uppercase tracking-widest mb-1"></div>
        <h2 id="m-title" class="text-lg font-bold text-center mb-3 logo-font leading-tight"></h2>
        <p id="m-desc" class="text-[11px] text-neutral-400 text-center mb-6"></p>
        <div class="w-full space-y-2 mb-6" id="m-prices"></div>
        <button id="add-to-cart-btn" class="w-full bg-[#062C22] text-white py-5 rounded-2xl text-[10px] font-bold uppercase opacity-20 cursor-not-allowed" data-i18n="add_to_cart"></button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
// ЗАМЕНИ НА СВОЮ ССЫЛКУ ИЗ ПУНКТА "ОПУБЛИКОВАТЬ В ИНТЕРНЕТЕ"
const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQA6BrgyLNH6Jw3BOZKxMQ2X2MAJed7xT6CBepxG-c9D3qjKJJmPzwTPypMM3fxCLipzxHrq4exkdKS/pub?output=csv';
const TG_NICK = 'elenafragrance';

let allProducts = [], cart = JSON.parse(localStorage.getItem('ps_cart')) || [];
let curCat = 'all', currentFilter = 'home', currentLang = 'UA', selectedOption = null;

const i18n = {
    UA: { search_placeholder: "Пошук...", menu_home: "Головна", menu_catalog: "Каталог", menu_hits: "Хіти", menu_news: "Новинки", menu_sale: "Акції %", cat_all: "Усі", cat_female: "Жіночі", cat_male: "Чоловічі", cat_uniseks: "Унісекс", cat_sets: "Набори", hits_title: "Хіти продажу", news_title: "Новинки", cart_title: "Кошик", cart_total_label: "Разом", cart_order_btn: "Оформити", add_to_cart: "Додати", empty_cart: "Порожньо", order_msg: "Нове замовлення", default_desc: "Вишуканий аромат.", sold_badge: "Sold Out", out_of_stock_btn: "Немає" },
    PL: { search_placeholder: "Szukaj...", menu_home: "Głównna", menu_catalog: "Katalog", menu_hits: "Hity", menu_news: "Nowości", menu_sale: "Promocje %", cat_all: "Wszystkie", cat_female: "Damskie", cat_male: "Męskie", cat_uniseks: "Uniseks", cat_sets: "Zestawy", hits_title: "Bestsellery", news_title: "Nowości", cart_title: "Koszyk", cart_total_label: "Suma", cart_order_btn: "Zamów", add_to_cart: "Dodaj", empty_cart: "Pusto", order_msg: "Nowe zamówienie", default_desc: "Zapach Premium.", sold_badge: "Sold Out", out_of_stock_btn: "Brak" }
};

async function init() {
    try {
        const res = await fetch(SPREADSHEET_URL);
        const data = await res.text();
        allProducts = parseCSV(data).filter(p => p.brand);
        updateUI(); refreshCatalog(); renderCart();
        AOS.init({ duration: 800, once: true });
    } catch (e) { console.error("Load fail", e); }
}

function parseCSV(text) {
    const lines = text.split(/\r?\n/);
    const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
    return lines.slice(1).map(line => {
        const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
        let obj = {};
        headers.forEach((h, i) => obj[h] = values[i] || "");
        return obj;
    });
}

function refreshCatalog() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const area = document.getElementById('catalog-area');
    document.getElementById('catalog-filters').classList.toggle('hidden', currentFilter !== 'all');

    if (currentFilter === 'home' && q === '') {
        const banner = allProducts.find(p => p.brand === "BANNER");
        area.innerHTML = `
            ${banner ? `<div class="mb-10 rounded-[28px] overflow-hidden"><img src="${banner.photo}" class="w-full"></div>` : ''}
            <div class="mb-12"><h2 class="text-[10px] font-black uppercase tracking-widest mb-6 opacity-40">${i18n[currentLang].hits_title}</h2><div class="scroll-x">${renderProducts(allProducts.filter(p => p.isbest === 'yes'), true)}</div></div>
            <div class="mb-12"><h2 class="text-[10px] font-black uppercase tracking-widest mb-6 opacity-40">${i18n[currentLang].news_title}</h2><div class="scroll-x">${renderProducts(allProducts.filter(p => p.isnew === 'yes'), true)}</div></div>
        `;
    } else {
        const filtered = allProducts.filter(p => {
            if(p.brand === "BANNER") return false;
            const name = (currentLang === 'UA' ? (p.nameuk || p.name) : (p.namepl || p.name)).toLowerCase();
            const matchSearch = (p.brand.toLowerCase() + ' ' + name).includes(q);
            const matchCat = curCat === 'all' || p.category?.toLowerCase() === curCat;
            let matchF = true;
            if(currentFilter === 'hit') matchF = p.isbest === 'yes';
            if(currentFilter === 'new') matchF = p.isnew === 'yes';
            if(currentFilter === 'sale') matchF = !!(p.old2ml || p.oldfull);
            return matchSearch && matchCat && matchF;
        });
        area.innerHTML = `<div class="grid grid-cols-2 md:grid-cols-4 gap-4">${renderProducts(filtered, false)}</div>`;
    }
}

function renderProducts(list, isScroll) {
    return list.map(p => {
        const avail = p.status?.toLowerCase() !== 'out';
        const name = currentLang === 'UA' ? (p.nameuk || p.name) : (p.namepl || p.name);
        const pr = p.price2ml || p.fullprice;
        return `<div onclick="openModal(${allProducts.indexOf(p)})" class="${isScroll ? 'scroll-item' : ''} product-card p-4 flex flex-col h-full ${!avail ? 'out-of-stock' : ''}">
            <div class="img-container mb-3">${!avail ? `<div class="stock-badge">Sold Out</div>` : ''}<img src="${p.photo}"></div>
            <div class="text-[7px] font-black text-[#C5A059] uppercase mb-1">${p.brand}</div>
            <div class="product-title">${name}</div>
            <div class="text-[10px] font-black mt-auto">${pr} zł</div>
        </div>`;
    }).join('');
}

function openModal(idx) {
    const p = allProducts[idx]; selectedOption = null;
    const avail = p.status?.toLowerCase() !== 'out';
    const btn = document.getElementById('add-to-cart-btn');
    btn.classList.add('opacity-20', 'cursor-not-allowed');
    btn.innerText = avail ? i18n[currentLang].add_to_cart : i18n[currentLang].out_of_stock_btn;
    document.getElementById('m-img').src = p.photo;
    document.getElementById('m-brand').innerText = p.brand;
    document.getElementById('m-title').innerText = currentLang === 'UA' ? (p.nameuk || p.name) : (p.namepl || p.name);
    document.getElementById('m-desc').innerText = currentLang === 'UA' ? (p.descuk || i18n.UA.default_desc) : (p.descpl || i18n.PL.default_desc);
    let h = '';
    [{l:'2ml', p:p.price2ml}, {l:'5ml', p:p.price5ml}, {l:'10ml', p:p.price10ml}, {l:'Full', p:p.fullprice}].forEach(s => {
        if(s.p && s.p !== '---') h += `<div onclick="selectSize(this, '${s.l}', '${s.p}', '${p.brand}', '${currentLang==='UA'?(p.nameuk||p.name):(p.namepl||p.name)}', '${p.photo}')" class="border p-4 rounded-xl flex justify-between cursor-pointer"><span>${s.l}</span><span>${s.p} zł</span></div>`;
    });
    document.getElementById('m-prices').innerHTML = h;
    document.getElementById('pModal').classList.remove('hidden');
}

function selectSize(el, size, price, brand, name, img) {
    document.querySelectorAll('#m-prices div').forEach(d => d.style.borderColor = '#eee');
    el.style.borderColor = '#C5A059';
    selectedOption = { size, price, brand, name, img };
    document.getElementById('add-to-cart-btn').classList.remove('opacity-20', 'cursor-not-allowed');
}

function addToCart() { if(selectedOption) { cart.push(selectedOption); localStorage.setItem('ps_cart', JSON.stringify(cart)); renderCart(); closeModal(); toggleCart(true); } }
function renderCart() { 
    const c = document.getElementById('cart-items'); 
    document.getElementById('cart-count').innerText = cart.length; 
    document.getElementById('cart-count').classList.toggle('hidden', cart.length === 0);
    let total = 0;
    c.innerHTML = cart.length ? cart.map((it, i) => { total += parseFloat(it.price); return `<div class="flex gap-4"><img src="${it.img}" class="w-10 h-10 object-contain"><div class="flex-1 text-[10px] font-bold">${it.name}<br><span class="text-neutral-400">${it.size} • ${it.price} zł</span></div><button onclick="removeFromCart(${i})">×</button></div>` }).join('') : 'Pusto';
    document.getElementById('cart-total').innerText = total.toFixed(2) + ' zł';
}
function removeFromCart(i) { cart.splice(i, 1); localStorage.setItem('ps_cart', JSON.stringify(cart)); renderCart(); }
function sendOrder() {
    let t = `Замовлення:\n`; cart.forEach((it, i) => t += `${i+1}. ${it.brand} ${it.name} (${it.size}) - ${it.price} zł\n`);
    window.open(`https://t.me/${TG_NICK}?text=${encodeURIComponent(t)}`);
}
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('hidden'); }
function toggleCart(st) { document.getElementById('cart-panel').classList.toggle('translate-x-full', !st); if(st === undefined) document.getElementById('cart-panel').classList.toggle('translate-x-full'); }
function closeModal() { document.getElementById('pModal').classList.add('hidden'); }
function setLang(l) { currentLang = l; document.querySelectorAll('.lang-node').forEach(b => b.classList.toggle('active', b.id === 'btn-'+l.toLowerCase())); updateUI(); refreshCatalog(); }
function updateUI() { document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = i18n[currentLang][el.getAttribute('data-i18n')]); }
function setCategory(c) { curCat = c; document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.id === 'cat-'+c)); refreshCatalog(); }
function showAllCatalog() { currentFilter = 'all'; refreshCatalog(); }
function filterBy(f) { currentFilter = f; refreshCatalog(); }
function goHome() { currentFilter = 'home'; refreshCatalog(); }

document.getElementById('add-to-cart-btn').onclick = addToCart;
init();
</script>
</body>
</html>
