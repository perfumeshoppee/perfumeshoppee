<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>perfume.shoppee • Luxury Edition</title>
    <style>
        :root { 
            --bg: #050505; 
            --card-bg: rgba(25, 25, 25, 0.6); /* Напівпрозорий фон для скла */
            --text: #ffffff; --sub-text: #888; --border: rgba(255, 255, 255, 0.1);
            --gold-gradient: linear-gradient(135deg, #fdfc47 0%, #bf9b30 50%, #fdfc47 100%);
            --gold-shine: linear-gradient(to right, #bf9b30 20%, #fdfc47 40%, #fdfc47 60%, #bf9b30 80%);
            --gold-text: #d4af37; --sale-red: #ff0000; --stock-green: #2ecc71; 
            --stock-out-color: #666;
            /* ТУТ МОЖЕШ ЗАМІНИТИ ПОСИЛАННЯ НА СВОЄ ФОТО */
            --hero-url: url('https://images.unsplash.com/photo-1583445013765-46c20c4a6772?q=80&w=2000&auto=format&fit=crop');
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            transition: 0.3s; 
            -webkit-tap-highlight-color: transparent;
            /* Додаємо легку текстуру на фон всього сайту */
            background-image: radial-gradient(circle at top right, rgba(191, 155, 48, 0.05), transparent),
                              radial-gradient(circle at bottom left, rgba(191, 155, 48, 0.05), transparent);
        }

        header { padding: 40px 20px 10px; text-align: center; }
        
        .top-bar { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 25px; }
        .lang-switch button, .theme-toggle { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 10px 18px; border-radius: 25px; font-size: 11px; font-weight: 800; color: var(--sub-text); cursor: pointer; backdrop-filter: blur(5px); }
        .lang-switch button.active { background: var(--gold-gradient); color: #000; border: none; }
        
        .logo { font-size: 2.6em; font-weight: 900; letter-spacing: -2px; margin: 0; text-transform: lowercase; background: var(--gold-shine); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        
        .subtitle { font-size: 11px; color: var(--sub-text); text-transform: uppercase; letter-spacing: 1px; margin: 8px auto 25px; max-width: 80%; line-height: 1.5; font-weight: 500; }

        /* ЕСТЕТИЧНИЙ БАНЕР */
        .hero-banner {
            width: 92%; height: 220px; margin: 0 auto 30px; border-radius: 35px;
            background-image: linear-gradient(to top, rgba(5,5,5,0.8), transparent), var(--hero-url);
            background-size: cover; background-position: center;
            display: flex; align-items: flex-end; padding: 25px; box-sizing: border-box;
            border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .hero-tag { font-size: 10px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: #fff; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 10px; backdrop-filter: blur(5px); }

        .controls { padding: 0 15px; max-width: 600px; margin: 0 auto; position: sticky; top: 15px; z-index: 100; }
        #searchInput { width: 100%; padding: 16px 25px; border-radius: 35px; border: 1px solid var(--border); background: rgba(10,10,10,0.8); color: var(--text); outline: none; box-sizing: border-box; backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        .filter-section { padding: 20px 20px 10px; display: flex; justify-content: center; }
        .filter-toggle-btn { background: var(--gold-gradient); color: #000; border: none; padding: 12px 30px; border-radius: 25px; font-weight: 800; cursor: pointer; }
        
        .filter-menu { display: none; padding: 10px; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 10px; }
        .filter-menu.active { display: flex; }
        .f-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 10px 18px; border-radius: 18px; color: var(--sub-text); font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .f-btn.active { background: var(--gold-gradient) !important; color: #000 !important; border: none !important; box-shadow: 0 5px 15px rgba(191, 155, 48, 0.3); }

        .section-header { padding: 25px 20px 5px; }
        .section-title { font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: var(--sub-text); border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 15px 20px; scrollbar-width: none; }
        .carousel::-webkit-scrollbar { display: none; }
        .carousel .card { min-width: 175px; flex: 0 0 175px; }

        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; padding-bottom: 100px; }
        
        /* КАРТКИ З ЕФЕКТОМ СКЛА */
        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border-radius: 30px; padding: 18px; text-align: center; 
            border: 1px solid var(--border); 
            display: flex; flex-direction: column; min-height: 310px; position: relative; 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; 
        }
        .card:active { transform: scale(0.96); }
        
        .sale-badge { position: absolute; top: 15px; left: 15px; background: var(--sale-red); color: white; padding: 5px 12px; border-radius: 12px; font-size: 9px; font-weight: 900; z-index: 5; }
        .stock-badge { font-size: 9px; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .stock-in { color: var(--stock-green); }
        .stock-out { color: var(--stock-out-color); }
        
        .card-img { height: 130px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); }
        .card img { max-width: 95%; max-height: 95%; object-fit: contain; }
        
        .brand { font-size: 10px; text-transform: uppercase; color: var(--sub-text); font-weight: 800; margin-top: auto; letter-spacing: 1px; }
        .title { font-size: 14px; font-weight: 700; margin: 6px 0 10px; height: 2.8em; overflow: hidden; line-height: 1.3; }
        .price { font-weight: 900; font-size: 17px; color: var(--gold-text); }
        
        /* МОДАЛКА */
        .modal { display: none; position: fixed; z-index: 3000; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); }
        .modal-content { background: rgba(20, 20, 20, 0.8); width: 90%; max-width: 400px; margin: auto; position: relative; top: 50%; transform: translateY(-50%); border-radius: 40px; padding: 35px; border: 1px solid var(--border); text-align: center; }
        #m-img { max-height: 200px; margin-bottom: 25px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.6)); }
        .price-list { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; margin: 20px 0; text-align: left; border: 1px solid var(--border); }
        .old-p { text-decoration: line-through; color: var(--sub-text); font-size: 12px; margin-right: 8px; }
        .sale-price { color: var(--sale-red) !important; font-weight: 900 !important; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { padding: 18px; border-radius: 22px; text-decoration: none; font-weight: 800; font-size: 13px; text-align: center; transition: 0.3s; }
        .btn-tg { background: rgba(255,255,255,0.1); color: var(--text); }
        .btn-inst { background: var(--gold-gradient); color: #000; box-shadow: 0 10px 20px rgba(191, 155, 48, 0.3); }
    </style>
</head>
<body>

<header>
    <div class="top-bar">
        <div class="lang-switch">
            <button id="btn-pl" onclick="setLang('pl')">PL</button>
            <button id="btn-uk" onclick="setLang('uk')" class="active">UA</button>
        </div>
    </div>
    <h1 class="logo">perfume.shoppee</h1>
    <p class="subtitle" id="h-sub"></p>
</header>

<div class="hero-banner">
    <div class="hero-tag" id="hero-tag">Luxury Selection</div>
</div>

<div class="controls">
    <input type="text" id="searchInput" onkeyup="refresh()">
</div>

<div class="filter-section">
    <button class="filter-toggle-btn" onclick="toggleFilterMenu()" id="f-label"></button>
</div>
<div class="filter-menu" id="filterMenu"></div>

<div id="dynamic-content"></div>
<div id="catalog-area"></div>

<div id="pModal" class="modal" onclick="if(event.target == this) closeModal()">
    <div class="modal-content">
        <img id="m-img" src="">
        <div id="m-brand" class="brand"></div>
        <h2 id="m-title" style="margin: 10px 0;"></h2>
        <div id="m-stock" class="stock-badge"></div>
        <p id="m-desc" style="font-size: 12px; color: var(--sub-text); margin-bottom: 20px; line-height: 1.6;"></p>
        <div class="price-list" id="m-prices"></div>
        <div class="btn-group">
            <a href="#" id="m-tg" class="btn btn-tg">Telegram</a>
            <a href="#" id="m-inst" target="_blank" class="btn btn-inst">Instagram</a>
        </div>
    </div>
</div>

<script>
    const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQA6BrgyLNH6Jw3BOZKxMQ2X2MAJed7xT6CBepxG-c9D3qjKJJmPzwTPypMM3fxCLipzxHrq4exkdKS/pub?output=csv';
    const INSTA_URL = 'https://www.instagram.com/perfume.shoppee';
    const TG_NICK = "elenafragrance";

    let allProducts = [];
    let curLang = 'uk';
    let curCat = 'all';

    const UI = {
        uk: { 
            sub: "Твоя колекція ароматів починається тут. Працюємо виключно з оригінальною продукцією.", 
            search: "Пошук бренду...", from: "від", hits: "Хіти продажу", news: "Новинки", sales: "Знижки %", catalog: "Каталог", 
            filter: "Фільтри ↓", sale_tag: "ЗНИЖКА", stock_in: "✓ В наявності", stock_out: "✕ Немає в наявності",
            hero: "Ексклюзивна Колекція",
            cats: {all: "Усі", female: "Жіночі", male: "Чоловічі", uniseks: "Унісекс", set: "Набори"} 
        },
        pl: { 
            sub: "Twoja kolekcja zapachów zaczyna się tutaj. Pracujemy wyłącznie z oryginalnymi produktami.", 
            search: "Szukaj...", from: "od", hits: "Hity sprzedaży", news: "Nowości", sales: "Zniżki %", catalog: "Katalog", 
            filter: "Filtry ↓", sale_tag: "ZNIŻKA", stock_in: "✓ Dostępny", stock_out: "✕ Brak в magazynie",
            hero: "Ekskluzywna Kolekcja",
            cats: {all: "Wszystkie", female: "Damskie", male: "Męskie", uniseks: "Unisex", set: "Zestawy"} 
        }
    };

    async function init() {
        try {
            const resp = await fetch(SPREADSHEET_URL);
            const text = await resp.text();
            allProducts = parseCSV(text);
            setLang('uk');
        } catch(e) { console.error("CSV Load Error"); }
    }

    function parseCSV(csv) {
        const rows = []; let cur = '', inQ = false, row = [];
        for (let i = 0; i < csv.length; i++) {
            let c = csv[i], n = csv[i+1];
            if (c === '"' && inQ && n === '"') { cur += '"'; i++; }
            else if (c === '"') inQ = !inQ;
            else if (c === ',' && !inQ) { row.push(cur); cur = ''; }
            else if ((c === '\n' || c === '\r') && !inQ) { 
                row.push(cur); rows.push(row); cur = ''; row = []; if(c==='\r' && n==='\n') i++;
            } else cur += c;
        }
        if(cur || row.length) { row.push(cur); rows.push(row); }
        const h = rows[0].map(v => v.trim());
        return rows.slice(1).map(r => {
            let o = {}; h.forEach((k, idx) => o[k] = r[idx]?.trim() || ''); return o;
        });
    }

    function setLang(l) {
        curLang = l;
        document.querySelectorAll('.lang-switch button').forEach(b => b.classList.toggle('active', b.id === 'btn-'+l));
        document.getElementById('h-sub').innerText = UI[l].sub;
        document.getElementById('searchInput').placeholder = UI[l].search;
        document.getElementById('f-label').innerText = UI[l].filter;
        document.getElementById('hero-tag').innerText = UI[l].hero;
        renderFilters();
        refresh();
    }

    function renderFilters() {
        document.getElementById('filterMenu').innerHTML = Object.keys(UI[curLang].cats).map(k => `
            <button class="f-btn ${curCat===k?'active':''}" onclick="setCategory('${k}')">${UI[curLang].cats[k]}</button>
        `).join('');
    }

    function setCategory(k) {
        curCat = k;
        renderFilters();
        refresh();
        toggleFilterMenu();
    }

    function toggleFilterMenu() { document.getElementById('filterMenu').classList.toggle('active'); }

    function refresh() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allProducts.filter(p => {
            const mS = (p.brand + (curLang==='uk'?p.nameUK:p.namePL)).toLowerCase().includes(q);
            const mC = curCat === 'all' || p.category === curCat;
            return mS && mC;
        });

        let content = '';
        if(curCat === 'all' && !q) {
            const hits = allProducts.filter(p => p.isBest?.toLowerCase() === 'yes');
            const news = allProducts.filter(p => p.isNew?.toLowerCase() === 'yes');
            const sales = allProducts.filter(p => p.old2ml || p.old5ml || p.old10ml || p.oldFull);

            if(hits.length) content += `<div class="section-header"><h2 class="section-title">${UI[curLang].hits}</h2></div><div class="carousel">${hits.map(p => getCard(p)).join('')}</div>`;
            if(news.length) content += `<div class="section-header"><h2 class="section-title">${UI[curLang].news}</h2></div><div class="carousel">${news.map(p => getCard(p)).join('')}</div>`;
            if(sales.length) content += `<div class="section-header"><h2 class="section-title" style="color:var(--sale-red); font-weight:900;">${UI[curLang].sales}</h2></div><div class="carousel">${sales.map(p => getCard(p)).join('')}</div>`;
            content += `<div class="section-header"><h2 class="section-title">${UI[curLang].catalog}</h2></div>`;
        }
        document.getElementById('dynamic-content').innerHTML = content;
        document.getElementById('catalog-area').innerHTML = `<div class="product-grid">${filtered.map(p => getCard(p)).join('')}</div>`;
    }

    function getCard(p) {
        const hasSale = (p.old2ml || p.old5ml || p.old10ml || p.oldFull);
        const inStock = p.status?.toLowerCase() !== 'out';
        return `<div class="card" onclick='openModal(${JSON.stringify(p)})'>
            ${hasSale ? `<div class="sale-badge">${UI[curLang].sale_tag}</div>` : ''}
            <div class="card-img"><img src="${p.photo}"></div>
            <div class="stock-badge ${inStock ? 'stock-in' : 'stock-out'}">${inStock ? UI[curLang].stock_in : UI[curLang].stock_out}</div>
            <div class="brand">${p.brand}</div>
            <div class="title">${curLang==='uk'?p.nameUK:p.namePL}</div>
            <div class="price">${UI[curLang].from} ${p.price2ml || p.price10ml} zł</div>
        </div>`;
    }

    function openModal(p) {
        const n = curLang==='uk'?p.nameUK:p.namePL;
        const inStock = p.status?.toLowerCase() !== 'out';
        document.getElementById('m-img').src = p.photo;
        document.getElementById('m-brand').innerText = p.brand;
        document.getElementById('m-title').innerText = n;
        document.getElementById('m-stock').innerText = inStock ? UI[curLang].stock_in : UI[curLang].stock_out;
        document.getElementById('m-stock').className = `stock-badge ${inStock ? 'stock-in' : 'stock-out'}`;
        document.getElementById('m-desc').innerText = curLang==='uk'?p.descUK:p.descPL;
        
        let pr = '';
        [{l:'2ml',v:p.price2ml,o:p.old2ml},{l:'5ml',v:p.price5ml,o:p.old5ml},{l:'10ml',v:p.price10ml,o:p.old10ml},{l:'Bottle',v:p.fullPrice,o:p.oldFull}].forEach(s => {
            if(s.v && parseFloat(s.v)>0) pr += `<div style="display:flex;justify-content:space-between;margin-bottom:10px;"><span>${s.l}</span><div>${s.o?`<span class="old-p">${s.o} zł</span>`:''}<span class="${s.o?'sale-price':'price'}" style="font-weight:900;">${s.v} zł</span></div></div>`;
        });
        document.getElementById('m-prices').innerHTML = pr;
        document.getElementById('m-tg').href = `https://t.me/${TG_NICK}?text=Замовлення: ${p.brand} ${n}`;
        document.getElementById('m-inst').href = INSTA_URL;
        document.getElementById('pModal').style.display = 'block';
    }
    function closeModal() { document.getElementById('pModal').style.display = 'none'; }
    init();
</script>
</body>
</html>
