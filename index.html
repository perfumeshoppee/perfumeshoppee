<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>perfume.shoppee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap');
        
        :root { --brand-deep: #062C22; --brand-accent: #C5A059; --bg-light: #FDFCFB; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-light); color: var(--brand-deep); overflow-x: hidden; scroll-behavior: smooth; }
        .logo-font { font-family: 'Playfair Display', serif; }

        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(6, 44, 34, 0.08); }

        .img-container { 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; background: #f9f9f9; border-radius: 20px; 
            padding: 12px; height: 180px; width: 100%; position: relative;
        }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .product-title {
            font-size: 11px; font-weight: 700; line-height: 1.2; margin-bottom: 8px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; text-overflow: ellipsis; min-height: 28px;
        }

        .scroll-x { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 12px; padding-bottom: 15px; -webkit-overflow-scrolling: touch; }
        .scroll-x::-webkit-scrollbar { display: none; }
        .scroll-item { flex: 0 0 160px; scroll-snap-align: start; }

        .product-card { 
            background: white; border-radius: 24px; border: 1px solid rgba(0,0,0,0.03); 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); position: relative;
        }

        .out-of-stock { opacity: 0.5; filter: grayscale(0.8); }
        .stock-badge { 
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); 
            color: #fff; font-size: 7px; padding: 4px 8px; border-radius: 8px; 
            text-transform: uppercase; font-weight: 800; z-index: 10;
        }

        /* МОДАЛКА */
        .modal-content { max-width: 420px; width: 95%; border-radius: 32px; background: white; position: relative; }
        
        /* Стили для обычных духов (маленькое фото) */
        .img-std { width: 180px; height: 180px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; }
        .img-std img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Стили для Наборов (широкое фото + слайдер) */
        .slider-wrapper { position: relative; width: 100%; background: #f9f9f9; height: 300px; border-radius: 32px 32px 0 0; overflow: hidden; }
        .slider-container { display: flex; transition: transform 0.4s ease-in-out; height: 100%; }
        .slide { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .slide img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); background: white/80; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; }

        .desc-list { text-align: left; }
        .desc-item { display: flex; gap: 8px; margin-bottom: 5px; font-size: 11px; color: #555; }
        .desc-item i { color: var(--brand-accent); font-size: 7px; margin-top: 4px; }

        #sidebar { background: var(--brand-deep); transform: translateX(-100%); transition: transform 0.4s; }
        #sidebar.open { transform: translateX(0); }
        .lang-node.active { background: var(--brand-accent); color: white; }
        .cat-btn.active { background: var(--brand-deep) !important; color: white !important; }
        .lock-scroll { overflow: hidden; }
        .price-new { color: #ef4444; font-weight: 900; }
        .price-old { color: #a3a3a3; text-decoration: line-through; font-size: 0.85em; margin-left: 5px; }
    </style>
</head>
<body>

<nav class="glass-nav sticky top-0 z-50 px-6 py-4">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <button onclick="toggleSidebar()" class="text-2xl text-[#062C22]"><i class="fa-solid fa-bars-staggered"></i></button>
    <span onclick="goHome()" class="text-xl font-bold logo-font cursor-pointer tracking-tighter">perfume.shoppee</span>
    <button onclick="toggleCart()" class="relative text-[#062C22]"><i class="fa-solid fa-bag-shopping text-xl"></i><span id="cart-count" class="absolute -top-2 -right-2 bg-[#C5A059] text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center hidden">0</span></button>
  </div>
</nav>

<div class="px-6 py-4 bg-white">
    <div class="relative max-w-2xl mx-auto">
        <input id="searchInput" type="text" onkeyup="refreshCatalog()" class="w-full bg-neutral-100 rounded-2xl py-4 px-12 text-sm outline-none" data-i18n-placeholder="search_placeholder">
        <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-neutral-300 text-xs"></i>
    </div>
</div>

<div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[1001] hidden"></div>
<div id="sidebar" class="fixed top-0 left-0 h-full w-[280px] z-[1002] p-8 flex flex-col text-white font-semibold">
    <div class="mb-8 flex justify-between items-center"><span class="logo-font text-lg">perfume.shoppee</span><button onclick="toggleSidebar()"><i class="fa-solid fa-xmark text-xl text-white/30"></i></button></div>
    <div class="flex gap-2 mb-8">
        <button onclick="setLang('UA')" id="btn-ua" class="lang-node flex-1 py-2 rounded-xl border border-white/10 text-[10px] active">UA</button>
        <button onclick="setLang('PL')" id="btn-pl" class="lang-node flex-1 py-2 rounded-xl border border-white/10 text-[10px]">PL</button>
    </div>
    <nav class="space-y-6 text-[11px] uppercase tracking-widest">
        <a href="#" onclick="goHome(); toggleSidebar(); return false;" data-i18n="menu_home" class="block"></a>
        <a href="#" onclick="showAllCatalog(); toggleSidebar(); return false;" data-i18n="menu_catalog" class="block"></a>
        <a href="#" onclick="filterBy('hit'); toggleSidebar(); return false;" data-i18n="menu_hits" class="block"></a>
        <a href="#" onclick="filterBy('new'); toggleSidebar(); return false;" data-i18n="menu_news" class="block"></a>
        <a href="#" onclick="filterBy('sale'); toggleSidebar(); return false;" data-i18n="menu_sale" class="block text-red-400"></a>
    </nav>
</div>

<main class="max-w-7xl mx-auto pb-20">
    <div id="catalog-filters" class="hidden px-6 mb-6 overflow-x-auto flex gap-2 no-scrollbar">
      <button onclick="setCategory('all')" id="cat-all" class="cat-btn px-6 py-2 bg-white border border-neutral-100 text-neutral-400 rounded-xl text-[9px] font-bold uppercase active" data-i18n="cat_all"></button>
      <button onclick="setCategory('female')" id="cat-female" class="cat-btn px-6 py-2 bg-white border border-neutral-100 text-neutral-400 rounded-xl text-[9px] font-bold uppercase" data-i18n="cat_female"></button>
      <button onclick="setCategory('male')" id="cat-male" class="cat-btn px-6 py-2 bg-white border border-neutral-100 text-neutral-400 rounded-xl text-[9px] font-bold uppercase" data-i18n="cat_male"></button>
      <button onclick="setCategory('uniseks')" id="cat-uniseks" class="cat-btn px-6 py-2 bg-white border border-neutral-100 text-neutral-400 rounded-xl text-[9px] font-bold uppercase" data-i18n="cat_uniseks"></button>
      <button onclick="setCategory('sets')" id="cat-sets" class="cat-btn px-6 py-2 bg-white border border-neutral-100 text-neutral-400 rounded-xl text-[9px] font-bold uppercase" data-i18n="cat_sets"></button>
    </div>
    <div id="catalog-area" class="px-6"></div>
</main>

<div id="cart-panel" class="fixed top-0 right-0 h-full w-full max-w-md bg-white z-[10000] shadow-2xl transform translate-x-full transition-transform duration-500 flex flex-col">
    <div class="p-6 border-b flex justify-between items-center bg-[#062C22] text-white">
        <h2 class="text-[10px] font-bold uppercase" data-i18n="cart_title"></h2>
        <button onclick="toggleCart()"><i class="fa-solid fa-xmark text-xl"></i></button>
    </div>
    <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
    <div class="p-8 border-t bg-neutral-50 space-y-4">
        <div class="flex justify-between items-center"><span class="text-[10px] font-bold uppercase text-neutral-400" data-i18n="cart_total_label"></span><span id="cart-total" class="text-xl font-bold">0 zł</span></div>
        <button onclick="sendOrder()" class="w-full bg-[#062C22] text-white py-5 rounded-2xl text-[10px] font-bold uppercase" data-i18n="cart_order_btn"></button>
    </div>
</div>

<div id="pModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-md z-[9999] flex items-center justify-center p-4" onclick="closeModal()">
  <div class="modal-content overflow-y-auto max-h-[90vh]" onclick="event.stopPropagation()">
    <button onclick="closeModal()" class="absolute top-4 right-4 bg-white/80 w-8 h-8 rounded-full flex items-center justify-center text-neutral-800 z-[20] shadow-md"><i class="fa-solid fa-xmark"></i></button>
    
    <div id="m-header-area"></div> <div class="p-6 text-center">
        <div id="m-brand" class="text-[8px] font-black text-[#C5A059] uppercase tracking-[0.3em] mb-1"></div>
        <h2 id="m-title" class="text-xl font-bold mb-4 logo-font leading-tight"></h2>
        <div id="m-desc" class="text-[11px] text-neutral-500 leading-relaxed mb-6"></div>
        <div class="w-full space-y-2 mb-8" id="m-prices"></div>
        <button id="add-to-cart-btn" class="w-full bg-[#062C22] text-white py-5 rounded-2xl text-[10px] font-bold uppercase opacity-20 cursor-not-allowed"></button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQA6BrgyLNH6Jw3BOZKxMQ2X2MAJed7xT6CBepxG-c9D3qjKJJmPzwTPypMM3fxCLipzxHrq4exkdKS/pub?output=csv';
const TG_NICK = 'elenafragrance';

let allProducts = [], cart = JSON.parse(localStorage.getItem('ps_cart')) || [];
let curCat = 'all', currentFilter = 'home', currentLang = 'UA';
let currentSlide = 0, totalSlides = 0;

const i18n = {
    UA: {
        search_placeholder: "Пошук аромату...", menu_home: "Головна", menu_catalog: "Каталог", menu_hits: "Хіти", menu_news: "Новинки", menu_sale: "Акції %",
        cat_all: "Усі", cat_female: "Жіночі", cat_male: "Чоловічі", cat_uniseks: "Унісекс", cat_sets: "Набори", hits_title: "Хіти продажу", news_title: "Новинки", cart_title: "Ваш кошик", cart_total_label: "Разом",
        cart_order_btn: "Оформити в Telegram", add_to_cart: "Додати в кошик", empty_cart: "Кошик порожній", order_msg: "Нове замовлення", default_desc: "Вишуканий аромат з унікальним шлейфом.",
        sold_badge: "Немає в наявності", out_of_stock_btn: "Немає в наявності", set_label: "Набір"
    },
    PL: {
        search_placeholder: "Szukaj zapachu...", menu_home: "Główna", menu_catalog: "Katalog", menu_hits: "Hity", menu_news: "Nowości", menu_sale: "Promocje %",
        cat_all: "Wszystkie", cat_female: "Damskie", cat_male: "Męskie", cat_uniseks: "Uniseks", cat_sets: "Zestawy", hits_title: "Bestsellery", news_title: "Nowości", cart_title: "Twój koszyk", cart_total_label: "Suma",
        cart_order_btn: "Zamów przez Telegram", add_to_cart: "Dodaj do koszyka", empty_cart: "Koszyk jest pusty", order_msg: "Nowe zamówienie", default_desc: "Wyrafunowany zapach.",
        sold_badge: "Brak в magazynie", out_of_stock_btn: "Brak в magazynie", set_label: "Zestaw"
    }
};

async function init() {
    const res = await fetch(SPREADSHEET_URL);
    const text = await res.text();
    allProducts = parseCSV(text);
    updateUI(); refreshCatalog(); renderCart();
    setTimeout(() => { AOS.init({ duration: 800, once: true }); }, 200);
}

function parseCSV(text) {
    let rows = [], row = [], col = '', q = false;
    for (let i = 0; i < text.length; i++) {
        let c = text[i], n = text[i+1];
        if (c === '"' && q && n === '"') { col += '"'; i++; }
        else if (c === '"') q = !q;
        else if (c === ',' && !q) { row.push(col.trim()); col = ''; }
        else if ((c === '\r' || c === '\n') && !q) { if (col || row.length) row.push(col.trim()); rows.push(row); row = []; col = ''; }
        else col += c;
    }
    if (col || row.length) { row.push(col.trim()); rows.push(row); }
    const h = rows[0];
    return rows.slice(1).map(r => { let o = {}; h.forEach((k, i) => o[k] = r[i] || ""); return o; });
}

function getPhotoPath(p) { return p.includes("http") ? p : `img/${p}`; }

function openModal(idx) {
    const p = allProducts[idx];
    const isSet = p.category?.toLowerCase().trim() === 'sets';
    const photos = p.photo.split(',').map(s => s.trim());
    const avail = (p.status || "").toLowerCase() !== 'out';
    const hArea = document.getElementById('m-header-area');

    if (isSet) {
        // ДИЗАЙН ДЛЯ НАБОРОВ
        currentSlide = 0; totalSlides = photos.length;
        hArea.innerHTML = `
            <div class="slider-wrapper">
                <button onclick="moveSlide(-1)" class="slider-btn left-3 ${totalSlides <= 1 ? 'hidden' : ''}"><i class="fa-solid fa-chevron-left"></i></button>
                <button onclick="moveSlide(1)" class="slider-btn right-3 ${totalSlides <= 1 ? 'hidden' : ''}"><i class="fa-solid fa-chevron-right"></i></button>
                <div id="sliderContainer" class="slider-container">
                    ${photos.map(img => `<div class="slide"><img src="${getPhotoPath(img)}"></div>`).join('')}
                </div>
            </div>`;
        const rawDesc = currentLang === 'UA' ? (p.descUK || i18n.UA.default_desc) : (p.descPL || i18n.PL.default_desc);
        document.getElementById('m-desc').innerHTML = rawDesc.includes(';') ? `<div class="desc-list">${rawDesc.split(';').map(t => `<div class="desc-item"><i class="fa-solid fa-diamond"></i><span>${t.trim()}</span></div>`).join('')}</div>` : rawDesc;
    } else {
        // ДИЗАЙН ДЛЯ ОБЫЧНЫХ ДУХОВ (Классический)
        hArea.innerHTML = `<div class="img-std pt-8"><img src="${getPhotoPath(photos[0])}"></div>`;
        document.getElementById('m-desc').innerText = currentLang === 'UA' ? (p.descUK || i18n.UA.default_desc) : (p.descPL || i18n.PL.default_desc);
    }

    document.getElementById('m-brand').innerText = p.brand;
    document.getElementById('m-title').innerText = currentLang === 'UA' ? (p.nameUK || p.name) : (p.namePL || p.name);
    
    const sizes = [{l:'2ml', p:p.price2ml, old:p.old2ml}, {l:'5ml', p:p.price5ml, old:p.old5ml}, {l:'10ml', p:p.price10ml, old:p.old10ml}, {l:'Full', p:p.fullPrice, old:p.oldFull}].filter(o => o.p && o.p !== '---' && o.p !== '');
    if (sizes.length === 0) sizes.push({l: i18n[currentLang].set_label, p:p.fullPrice, old:p.oldFull});

    document.getElementById('m-prices').innerHTML = sizes.map(o => `
        <div onclick="${avail ? `selectSize(this, '${o.l}', '${o.p}', '${p.brand}', '${p.nameUK || p.name}', '${getPhotoPath(photos[0])}')` : ''}" 
             class="border border-neutral-100 flex justify-between p-4 rounded-xl ${avail ? 'cursor-pointer hover:bg-neutral-50' : 'opacity-40'} text-xs font-bold transition-all">
            <span class="uppercase">${o.l}</span>
            <span>${o.old ? `<span class="price-new">${o.p} zł</span><span class="price-old">${o.old} zł</span>` : `<span>${o.p} zł</span>`}</span>
        </div>`).join('');

    const btn = document.getElementById('add-to-cart-btn');
    btn.innerText = avail ? i18n[currentLang].add_to_cart : i18n[currentLang].out_of_stock_btn;
    btn.classList.toggle('opacity-20', true);
    
    document.getElementById('pModal').classList.remove('hidden');
    document.body.classList.add('lock-scroll');
}

function moveSlide(dir) {
    currentSlide = (currentSlide + dir + totalSlides) % totalSlides;
    document.getElementById('sliderContainer').style.transform = `translateX(-${currentSlide * 100}%)`;
}

function selectSize(el, size, price, brand, name, img) {
    document.querySelectorAll('#m-prices div').forEach(d => { d.style.borderColor = '#F0F0F0'; d.style.background = 'white'; });
    el.style.borderColor = '#C5A059'; el.style.background = '#fdfaf3';
    selectedOption = { size, price, brand, name, img, id: Date.now() };
    const btn = document.getElementById('add-to-cart-btn');
    btn.classList.remove('opacity-20');
    btn.innerText = `${i18n[currentLang].add_to_cart} • ${price} zł`;
}

function refreshCatalog() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const area = document.getElementById('catalog-area');
    document.getElementById('catalog-filters').classList.toggle('hidden', currentFilter !== 'all');
    
    if (currentFilter === 'home' && q === '') {
        const hits = allProducts.filter(p => p.isBest?.toLowerCase() === 'yes');
        const news = allProducts.filter(p => p.isNew?.toLowerCase() === 'yes');
        area.innerHTML = `
            <div class="mb-10"><h2 class="text-[10px] font-black uppercase opacity-40 mb-6">${i18n[currentLang].hits_title}</h2><div class="scroll-x">${renderList(hits, true)}</div></div>
            <div class="mb-10"><h2 class="text-[10px] font-black uppercase opacity-40 mb-6">${i18n[currentLang].news_title}</h2><div class="scroll-x">${renderList(news, true)}</div></div>`;
        return;
    }

    const filtered = allProducts.filter(p => {
        const nameVal = (currentLang === 'UA' ? (p.nameUK || p.name) : (p.namePL || p.name)).toLowerCase();
        const matchSearch = (p.brand.toLowerCase() + ' ' + nameVal).includes(q);
        const matchCat = curCat === 'all' || p.category?.toLowerCase().trim() === curCat;
        return matchSearch && matchCat;
    });
    area.innerHTML = `<div class="grid grid-cols-2 md:grid-cols-4 gap-4">${renderList(filtered, false)}</div>`;
}

function renderList(list, isScroll) {
    return list.map(p => {
        const avail = (p.status || "").toLowerCase() !== 'out';
        const img = getPhotoPath(p.photo.split(',')[0]);
        return `
        <div onclick="openModal(${allProducts.indexOf(p)})" class="${isScroll ? 'scroll-item' : ''} product-card p-4 flex flex-col h-full ${!avail ? 'out-of-stock' : ''}">
            <div class="img-container mb-4">${!avail ? `<div class="stock-badge">${i18n[currentLang].sold_badge}</div>` : ''}<img src="${img}"></div>
            <div class="text-[7px] font-black text-[#C5A059] uppercase tracking-widest mb-1">${p.brand}</div>
            <div class="product-title">${currentLang === 'UA' ? (p.nameUK || p.name) : (p.namePL || p.name)}</div>
            <div class="text-xs font-black">${p.price2ml || p.fullPrice} zł</div>
        </div>`;
    }).join('');
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('hidden'); }
function toggleCart() { document.getElementById('cart-panel').classList.toggle('translate-x-full'); }
function closeModal() { document.getElementById('pModal').classList.add('hidden'); document.body.classList.remove('lock-scroll'); }
function setLang(l) { currentLang = l; init(); }
function setCategory(c) { curCat = c; refreshCatalog(); document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.id === 'cat-'+c)); }
function goHome() { currentFilter = 'home'; refreshCatalog(); }
function showAllCatalog() { currentFilter = 'all'; refreshCatalog(); }
function addToCart() { if(selectedOption) { cart.push(selectedOption); renderCart(); closeModal(); toggleCart(); } }
function renderCart() { 
    document.getElementById('cart-count').innerText = cart.length; 
    document.getElementById('cart-count').classList.toggle('hidden', cart.length === 0);
    const total = cart.reduce((s, i) => s + parseFloat(i.price), 0);
    document.getElementById('cart-total').innerText = total.toFixed(2) + ' zł';
    document.getElementById('cart-items').innerHTML = cart.map((it, i) => `<div class="flex justify-between items-center text-xs"><span>${it.name} (${it.size})</span><b>${it.price} zł</b></div>`).join('');
}
function sendOrder() {
    const text = cart.map(it => `- ${it.brand} ${it.name} (${it.size}): ${it.price} zł`).join('%0A');
    window.open(`https://t.me/${TG_NICK}?text=Замовлення:%0A${text}`, '_blank');
}

document.getElementById('add-to-cart-btn').onclick = addToCart;
init();
</script>
</body>
</html>
