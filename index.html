<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>perfume.shoppee • Luxury Edition</title>
    <style>
        :root { 
            --bg: #ffffff; --card-bg: #f9f9f9; --text: #1a1a1a; --sub-text: #999; --border: #eee;
            --gold-gradient: linear-gradient(135deg, #fdfc47 0%, #bf9b30 50%, #fdfc47 100%);
            --gold-shine: linear-gradient(to right, #bf9b30 20%, #fdfc47 40%, #fdfc47 60%, #bf9b30 80%);
            --gold-text: #d4af37; --sale-red: #ff0000; --stock-green: #2ecc71; --stock-out-color: #666;
        }

        body.dark-theme { --bg: #0a0a0a; --card-bg: #161616; --text: #ffffff; --sub-text: #666; --border: #222; }
        
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        body.modal-open { overflow: hidden; }
        
        header { padding: 40px 20px 10px; text-align: center; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; margin-bottom: 25px; }
        .lang-switch button, .theme-toggle, .cart-btn { background: var(--card-bg); border: 1px solid var(--border); padding: 10px 15px; border-radius: 20px; font-size: 11px; font-weight: 800; color: var(--text); cursor: pointer; }
        .lang-switch button.active { background: var(--gold-gradient); color: #000; border: none; }
        
        .logo { font-size: 2.6em; font-weight: 900; letter-spacing: -2px; margin: 0; text-transform: lowercase; background: var(--gold-shine); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        
        .subtitle { font-size: 11px; color: var(--sub-text); text-transform: uppercase; letter-spacing: 1px; margin: 8px auto 25px; max-width: 80%; line-height: 1.5; }
        
        .controls { padding: 0 15px; max-width: 600px; margin: 20px auto; position: sticky; top: 15px; z-index: 100; }
        #searchInput { width: 100%; padding: 16px 25px; border-radius: 35px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .filter-section { padding: 10px 20px; text-align: center; }
        .filter-toggle-btn { background: var(--gold-gradient); color: #000; border: none; padding: 12px 30px; border-radius: 25px; font-weight: 800; cursor: pointer; }
        .filter-menu { display: none; padding: 15px; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .filter-menu.active { display: flex; }
        .f-btn { background: var(--card-bg); border: 1px solid var(--border); padding: 10px 18px; border-radius: 18px; color: var(--sub-text); font-size: 12px; font-weight: 700; cursor: pointer; }
        .f-btn.active { background: var(--gold-gradient); color: #000; border: none; }

        .section-header { padding: 25px 20px 5px; }
        .section-title { font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: var(--sub-text); border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 15px 20px; scrollbar-width: none; }
        .carousel::-webkit-scrollbar { display: none; }
        .carousel .card { min-width: 160px; flex: 0 0 160px; }

        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; padding-bottom: 100px; }
        
        .card { background: var(--card-bg); border-radius: 25px; padding: 15px; text-align: center; border: 1px solid var(--border); position: relative; transition: 0.3s; cursor: pointer; }
        .sale-badge { position: absolute; top: 12px; left: 12px; background: var(--sale-red); color: white; padding: 5px 10px; border-radius: 10px; font-size: 9px; font-weight: 900; z-index: 2; }
        
        .card-img { height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .card img { max-width: 100%; max-height: 100%; object-fit: contain; transition: 0.3s; }
        
        .brand { font-size: 10px; text-transform: uppercase; color: var(--sub-text); font-weight: 800; }
        .title { font-size: 13px; font-weight: 700; margin: 5px 0; height: 2.6em; overflow: hidden; line-height: 1.3; }
        .price { font-weight: 900; font-size: 15px; color: var(--gold-text); }
        
        /* MODAL */
        .modal { display: none; position: fixed; z-index: 3000; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--bg); width: 100%; max-width: 400px; max-height: 85vh; border-radius: 30px; padding: 30px 20px; border: 1px solid var(--border); text-align: center; position: relative; overflow-y: auto; }
        .close-modal { position: absolute; top: 15px; right: 15px; font-size: 24px; color: var(--text); cursor: pointer; width: 30px; height: 30px; line-height: 30px; }

        #m-img { max-height: 180px; margin-bottom: 15px; }
        .price-row { display: flex; justify-content: space-between; padding: 12px; background: var(--card-bg); border-radius: 15px; margin-bottom: 8px; font-size: 14px; }
        .old-p { text-decoration: line-through; color: var(--sub-text); font-size: 11px; margin-right: 5px; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 15px; border-radius: 15px; font-weight: 800; font-size: 12px; text-decoration: none; text-align: center; }
        .btn-tg { background: var(--border); color: var(--text); }
        .btn-inst { background: var(--gold-gradient); color: #000; }

        footer { padding: 40px 20px; text-align: center; border-top: 1px solid var(--border); font-size: 12px; color: var(--sub-text); }
        .footer-links { margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .footer-links a { color: var(--text); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body class="light-theme">

<header>
    <div class="top-bar">
        <div class="lang-switch">
            <button id="btn-pl" onclick="setLang('pl')">PL</button>
            <button id="btn-uk" onclick="setLang('uk')" class="active">UA</button>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
            <button class="cart-btn">🛍️ <span id="cart-count">0</span></button>
        </div>
    </div>
    <h1 class="logo">perfume.shoppee</h1>
    <p class="subtitle" id="h-sub"></p>
</header>

<div class="controls">
    <input type="text" id="searchInput" onkeyup="refresh()" placeholder="...">
</div>

<div id="dynamic-content"></div>

<div class="filter-section">
    <button class="filter-toggle-btn" onclick="toggleFilterMenu()" id="f-label">Фільтри ↓</button>
    <div class="filter-menu" id="filterMenu"></div>
</div>

<div id="catalog-area"></div>

<footer>
    <div class="footer-links">
        <a href="#">Про нас</a>
        <a href="#">Доставка</a>
        <a href="#">Контакти</a>
        <a href="https://t.me/elenafragrance">Telegram</a>
    </div>
    <div id="footer-copy">© 2026 perfume.shoppee. Luxury Edition</div>
</footer>

<div id="pModal" class="modal" onclick="if(event.target == this) closeModal()">
    <div class="modal-content">
        <div class="close-modal" onclick="closeModal()">✕</div>
        <img id="m-img" src="">
        <div id="m-brand" class="brand"></div>
        <h2 id="m-title" style="margin: 10px 0;"></h2>
        <p id="m-desc" style="font-size: 13px; color: var(--sub-text); line-height: 1.4;"></p>
        <div id="m-prices" style="margin-top: 20px;"></div>
        <div class="btn-group">
            <a href="#" id="m-tg" class="btn btn-tg">Telegram</a>
            <a href="#" id="m-inst" target="_blank" class="btn btn-inst">Instagram</a>
        </div>
    </div>
</div>

<script>
    const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQA6BrgyLNH6Jw3BOZKxMQ2X2MAJed7xT6CBepxG-c9D3qjKJJmPzwTPypMM3fxCLipzxHrq4exkdKS/pub?output=csv';
    const INSTA_URL = 'https://www.instagram.com/perfume.shoppee';
    const TG_NICK = "elenafragrance";

    let allProducts = [];
    let curLang = localStorage.getItem('lang') || 'uk';
    let curCat = 'all';

    const UI = {
        uk: { sub: "Тільки оригінальна продукція • Luxury Edition", search: "Пошук бренду...", from: "від", hits: "Хіти", news: "Новинки", sales: "Знижки %", catalog: "Каталог", sale_tag: "SALE", cats: {all: "Усі", female: "Жіночі", male: "Чоловічі", uniseks: "Унісекс", set: "Набори"} },
        pl: { sub: "Wyłącznie oryginalne produkty • Luxury Edition", search: "Szukaj marki...", from: "od", hits: "Hity", news: "Nowości", sales: "Promocje %", catalog: "Katalog", sale_tag: "SALE", cats: {all: "Wszystkie", female: "Damskie", male: "Męskie", uniseks: "Unisex", set: "Zestawy"} }
    };

    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark-theme');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.getElementById('themeBtn').innerText = isDark ? '☀️' : '🌙';
    }

    // Ініціалізація теми
    if(localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-theme');
        document.getElementById('themeBtn').innerText = '☀️';
    }

    function toggleFilterMenu() { document.getElementById('filterMenu').classList.toggle('active'); }

    async function init() {
        try {
            const resp = await fetch(SPREADSHEET_URL);
            const text = await resp.text();
            allProducts = parseCSV(text);
            setLang(curLang);
        } catch(e) { console.error("Data error"); }
    }

    function parseCSV(csv) {
        const lines = csv.split(/\r?\n/);
        const headers = lines[0].split(',').map(h => h.trim());
        return lines.slice(1).filter(l => l).map(line => {
            const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/^"|"$/g, '').trim());
            let obj = {};
            headers.forEach((h, i) => obj[h] = values[i] || "");
            return obj;
        });
    }

    function setLang(l) {
        curLang = l;
        localStorage.setItem('lang', l);
        document.querySelectorAll('.lang-switch button').forEach(b => b.classList.toggle('active', b.id === 'btn-'+l));
        document.getElementById('h-sub').innerText = UI[l].sub;
        document.getElementById('searchInput').placeholder = UI[l].search;
        renderFilters();
        refresh();
    }

    function renderFilters() {
        document.getElementById('filterMenu').innerHTML = Object.keys(UI[curLang].cats).map(k => `
            <button class="f-btn ${curCat===k?'active':''}" onclick="setCategory('${k}')">${UI[curLang].cats[k]}</button>
        `).join('');
    }

    function setCategory(k) {
        curCat = k;
        renderFilters();
        refresh();
        document.getElementById('filterMenu').classList.remove('active');
    }

    function refresh() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        let filtered = allProducts.filter(p => {
            const matchSearch = (p.brand + (curLang==='uk'?p.nameUK:p.namePL)).toLowerCase().includes(q);
            const matchCat = curCat === 'all' || p.category === curCat;
            return matchSearch && matchCat;
        });

        let content = '';
        if(curCat === 'all' && !q) {
            const hits = allProducts.filter(p => p.isBest === 'yes');
            const sales = allProducts.filter(p => p.old2ml || p.old10ml);
            if(hits.length) content += `<div class="section-header"><h2 class="section-title">${UI[curLang].hits} 🔥</h2></div><div class="carousel">${hits.map((p, i) => getCard(p)).join('')}</div>`;
            if(sales.length) content += `<div class="section-header"><h2 class="section-title" style="color:red">${UI[curLang].sales}</h2></div><div class="carousel">${sales.map((p, i) => getCard(p)).join('')}</div>`;
            content += `<div class="section-header"><h2 class="section-title">${UI[curLang].catalog}</h2></div>`;
        }
        
        document.getElementById('dynamic-content').innerHTML = content;
        document.getElementById('catalog-area').innerHTML = `<div class="product-grid">${filtered.map(p => getCard(p)).join('')}</div>`;
    }

    function getCard(p) {
        const hasSale = p.old2ml || p.old5ml || p.old10ml || p.oldFull;
        const name = curLang === 'uk' ? p.nameUK : p.namePL;
        // Використовуємо brand + name як унікальний ключ для пошуку в масиві при кліку
        return `
        <div class="card" onclick="openModalByName('${p.brand}', '${name}')">
            ${hasSale ? `<div class="sale-badge">${UI[curLang].sale_tag}</div>` : ''}
            <div class="card-img"><img src="${p.photo}" loading="lazy"></div>
            <div class="brand">${p.brand}</div>
            <div class="title">${name}</div>
            <div class="price">${UI[curLang].from} ${p.price2ml || p.price10ml} zł</div>
        </div>`;
    }

    function openModalByName(brand, name) {
        const p = allProducts.find(x => x.brand === brand && (x.nameUK === name || x.namePL === name));
        if(!p) return;

        document.getElementById('m-img').src = p.photo;
        document.getElementById('m-brand').innerText = p.brand;
        const finalName = curLang==='uk'?p.nameUK:p.namePL;
        document.getElementById('m-title').innerText = finalName;
        document.getElementById('m-desc').innerText = curLang==='uk'?p.descUK:p.descPL;
        
        let pr = '';
        const sizes = [
            {n:'2ml', v:p.price2ml, o:p.old2ml},
            {n:'5ml', v:p.price5ml, o:p.old5ml},
            {n:'10ml', v:p.price10ml, o:p.old10ml},
            {n:'Full', v:p.fullPrice, o:p.oldFull}
        ];
        
        sizes.forEach(s => {
            if(s.v) {
                pr += `<div class="price-row">
                    <span><b>${s.n}</b></span>
                    <span>${s.o ? `<span class="old-p">${s.o} zł</span>` : ''} <span style="color:var(--gold-text); font-weight:900">${s.v} zł</span></span>
                </div>`;
            }
        });

        document.getElementById('m-prices').innerHTML = pr;
        document.getElementById('m-tg').href = `https://t.me/${TG_NICK}?text=Замовлення: ${p.brand} ${finalName}`;
        document.getElementById('m-inst').href = INSTA_URL;
        document.getElementById('pModal').style.display = 'flex';
        document.body.classList.add('modal-open');
    }

    function closeModal() { 
        document.getElementById('pModal').style.display = 'none'; 
        document.body.classList.remove('modal-open');
    }

    init();
</script>
</body>
</html>
