<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>perfume.shoppee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap');
        :root { --brand-deep: #062C22; --brand-accent: #C5A059; --bg-light: #FDFCFB; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-light); color: var(--brand-deep); overflow-x: hidden; scroll-behavior: smooth; }
        .logo-font { font-family: 'Playfair Display', serif; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(6, 44, 34, 0.08); }
        .img-container { display: flex; align-items: center; justify-content: center; overflow: hidden; background: #f9f9f9; border-radius: 20px; padding: 12px; height: 180px; width: 100%; position: relative; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .product-title { font-size: 11px; font-weight: 700; line-height: 1.2; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 28px; }
        .scroll-x { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 12px; padding-bottom: 15px; }
        .scroll-x::-webkit-scrollbar { display: none; }
        .scroll-item { flex: 0 0 160px; scroll-snap-align: start; }
        .product-card { background: white; border-radius: 24px; border: 1px solid rgba(0,0,0,0.03); transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); position: relative; cursor: pointer; }
        .out-of-stock { opacity: 0.5; filter: grayscale(0.8); }
        .stock-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: #fff; font-size: 7px; padding: 4px 8px; border-radius: 8px; text-transform: uppercase; font-weight: 800; z-index: 10; }
        #sidebar { background: var(--brand-deep); position: fixed; top:0; left:0; height:100%; width:280px; z-index:1002; transform: translateX(-100%); transition: 0.4s; }
        #sidebar.open { transform: translateX(0); }
        .lang-node.active { background: var(--brand-accent); color: white; border-color: var(--brand-accent); }
        .cat-btn.active { background: var(--brand-deep) !important; color: white !important; }
        .price-new { color: #ef4444; font-weight: 900; }
        .price-old { color: #a3a3a3; text-decoration: line-through; font-size: 0.85em; margin-left: 5px; font-weight: 400; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<nav class="glass-nav sticky top-0 z-50 px-6 py-4">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <button onclick="toggleSidebar()" class="text-2xl"><i class="fa-solid fa-bars-staggered"></i></button>
    <span onclick="goHome()" class="text-xl font-bold logo-font cursor-pointer">perfume.shoppee</span>
    <button onclick="toggleCart()" class="relative"><i class="fa-solid fa-bag-shopping text-xl"></i><span id="cart-count" class="absolute -top-2 -right-2 bg-[#C5A059] text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center hidden">0</span></button>
  </div>
</nav>

<div class="px-6 py-4 bg-white">
    <div class="relative max-w-2xl mx-auto">
        <input id="searchInput" type="text" onkeyup="refreshCatalog()" class="w-full bg-neutral-100 rounded-2xl py-4 px-12 text-sm outline-none" placeholder="Пошук аромату...">
        <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-neutral-300 text-xs"></i>
    </div>
</div>

<div id="overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[1001] hidden"></div>
<div id="sidebar" class="p-8 flex flex-col text-white font-semibold">
    <div class="mb-8 flex justify-between items-center">
        <span class="logo-font text-lg">perfume.shoppee</span>
        <button onclick="toggleSidebar()" class="text-white/30"><i class="fa-solid fa-xmark text-xl"></i></button>
    </div>
    <div class="flex gap-2 mb-8">
        <button onclick="setLang('UA')" id="btn-ua" class="lang-node flex-1 py-2 rounded-xl border border-white/10 text-[10px] active">UA</button>
        <button onclick="setLang('PL')" id="btn-pl" class="lang-node flex-1 py-2 rounded-xl border border-white/10 text-[10px]">PL</button>
    </div>
    <nav class="space-y-6 text-[11px] uppercase tracking-widest">
        <a href="#" onclick="goHome(); toggleSidebar(); return false;" class="block">Головна</a>
        <a href="#" onclick="showAllCatalog(); toggleSidebar(); return false;" class="block">Каталог</a>
        <a href="#" onclick="filterBy('hit'); toggleSidebar(); return false;" class="block">Хіти</a>
        <a href="#" onclick="filterBy('new'); toggleSidebar(); return false;" class="block">Новинки</a>
        <a href="#" onclick="filterBy('sale'); toggleSidebar(); return false;" class="block text-red-400">Акції %</a>
    </nav>
</div>

<main class="max-w-7xl mx-auto pb-20">
    <div id="catalog-filters" class="hidden px-6 mb-6 overflow-x-auto no-scrollbar flex gap-2">
      <button onclick="setCategory('all')" id="cat-all" class="cat-btn px-6 py-2 bg-white border border-neutral-100 text-neutral-400 rounded-xl text-[9px] font-bold uppercase active">Усі</button>
      <button onclick="setCategory('female')" id="cat-female" class="cat-btn px-6 py-2 bg-white border border-neutral-100 text-neutral-400 rounded-xl text-[9px] font-bold uppercase">Жіночі</button>
      <button onclick="setCategory('male')" id="cat-male" class="cat-btn px-6 py-2 bg-white border border-neutral-100 text-neutral-400 rounded-xl text-[9px] font-bold uppercase">Чоловічі</button>
      <button onclick="setCategory('uniseks')" id="cat-uniseks" class="cat-btn px-6 py-2 bg-white border border-neutral-100 text-neutral-400 rounded-xl text-[9px] font-bold uppercase">Унісекс</button>
      <button onclick="setCategory('sets')" id="cat-sets" class="cat-btn px-6 py-2 bg-white border border-neutral-100 text-neutral-400 rounded-xl text-[9px] font-bold uppercase">Набори</button>
    </div>
    <div id="catalog-area" class="px-6"></div>
</main>

<div id="cart-panel" class="fixed top-0 right-0 h-full w-full max-w-md bg-white z-[10000] shadow-2xl transform translate-x-full transition-transform duration-500 flex flex-col">
    <div class="p-6 border-b flex justify-between items-center bg-[#062C22] text-white">
        <h2 class="text-[10px] font-bold uppercase tracking-widest">Ваш кошик</h2>
        <button onclick="toggleCart()"><i class="fa-solid fa-xmark text-xl"></i></button>
    </div>
    <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
    <div class="p-8 border-t bg-neutral-50">
        <div class="flex justify-between mb-6"><span class="text-[10px] font-bold uppercase text-neutral-400">Разом</span><span id="cart-total" class="text-xl font-bold">0 zł</span></div>
        <button onclick="sendOrder()" class="w-full bg-[#062C22] text-white py-5 rounded-2xl text-[10px] font-bold uppercase tracking-widest">Оформити в Telegram</button>
    </div>
</div>

<div id="pModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md z-[9999] flex items-center justify-center p-4" onclick="closeModal()">
  <div class="bg-white rounded-[32px] p-6 w-full max-w-[420px] relative overflow-y-auto max-h-[90vh]" onclick="event.stopPropagation()">
    <button onclick="closeModal()" class="absolute top-5 right-5 text-neutral-300"><i class="fa-solid fa-xmark text-xl"></i></button>
    <div class="flex flex-col items-center">
        <div class="img-container w-44 h-44 mb-6"><img id="m-img" src=""></div>
        <div id="m-brand" class="text-[8px] font-black text-[#C5A059] uppercase tracking-widest mb-1"></div>
        <h2 id="m-title" class="text-lg font-bold text-center mb-6 logo-font"></h2>
        <div class="w-full space-y-2 mb-8" id="m-prices"></div>
        <button id="add-to-cart-btn" class="w-full bg-[#062C22] text-white py-5 rounded-2xl text-[10px] font-bold uppercase">Додати в кошик</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQA6BrgyLNH6Jw3BOZKxMQ2X2MAJed7xT6CBepxG-c9D3qjKJJmPzwTPypMM3fxCLipzxHrq4exkdKS/pub?output=csv';
const TG_NICK = 'elenafragrance';

let allProducts = [], cart = JSON.parse(localStorage.getItem('ps_cart')) || [];
let curCat = 'all', currentFilter = 'home', currentLang = 'UA', selectedOption = null;

async function init() {
    try {
        const res = await fetch(SPREADSHEET_URL);
        const text = await res.text();
        allProducts = parseCSV(text).filter(p => p.brand);
        refreshCatalog();
        renderCart();
        AOS.init({ duration: 800, once: true });
    } catch (e) { console.error("Data error", e); }
}

function parseCSV(text) {
    let rows = [], row = [], col = '', q = false;
    for (let i = 0; i < text.length; i++) {
        let c = text[i], n = text[i+1];
        if (c === '"' && q && n === '"') { col += '"'; i++; }
        else if (c === '"') q = !q;
        else if (c === ',' && !q) { row.push(col.trim()); col = ''; }
        else if ((c === '\r' || c === '\n') && !q) {
            if (col || row.length) { row.push(col.trim()); rows.push(row); }
            row = []; col = ''; if (c === '\r' && n === '\n') i++;
        } else col += c;
    }
    if (col || row.length) { row.push(col.trim()); rows.push(row); }
    const h = rows[0];
    return rows.slice(1).map(r => {
        let o = {}; h.forEach((k, i) => o[k] = r[i] || "");
        return o;
    });
}

function refreshCatalog() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const area = document.getElementById('catalog-area');
    const filters = document.getElementById('catalog-filters');
    
    filters.classList.toggle('hidden', currentFilter !== 'all');

    if (currentFilter === 'home' && q === '') {
        const banner = allProducts.find(p => p.brand === "BANNER");
        const hits = allProducts.filter(p => p.isBest?.toLowerCase() === 'yes');
        const news = allProducts.filter(p => p.isNew?.toLowerCase() === 'yes');
        area.innerHTML = `
            ${banner ? `<div class="mb-10 rounded-[28px] overflow-hidden"><img src="${banner.photo}" class="w-full"></div>` : ''}
            <div class="mb-8"><h2 class="text-[10px] font-black uppercase opacity-40 mb-4">Хіти продажу</h2><div class="scroll-x">${renderList(hits, true)}</div></div>
            <div class="mb-8"><h2 class="text-[10px] font-black uppercase opacity-40 mb-4">Новинки</h2><div class="scroll-x">${renderList(news, true)}</div></div>
        `;
    } else {
        const filtered = allProducts.filter(p => {
            if(p.brand === "BANNER") return false;
            const name = (currentLang === 'UA' ? (p.nameUK || p.name) : (p.namePL || p.name)).toLowerCase();
            const matchSearch = (p.brand.toLowerCase() + ' ' + name).includes(q);
            const matchCat = curCat === 'all' || p.category?.toLowerCase() === curCat;
            let matchFilter = true;
            if (currentFilter === 'hit') matchFilter = p.isBest?.toLowerCase() === 'yes';
            if (currentFilter === 'new') matchFilter = p.isNew?.toLowerCase() === 'yes';
            if (currentFilter === 'sale') matchFilter = !!(p.old2ml || p.oldFull);
            return matchSearch && matchCat && matchFilter;
        });
        area.innerHTML = `<div class="grid grid-cols-2 gap-4">${renderList(filtered, false)}</div>`;
    }
    AOS.refresh();
}

function renderList(list, isScroll) {
    return list.map(p => {
        const avail = (p.status || "").toLowerCase() !== 'out';
        const name = currentLang === 'UA' ? (p.nameUK || p.name) : (p.namePL || p.name);
        const price = p.price2ml || p.fullPrice;
        return `
            <div onclick="openModal(${allProducts.indexOf(p)})" class="${isScroll ? 'scroll-item' : ''} product-card p-4 ${!avail ? 'out-of-stock' : ''}" data-aos="fade-up">
                <div class="img-container mb-3">
                    ${!avail ? `<div class="stock-badge">Sold</div>` : ''}
                    <img src="${p.photo}" loading="lazy">
                </div>
                <div class="text-[7px] font-black text-[#C5A059] uppercase mb-1">${p.brand}</div>
                <div class="product-title">${name}</div>
                <div class="text-[10px] font-black">${price} zł</div>
            </div>
        `;
    }).join('');
}

function openModal(idx) {
    const p = allProducts[idx]; selectedOption = null;
    document.getElementById('m-img').src = p.photo;
    document.getElementById('m-brand').innerText = p.brand;
    document.getElementById('m-title').innerText = currentLang === 'UA' ? (p.nameUK || p.name) : (p.namePL || p.name);
    
    let html = '';
    const sizes = [{l:'2ml', p:p.price2ml}, {l:'5ml', p:p.price5ml}, {l:'10ml', p:p.price10ml}, {l:'Full', p:p.fullPrice}];
    sizes.forEach(s => {
        if(s.p && s.p !== '---') {
            html += `<div onclick="selectSize(this, '${s.l}', '${s.p}', '${p.brand}', '${p.nameUK || p.name}', '${p.photo}')" class="border border-neutral-100 flex justify-between p-4 rounded-xl cursor-pointer text-xs font-bold">
                <span>${s.l}</span><span>${s.p} zł</span>
            </div>`;
        }
    });
    document.getElementById('m-prices').innerHTML = html;
    document.getElementById('pModal').classList.remove('hidden');
}

function selectSize(el, size, price, brand, name, img) {
    document.querySelectorAll('#m-prices div').forEach(d => d.style.borderColor = '#eee');
    el.style.borderColor = '#C5A059';
    selectedOption = { size, price, brand, name, img };
}

function addToCart() {
    if(!selectedOption) return;
    cart.push(selectedOption);
    localStorage.setItem('ps_cart', JSON.stringify(cart));
    renderCart(); closeModal(); toggleCart(true);
}

function renderCart() {
    const items = document.getElementById('cart-items');
    document.getElementById('cart-count').innerText = cart.length;
    document.getElementById('cart-count').classList.toggle('hidden', cart.length === 0);
    let total = 0;
    items.innerHTML = cart.map((item, i) => {
        total += parseFloat(item.price);
        return `<div class="flex justify-between items-center text-[10px] font-bold">
            <div>${item.brand} ${item.name} (${item.size})</div>
            <div class="flex items-center gap-4"><span>${item.price} zł</span><button onclick="removeFromCart(${i})"><i class="fa-solid fa-xmark"></i></button></div>
        </div>`;
    }).join('') || '<div class="text-center opacity-30 py-10">Кошик порожній</div>';
    document.getElementById('cart-total').innerText = total.toFixed(2) + ' zł';
}

function removeFromCart(i) { cart.splice(i, 1); localStorage.setItem('ps_cart', JSON.stringify(cart)); renderCart(); }
function sendOrder() {
    let t = "Нове замовлення:\n";
    cart.forEach(it => t += `- ${it.brand} ${it.name} (${it.size}): ${it.price} zł\n`);
    window.open(`https://t.me/${TG_NICK}?text=${encodeURIComponent(t)}`);
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('hidden'); }
function toggleCart(st) { document.getElementById('cart-panel').classList.toggle('translate-x-full', !st); if(st === undefined) document.getElementById('cart-panel').classList.toggle('translate-x-full');}
function closeModal() { document.getElementById('pModal').classList.add('hidden'); }
function setCategory(c) { curCat = c; document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.id === 'cat-'+c)); refreshCatalog(); }
function filterBy(f) { currentFilter = f; refreshCatalog(); toggleSidebar(); }
function goHome() { currentFilter = 'home'; refreshCatalog(); }
function showAllCatalog() { currentFilter = 'all'; curCat = 'all'; refreshCatalog(); }

document.getElementById('add-to-cart-btn').onclick = addToCart;
init();
</script>
</body>
</html>
