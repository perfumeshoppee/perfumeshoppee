<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>perfume.shoppee • Luxury Edition</title>
    <style>
        :root { 
            --bg: #ffffff; --card-bg: #f9f9f9; --text: #1a1a1a; --sub-text: #999; --border: #eee;
            --gold-gradient: linear-gradient(135deg, #fdfc47 0%, #bf9b30 50%, #fdfc47 100%);
            --gold-text: #d4af37; --sale-red: #ff0000; --stock-green: #2ecc71;
        }

        body.dark-theme { --bg: #0a0a0a; --card-bg: #161616; --text: #ffffff; --sub-text: #666; --border: #222; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }
        body.modal-open { overflow: hidden; }
        
        header { padding: 30px 20px 10px; text-align: center; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto 20px; }
        
        .lang-switch button, .theme-toggle, .cart-btn { 
            background: var(--card-bg); border: 1px solid var(--border); padding: 8px 15px; 
            border-radius: 20px; font-size: 11px; font-weight: 800; color: var(--text); cursor: pointer; 
        }
        .lang-switch button.active { background: var(--gold-gradient); color: #000; border: none; }
        
        .logo { font-size: 2.2em; font-weight: 900; letter-spacing: -1.5px; margin: 0; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 10px; color: var(--sub-text); text-transform: uppercase; margin-top: 5px; letter-spacing: 1px; }
        
        .controls { padding: 0 15px; max-width: 600px; margin: 20px auto; position: sticky; top: 10px; z-index: 100; }
        #searchInput { width: 100%; padding: 14px 20px; border-radius: 30px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-shadow: 0 5px 20px rgba(0,0,0,0.05); outline: none; box-sizing: border-box; }
        
        .filter-section { text-align: center; margin: 15px 0; }
        .filter-menu { display: flex; overflow-x: auto; gap: 8px; padding: 10px 15px; scrollbar-width: none; justify-content: start; }
        .filter-menu::-webkit-scrollbar { display: none; }
        .f-btn { background: var(--card-bg); border: 1px solid var(--border); padding: 8px 16px; border-radius: 15px; color: var(--sub-text); font-size: 12px; white-space: nowrap; cursor: pointer; font-weight: 600; }
        .f-btn.active { background: var(--gold-gradient); color: #000; border: none; }

        .section-header { padding: 20px 20px 0; text-align: left; }
        .section-title { font-size: 13px; font-weight: 900; text-transform: uppercase; color: var(--sub-text); letter-spacing: 1px; }
        
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 15px 20px; scrollbar-width: none; }
        .carousel::-webkit-scrollbar { display: none; }
        
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        
        .card { background: var(--card-bg); border-radius: 20px; padding: 12px; text-align: center; border: 1px solid var(--border); position: relative; cursor: pointer; display: flex; flex-direction: column; }
        .card-img { height: 110px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .card img { max-width: 90%; max-height: 90%; object-fit: contain; }
        
        .brand { font-size: 9px; font-weight: 800; color: var(--sub-text); text-transform: uppercase; }
        .title { font-size: 12px; font-weight: 700; margin: 4px 0; height: 2.6em; overflow: hidden; line-height: 1.3; }
        .price { font-weight: 900; font-size: 14px; color: var(--gold-text); margin-top: auto; }
        
        .modal { display: none; position: fixed; z-index: 2000; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: var(--bg); width: 100%; max-width: 380px; max-height: 90vh; border-radius: 25px; padding: 25px; position: relative; overflow-y: auto; text-align: center; }
        .close-btn { position: absolute; top: 15px; right: 15px; font-size: 20px; cursor: pointer; color: var(--text); }
        
        .price-list { margin: 20px 0; text-align: left; }
        .price-item { display: flex; justify-content: space-between; padding: 10px; background: var(--card-bg); border-radius: 12px; margin-bottom: 6px; font-size: 13px; }
        
        .btn-buy { background: var(--gold-gradient); color: #000; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="top-bar">
        <div class="lang-switch">
            <button id="btn-uk" onclick="setLang('uk')">UA</button>
            <button id="btn-pl" onclick="setLang('pl')">PL</button>
        </div>
        <div style="display:flex; gap:8px;">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
            <button class="cart-btn" onclick="alert('Кошик у розробці')">🛍️ <span id="cart-count">0</span></button>
        </div>
    </div>
    <h1 class="logo">perfume.shoppee</h1>
    <p class="subtitle" id="h-sub"></p>
</header>

<div class="controls">
    <input type="text" id="searchInput" onkeyup="refresh()" placeholder="Пошук...">
</div>

<div class="filter-section">
    <div class="filter-menu" id="filterMenu"></div>
</div>

<div id="dynamic-content"></div>
<div id="catalog-area"></div>

<div id="pModal" class="modal" onclick="if(event.target == this) closeModal()">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">✕</span>
        <img id="m-img" style="max-height: 150px; margin-bottom: 15px;">
        <div id="m-brand" class="brand"></div>
        <h3 id="m-title" style="margin: 10px 0;"></h3>
        <p id="m-desc" style="font-size: 12px; color: var(--sub-text); line-height: 1.4;"></p>
        <div class="price-list" id="m-prices"></div>
        <button class="btn-buy" id="btn-order">Замовити у Telegram</button>
    </div>
</div>

<script>
    const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQA6BrgyLNH6Jw3BOZKxMQ2X2MAJed7xT6CBepxG-c9D3qjKJJmPzwTPypMM3fxCLipzxHrq4exkdKS/pub?output=csv';
    
    let allProducts = [];
    let curLang = localStorage.getItem('lang') || 'uk';
    let curCat = 'all';

    const UI = {
        uk: { sub: "Тільки оригінальна продукція", hits: "Хіти", catalog: "Каталог", cats: {all: "Усі", female: "Жіночі", male: "Чоловічі", uniseks: "Унісекс", set: "Набори"} },
        pl: { sub: "Wyłącznie oryginalne produkty", hits: "Hity", catalog: "Katalog", cats: {all: "Wszystkie", female: "Damskie", male: "Męskie", uniseks: "Unisex", set: "Zestawy"} }
    };

    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark-theme');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.getElementById('themeBtn').innerText = isDark ? '☀️' : '🌙';
    }

    if(localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-theme');
        document.getElementById('themeBtn').innerText = '☀️';
    }

    async function init() {
        try {
            const res = await fetch(SPREADSHEET_URL + '&cache=' + Date.now());
            const text = await res.text();
            allProducts = parseCSV(text);
            if(allProducts.length === 0) throw "Empty data";
            setLang(curLang);
        } catch(e) {
            document.getElementById('catalog-area').innerHTML = `<p style="text-align:center; padding:20px;">Помилка завантаження даних. Перевірте посилання на таблицю.</p>`;
        }
    }

    function parseCSV(csv) {
        const rows = [];
        let curCell = '', inQuotes = false;
        for (let i = 0; i < csv.length; i++) {
            let c = csv[i], next = csv[i+1];
            if (c === '"' && inQuotes && next === '"') { curCell += '"'; i++; }
            else if (c === '"') inQuotes = !inQuotes;
            else if (c === ',' && !inQuotes) { rows[rows.length - 1]?.push(curCell) || rows.push([curCell]); curCell = ''; }
            else if ((c === '\n' || c === '\r') && !inQuotes) {
                if (curCell !== '' || csv[i-1] === ',') { rows[rows.length - 1]?.push(curCell) || rows.push([curCell]); }
                curCell = ''; rows.push([]); if(c === '\r' && next === '\n') i++;
            } else curCell += c;
        }
        if (curCell) rows[rows.length - 1]?.push(curCell);
        
        const h = rows[0].map(v => v.trim());
        return rows.slice(1).filter(r => r.length > 1).map(r => {
            let o = {}; h.forEach((key, idx) => o[key] = r[idx]?.trim() || ""); return o;
        });
    }

    function setLang(l) {
        curLang = l;
        localStorage.setItem('lang', l);
        document.getElementById('btn-uk').className = l === 'uk' ? 'active' : '';
        document.getElementById('btn-pl').className = l === 'pl' ? 'active' : '';
        document.getElementById('h-sub').innerText = UI[l].sub;
        renderFilters();
        refresh();
    }

    function renderFilters() {
        const menu = document.getElementById('filterMenu');
        menu.innerHTML = Object.keys(UI[curLang].cats).map(k => `
            <button class="f-btn ${curCat===k?'active':''}" onclick="setCategory('${k}')">${UI[curLang].cats[k]}</button>
        `).join('');
    }

    function setCategory(k) {
        curCat = k;
        renderFilters();
        refresh();
    }

    function refresh() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allProducts.filter(p => {
            const name = (curLang === 'uk' ? p.nameUK : p.namePL).toLowerCase();
            return (p.brand.toLowerCase().includes(q) || name.includes(q)) && (curCat === 'all' || p.category === curCat);
        });

        let html = '';
        if(curCat === 'all' && !q) {
            const hits = allProducts.filter(p => p.isBest === 'yes');
            if(hits.length) {
                html += `<div class="section-header"><h2 class="section-title">${UI[curLang].hits} 🔥</h2></div>
                         <div class="carousel">${hits.map(p => getCard(p)).join('')}</div>`;
            }
            html += `<div class="section-header"><h2 class="section-title">${UI[curLang].catalog}</h2></div>`;
        }

        document.getElementById('dynamic-content').innerHTML = html;
        document.getElementById('catalog-area').innerHTML = `<div class="product-grid">${filtered.map(p => getCard(p)).join('')}</div>`;
    }

    function getCard(p) {
        const name = curLang === 'uk' ? p.nameUK : p.namePL;
        return `
            <div class="card" onclick="openModal('${p.brand}', '${name.replace(/'/g, "\\'")}')">
                <div class="card-img"><img src="${p.photo}" loading="lazy"></div>
                <div class="brand">${p.brand}</div>
                <div class="title">${name}</div>
                <div class="price">${p.price2ml || p.price10ml} zł</div>
            </div>`;
    }

    function openModal(brand, name) {
        const p = allProducts.find(x => x.brand === brand && (x.nameUK === name || x.namePL === name));
        if(!p) return;

        document.getElementById('m-img').src = p.photo;
        document.getElementById('m-brand').innerText = p.brand;
        document.getElementById('m-title').innerText = curLang === 'uk' ? p.nameUK : p.namePL;
        document.getElementById('m-desc').innerText = curLang === 'uk' ? p.descUK : p.descPL;
        
        let pr = '';
        const sizes = [['2ml', p.price2ml, p.old2ml], ['5ml', p.price5ml, p.old5ml], ['10ml', p.price10ml, p.old10ml], ['Full', p.fullPrice, p.oldFull]];
        sizes.forEach(s => {
            if(s[1]) pr += `<div class="price-item"><span>${s[0]}</span><span>${s[2] ? `<s style="font-size:10px; opacity:0.5;">${s[2]}</s> ` : ''}<b>${s[1]} zł</b></span></div>`;
        });
        
        document.getElementById('m-prices').innerHTML = pr;
        document.getElementById('btn-order').onclick = () => {
            window.open(`https://t.me/elenafragrance?text=Замовлення: ${brand} ${name}`, '_blank');
        };

        document.getElementById('pModal').style.display = 'flex';
        document.body.classList.add('modal-open');
    }

    function closeModal() {
        document.getElementById('pModal').style.display = 'none';
        document.body.classList.remove('modal-open');
    }

    window.onload = init;
</script>
</body>
</html>
