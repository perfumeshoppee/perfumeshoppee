<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>perfume.shoppee — Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .logo-font { font-family: Georgia, serif; letter-spacing: -1px; }
        #sidebar { transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        #sidebar.open { transform: translateX(0); }
        .overlay { display: none; background: rgba(0,0,0,0.6); position: fixed; inset: 0; z-index: 1001; backdrop-filter: blur(4px); }
        .overlay.show { display: block; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card-anim { animation: fadeInUp 0.4s ease forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .cart-badge { animation: bounce 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.4); } }
    </style>
</head>
<body class="bg-[#F8F9FA] dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors">

<div class="bg-white dark:bg-gray-900 border-b sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
    <button onclick="toggleSidebar()" class="text-2xl p-1"><i class="fas fa-bars"></i></button>
    <span onclick="goHome()" class="text-2xl font-bold logo-font cursor-pointer">perfume.shoppee</span>
    <button onclick="toggleCart()" class="relative p-1">
        <i class="fas fa-shopping-bag text-2xl"></i>
        <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 rounded-full flex items-center justify-center hidden">0</span>
    </button>
  </div>
</div>

<header id="main-header-bar" class="bg-black text-white p-4">
  <div class="max-w-7xl mx-auto">
    <div class="relative mb-5">
        <input id="searchInput" type="text" onkeyup="refreshCatalog()" 
               class="w-full bg-white text-black rounded-2xl py-3.5 px-6 pl-12 text-base focus:ring-2 focus:ring-teal-500 outline-none"
               placeholder="Пошук парфумів або брендів...">
        <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
    </div>
    
    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
      <button onclick="setCategory('all')" class="cat-btn px-5 py-2.5 bg-white/20 rounded-xl text-xs font-bold whitespace-nowrap active:bg-white active:text-black">УСІ</button>
      <button onclick="setCategory('female')" class="cat-btn px-5 py-2.5 bg-white/10 rounded-xl text-xs font-bold whitespace-nowrap">ДЛЯ НЕЇ</button>
      <button onclick="setCategory('male')" class="cat-btn px-5 py-2.5 bg-white/10 rounded-xl text-xs font-bold whitespace-nowrap">ДЛЯ НЬОГО</button>
      <button onclick="setCategory('unisex')" class="cat-btn px-5 py-2.5 bg-white/10 rounded-xl text-xs font-bold whitespace-nowrap">УНІСЕКС</button>
      <button onclick="setCategory('set')" class="cat-btn px-5 py-2.5 bg-white/10 rounded-xl text-xs font-bold whitespace-nowrap border border-teal-500/50">НАБОРИ 🎁</button>
    </div>
  </div>
</header>

<div id="sort-bar" class="max-w-7xl mx-auto px-4 py-3 flex justify-end gap-4 text-[11px] font-bold text-gray-500">
    <button onclick="setSort('cheap')">СПОЧАТКУ ДЕШЕВШІ</button>
    <button onclick="setSort('expensive')">СПОЧАТКУ ДОРОЖЧІ</button>
</div>

<div id="overlay" onclick="toggleSidebar()" class="overlay"></div>
<div id="sidebar" class="fixed top-0 left-0 h-full w-[85%] max-w-[320px] bg-white dark:bg-gray-900 z-[1002] shadow-2xl flex flex-col">
  <div class="bg-[#222] text-white p-5 flex justify-between items-center">
    <div class="flex items-center gap-3"><i class="fas fa-circle-user text-2xl text-teal-400"></i><span class="font-bold">Мій кабінет</span></div>
    <div class="flex items-center gap-4">
        <button onclick="toggleTheme()" class="text-xl">🌙</button>
        <button onclick="toggleSidebar()" class="text-xl">✕</button>
    </div>
  </div>
  <div class="flex-1 overflow-y-auto">
    <div class="p-6">
        <div class="flex gap-4 mb-8">
            <button onclick="setLang('uk')" class="flex-1 py-2 rounded-lg border-2 border-teal-500 font-bold text-xs">UA</button>
            <button onclick="setLang('pl')" class="flex-1 py-2 rounded-lg border-2 border-gray-200 font-bold text-xs text-gray-400">PL</button>
        </div>
        <nav class="space-y-1">
            <a href="#" onclick="goHome(); toggleSidebar(); return false;" class="flex items-center gap-4 py-4 border-b border-gray-50 dark:border-gray-800 font-bold"><i class="fas fa-house text-teal-500"></i> Головна</a>
            <a href="#" onclick="showBrands(); toggleSidebar(); return false;" class="flex items-center gap-4 py-4 border-b border-gray-50 dark:border-gray-800 font-bold"><i class="fas fa-tag text-teal-500"></i> Бренди</a>
            <a href="#" onclick="showSales(); toggleSidebar(); return false;" class="flex items-center gap-4 py-4 border-b border-gray-50 dark:border-gray-800 font-bold text-red-500"><i class="fas fa-fire"></i> Акції та знижки</a>
            <a href="#" onclick="showNews(); toggleSidebar(); return false;" class="flex items-center gap-4 py-4 border-b border-gray-50 dark:border-gray-800 font-bold"><i class="fas fa-star text-teal-500"></i> Новинки</a>
        </nav>
    </div>
  </div>
  <div class="p-6 bg-gray-50 dark:bg-gray-800">
    <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-1">Підтримка</p>
    <a href="https://t.me/elenafragrance" class="text-lg font-black tracking-tight">@elenafragrance</a>
  </div>
</div>

<main class="max-w-7xl mx-auto pb-24">
    <div id="page-header" class="px-4 py-6">
        <h1 id="page-title" class="text-2xl font-black">Каталог парфумів</h1>
        <p id="page-subtitle" class="text-gray-400 text-xs mt-1">Знайдіть свій ідеальний аромат</p>
    </div>
    <div id="dynamic-content"></div>
    <div id="catalog-area" class="px-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
</main>

<div id="cart-panel" class="fixed top-0 right-0 h-full w-full max-w-md bg-white dark:bg-gray-900 z-[10000] shadow-2xl transform translate-x-full transition-transform duration-300 flex flex-col">
    <div class="p-5 border-b flex justify-between items-center bg-gray-50 dark:bg-gray-800">
        <h2 class="text-xl font-black uppercase">Мій кошик</h2>
        <button onclick="toggleCart()" class="text-2xl">✕</button>
    </div>
    <div id="cart-items" class="flex-1 overflow-y-auto p-5 space-y-4"></div>
    <div class="p-6 border-t dark:border-gray-800 bg-white dark:bg-gray-900">
        <div class="flex justify-between items-center mb-6">
            <span class="text-gray-400 font-bold">ЗАГАЛОМ:</span>
            <span id="cart-total" class="text-2xl font-black text-teal-600">0 zł</span>
        </div>
        <button onclick="sendOrder()" class="w-full bg-black text-white py-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-transform flex items-center justify-center gap-3">
            <i class="fab fa-telegram-plane text-xl"></i> ОФОРМИТИ ЗАМОВЛЕННЯ
        </button>
    </div>
</div>

<div id="pModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999] p-4 backdrop-blur-md" onclick="closeModal()">
  <div class="bg-white dark:bg-gray-900 w-full max-w-lg rounded-[40px] p-8 relative max-h-[92vh] overflow-y-auto scrollbar-hide" onclick="event.stopPropagation()">
    <button onclick="closeModal()" class="absolute top-6 right-6 text-2xl text-gray-300">✕</button>
    <div class="flex flex-col md:flex-row gap-8">
        <div class="md:w-1/2">
            <img id="m-img" class="w-full aspect-square object-contain rounded-3xl bg-gray-50 p-4" src="">
        </div>
        <div class="md:w-1/2">
            <div id="m-brand" class="text-xs uppercase font-black text-teal-500 tracking-widest mb-1"></div>
            <h2 id="m-title" class="text-3xl font-black mb-4 leading-tight tracking-tighter"></h2>
            <div id="m-stock" class="mb-6"></div>
            <p id="m-desc" class="text-sm text-gray-500 leading-relaxed mb-8"></p>
            
            <div id="m-prices" class="space-y-4 mb-8"></div>
            
            <button id="add-to-cart-btn" class="w-full bg-teal-500 text-white py-5 rounded-2xl font-black text-sm shadow-lg shadow-teal-500/30 active:scale-95 transition-all">ДОДАТИ В КОШИК</button>
        </div>
    </div>
  </div>
</div>

<script>
const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQA6BrgyLNH6Jw3BOZKxMQ2X2MAJed7xT6CBepxG-c9D3qjKJJmPzwTPypMM3fxCLipzxHrq4exkdKS/pub?output=csv';
const TG_NICK = 'elenafragrance';

let allProducts = [];
let cart = JSON.parse(localStorage.getItem('ps_cart')) || [];
let curLang = 'uk';
let curCat = 'all';
let curSort = 'none';

async function init() {
    try {
        const res = await fetch(SPREADSHEET_URL);
        const text = await res.text();
        allProducts = parseCSV(text);
        renderCart();
        refreshCatalog();
    } catch (e) { console.error("CSV Error"); }
}

function parseCSV(text) {
    const p = (csv) => {
        let rows = [], row = [], col = '', inQuotes = false;
        for (let i = 0; i < csv.length; i++) {
            let char = csv[i], next = csv[i+1];
            if (char === '"' && inQuotes && next === '"') { col += '"'; i++; }
            else if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { row.push(col.trim()); col = ''; }
            else if ((char === '\r' || char === '\n') && !inQuotes) {
                if (col || row.length) { row.push(col.trim()); rows.push(row); }
                row = []; col = ''; if (char === '\r' && next === '\n') i++;
            } else col += char;
        }
        if (col || row.length) { row.push(col.trim()); rows.push(row); }
        return rows;
    };
    const data = p(text);
    const h = data[0];
    return data.slice(1).map(r => {
        let o = {}; h.forEach((k, i) => o[k] = r[i] || "");
        return o;
    });
}

function refreshCatalog() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allProducts.filter(p => {
        const name = curLang === 'uk' ? (p.nameUK || p.name) : (p.namePL || p.name);
        const matchSearch = (p.brand + ' ' + name).toLowerCase().includes(q);
        const matchCat = curCat === 'all' || p.category === curCat;
        return matchSearch && matchCat;
    });

    if (curSort === 'cheap') filtered.sort((a,b) => parseFloat(a.price2ml || a.fullPrice) - parseFloat(b.price2ml || b.fullPrice));
    if (curSort === 'expensive') filtered.sort((a,b) => parseFloat(b.price2ml || b.fullPrice) - parseFloat(a.price2ml || a.fullPrice));

    const container = document.getElementById('catalog-area');
    container.innerHTML = filtered.map((p, index) => renderCard(p, index)).join('');
}

function renderCard(p, i) {
    const name = curLang === 'uk' ? (p.nameUK || p.name) : (p.namePL || p.name);
    const price = p.price2ml || p.fullPrice || '---';
    const hasSale = !!(p.old2ml || p.oldFull);
    const isNew = p.isNew?.toLowerCase() === 'yes';
    
    return `
    <div onclick="openModal(${allProducts.indexOf(p)})" class="card-anim bg-white dark:bg-gray-900 rounded-[30px] p-4 shadow-sm border border-transparent hover:border-teal-500 transition-all cursor-pointer relative group" style="animation-delay: ${i * 0.05}s">
        ${hasSale ? `<div class="absolute top-3 left-3 bg-red-500 text-white text-[9px] font-black px-2.5 py-1 rounded-full z-10 shadow-lg">SALE</div>` : ''}
        ${isNew ? `<div class="absolute top-3 right-3 bg-teal-500 text-white text-[9px] font-black px-2.5 py-1 rounded-full z-10 shadow-lg">NEW</div>` : ''}
        <div class="aspect-[4/5] mb-4 bg-[#F3F4F6] dark:bg-gray-800 rounded-[24px] flex items-center justify-center p-4 overflow-hidden group-hover:scale-[1.02] transition-transform">
            <img src="${p.photo}" class="max-h-full object-contain" loading="lazy">
        </div>
        <div class="text-[10px] text-teal-500 uppercase font-black tracking-widest mb-1">${p.brand}</div>
        <div class="text-sm font-bold truncate dark:text-white">${name}</div>
        <div class="mt-3 flex justify-between items-center">
            <div class="text-lg font-black text-gray-900 dark:text-white">${price} <span class="text-xs font-normal">zł</span></div>
            <div class="w-8 h-8 bg-black dark:bg-white dark:text-black text-white rounded-full flex items-center justify-center text-xs"><i class="fas fa-plus"></i></div>
        </div>
    </div>`;
}

// ЛОГІКА КОШИКА
let selectedOption = null;

function openModal(index) {
    const p = allProducts[index];
    const name = curLang === 'uk' ? (p.nameUK || p.name) : (p.namePL || p.name);
    selectedOption = null;

    document.getElementById('m-img').src = p.photo;
    document.getElementById('m-brand').innerText = p.brand;
    document.getElementById('m-title').innerText = name;
    document.getElementById('m-desc').innerText = curLang === 'uk' ? (p.descUK || p.desc) : (p.descPL || p.desc);
    
    let prHtml = '';
    const options = [
        { l: '2ml', p: p.price2ml }, { l: '5ml', p: p.price5ml }, 
        { l: '10ml', p: p.price10ml }, { l: 'Флакон', p: p.fullPrice }
    ];

    options.forEach(opt => {
        if (opt.p && opt.p !== '---') {
            prHtml += `
            <div onclick="selectPrice(this, '${opt.l}', '${opt.p}', '${p.brand}', '${name}', '${p.photo}')" class="price-opt flex justify-between p-4 border-2 border-gray-100 dark:border-gray-800 rounded-2xl cursor-pointer hover:border-teal-500 transition-all">
                <span class="font-bold">${opt.l}</span>
                <span class="font-black text-teal-600">${opt.p} zł</span>
            </div>`;
        }
    });

    document.getElementById('m-prices').innerHTML = prHtml;
    document.getElementById('add-to-cart-btn').onclick = () => addToCart();
    document.getElementById('pModal').classList.remove('hidden');
}

function selectPrice(el, size, price, brand, name, img) {
    document.querySelectorAll('.price-opt').forEach(opt => opt.classList.remove('border-teal-500', 'bg-teal-50 dark:bg-teal-900/20'));
    el.classList.add('border-teal-500', 'bg-teal-50 dark:bg-teal-900/20');
    selectedOption = { size, price, brand, name, img, id: Date.now() };
}

function addToCart() {
    if (!selectedOption) return alert("Оберіть об'єм!");
    cart.push(selectedOption);
    saveCart();
    renderCart();
    closeModal();
    toggleCart(true);
}

function renderCart() {
    const container = document.getElementById('cart-items');
    const badge = document.getElementById('cart-count');
    
    badge.innerText = cart.length;
    badge.classList.toggle('hidden', cart.length === 0);
    badge.classList.add('cart-badge');
    setTimeout(() => badge.classList.remove('cart-badge'), 300);

    let total = 0;
    container.innerHTML = cart.map((item, i) => {
        total += parseFloat(item.price);
        return `
        <div class="flex gap-4 bg-gray-50 dark:bg-gray-800 p-4 rounded-3xl relative group">
            <img src="${item.img}" class="w-20 h-20 object-contain bg-white rounded-xl p-2">
            <div class="flex-1">
                <div class="text-[10px] font-black text-teal-500 uppercase">${item.brand}</div>
                <div class="text-sm font-bold leading-tight mb-1">${item.name}</div>
                <div class="flex justify-between items-center">
                    <span class="text-xs text-gray-400">Об'єм: ${item.size}</span>
                    <span class="font-black">${item.price} zł</span>
                </div>
            </div>
            <button onclick="removeFromCart(${i})" class="absolute -top-2 -right-2 bg-white dark:bg-gray-700 w-8 h-8 rounded-full shadow-md flex items-center justify-center text-xs">✕</button>
        </div>`;
    }).join('');
    
    document.getElementById('cart-total').innerText = total.toFixed(2) + ' zł';
}

function sendOrder() {
    if (cart.length === 0) return alert("Кошик порожній!");
    let text = "👋 Нове замовлення!\n\n";
    let total = 0;
    cart.forEach((item, i) => {
        text += `${i+1}. ${item.brand} ${item.name}\n   Об'єм: ${item.size} — ${item.price} zł\n\n`;
        total += parseFloat(item.price);
    });
    text += `💰 Разом: ${total.toFixed(2)} zł`;
    window.open(`https://t.me/${TG_NICK}?text=${encodeURIComponent(text)}`, '_blank');
}

// ІНШІ ФУНКЦІЇ
function setCategory(cat) {
    curCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.replace('bg-white', 'bg-white/10'));
    refreshCatalog();
}
function setSort(s) { curSort = s; refreshCatalog(); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
function toggleCart(open = null) {
    const p = document.getElementById('cart-panel');
    const isVisible = p.classList.contains('translate-x-0');
    if (open === true || !isVisible) p.classList.replace('translate-x-full', 'translate-x-0');
    else p.classList.replace('translate-x-0', 'translate-x-full');
}
function closeModal() { document.getElementById('pModal').classList.add('hidden'); }
function removeFromCart(i) { cart.splice(i, 1); saveCart(); renderCart(); }
function saveCart() { localStorage.setItem('ps_cart', JSON.stringify(cart)); }
function goHome() { document.getElementById('searchInput').value = ''; curCat = 'all'; refreshCatalog(); }
function toggleTheme() { document.documentElement.classList.toggle('dark'); }

init();
</script>
</body>
</html>
