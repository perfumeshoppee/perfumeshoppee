<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>perfume.shoppee • Luxury Shop</title>
    <style>
        :root { --gold: #d4af37; --gold-dark: #aa882c; --text: #1a1a1a; --sub: #777; --bg: #ffffff; --card: #fcfcfc; --sale: #e74c3c; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; background: var(--bg); color: var(--text); -webkit-tap-highlight-color: transparent; line-height: 1.4; overflow-x: hidden; }
        
        /* Плавна поява */
        .fade-in { animation: fadeIn 0.6s ease forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        header { padding: 40px 20px 10px; text-align: center; }
        .lang-switch { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .lang-switch button { background: #f5f5f5; border: none; padding: 10px 20px; border-radius: 25px; font-size: 11px; font-weight: 800; color: #aaa; cursor: pointer; transition: 0.3s; }
        .lang-switch button.active { background: var(--text); color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .logo { font-size: 2.4em; font-weight: 900; letter-spacing: -2px; margin: 0; color: var(--text); text-transform: lowercase; }
        .subtitle { font-size: 13px; color: var(--sub); margin: 8px auto 25px; max-width: 250px; }

        .controls { padding: 0 15px; max-width: 600px; margin: 0 auto; position: sticky; top: 10px; z-index: 100; }
        #searchInput { width: 100%; padding: 16px 25px; border-radius: 35px; border: 1px solid #eee; font-size: 16px; outline: none; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); box-sizing: border-box; }
        
        .filter-section { padding: 25px 20px 10px; display: flex; justify-content: center; }
        .filter-toggle-btn { background: #f5f5f5; color: var(--text); border: none; padding: 12px 30px; border-radius: 25px; font-weight: 800; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .filter-toggle-btn:active { transform: scale(0.95); }
        
        .filter-menu { display: none; padding: 10px 20px; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 10px; }
        .filter-menu.active { display: flex; animation: slideDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slideDown { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .f-btn { background: #fff; border: 1px solid #eee; padding: 10px 18px; border-radius: 18px; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .f-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

        .section-header { padding: 0 25px; margin-top: 30px; }
        .section-title { font-size: 1.2em; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: #ccc; }
        
        .carousel { display: flex; overflow-x: auto; gap: 18px; padding: 15px 20px 25px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .carousel::-webkit-scrollbar { display: none; }
        .carousel .card { flex: 0 0 170px; }

        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 15px 100px; }
        
        .card { background: var(--card); border-radius: 25px; padding: 15px; text-align: center; border: 1px solid #f8f8f8; position: relative; display: flex; flex-direction: column; min-height: 270px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .card:active { transform: scale(0.97); }
        .card-img { height: 130px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
        .card img { max-width: 90%; max-height: 90%; object-fit: contain; }
        
        .status-badge { position: absolute; top: 12px; right: 12px; font-size: 8px; background: rgba(255,255,255,0.8); padding: 4px 8px; border-radius: 10px; font-weight: 800; border: 1px solid #eee; }
        .sale-badge { position: absolute; top: 12px; left: 12px; font-size: 9px; background: var(--sale); color: #fff; padding: 4px 10px; border-radius: 10px; font-weight: 900; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); }

        .brand { font-size: 10px; text-transform: uppercase; color: #bbb; font-weight: 800; margin-top: auto; letter-spacing: 1px; }
        .title { font-size: 14px; font-weight: 700; margin: 6px 0; height: 2.8em; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; color: #333; }
        
        .price-wrapper { margin-top: 5px; }
        .price { font-weight: 900; font-size: 15px; color: var(--text); }
        .price.sale { color: var(--sale); }

        /* MODAL GLASSMORPHISM */
        .modal { display: none; position: fixed; z-index: 3000; inset: 0; background: rgba(255,255,255,0.4); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .modal-content { background: #fff; width: 92%; max-width: 400px; margin: auto; position: relative; top: 50%; transform: translateY(-50%); border-radius: 35px; padding: 30px; box-sizing: border-box; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.3); }
        #m-img { max-height: 180px; margin-bottom: 20px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1)); }
        .price-list { background: #f9f9f9; padding: 18px; border-radius: 20px; margin: 20px 0; text-align: left; }
        .price-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 10px; align-items: center; }
        .m-old-p { text-decoration: line-through; color: #bbb; font-size: 12px; margin-right: 8px; }
        .m-new-p { color: var(--sale); font-weight: 900; font-size: 16px; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { padding: 16px; border-radius: 20px; text-decoration: none; font-weight: 800; font-size: 14px; color: #fff; transition: 0.3s; }
        .btn-tg { background: #222; }
        .btn-inst { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<header>
    <div class="lang-switch">
        <button id="btn-pl" onclick="setLang('pl')">PL</button>
        <button id="btn-uk" onclick="setLang('uk')" class="active">UA</button>
    </div>
    <h1 class="logo">perfume.shoppee</h1>
    <p class="subtitle" id="h-sub"></p>
</header>

<div class="controls">
    <input type="text" id="searchInput" onkeyup="filterProducts()" placeholder="...">
</div>

<div id="home-carousels"></div>

<div class="filter-section">
    <button class="filter-toggle-btn" onclick="toggleFilterMenu()" id="filter-label">Фільтри ↓</button>
</div>

<div class="filter-menu" id="filterMenu"></div>

<div id="main-content">
    <div class="product-grid" id="productGrid"></div>
</div>

<div id="pModal" class="modal" onclick="if(event.target == this) closeModal()">
    <div class="modal-content">
        <img id="m-img" src="">
        <div id="m-brand" class="brand"></div>
        <h2 id="m-title" style="margin:8px 0 5px; font-size: 20px; font-weight: 900;"></h2>
        <p id="m-desc" style="font-size:13px; color:#777; margin-bottom:20px; padding: 0 10px;"></p>
        <div class="price-list" id="m-prices"></div>
        <div class="btn-group">
            <a href="#" id="m-tg" class="btn btn-tg">Telegram</a>
            <a href="#" id="m-inst" target="_blank" class="btn btn-inst">Instagram</a>
        </div>
    </div>
</div>

<script>
    const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQA6BrgyLNH6Jw3BOZKxMQ2X2MAJed7xT6CBepxG-c9D3qjKJJmPzwTPypMM3fxCLipzxHrq4exkdKS/pub?output=csv'; 
    const INSTA_URL = 'https://www.instagram.com/perfume.shoppee?igsh=MWdya2RqbHpweW5vbQ==';
    const TG_NICK = "elenafragrance";

    let allProducts = [];
    let curLang = 'uk';
    let curCat = 'all';

    const UI = {
        uk: { sub: "Твоя колекція ароматів. Оригінальна продукція.", search: "Пошук бренду або назви...", from: "від", in: "В наявності", order: "Замовлення", out: "Немає", hits: "Хіти", news: "Новинки", catalog: "Каталог", filter: "Фільтри ↓", sale_tag: "ЗНИЖКА", cats: {all: "Усі", sale: "Акції %", female: "Жіночі", male: "Чоловічі", uniseks: "Унісекс", set: "Набори"} },
        pl: { sub: "Twoja kolekcja zapachów. Oryginały.", search: "Szukaj zapachu...", from: "od", in: "Dostępny", order: "Na zamówienie", out: "Brak", hits: "Hity", news: "Nowości", catalog: "Katalog", filter: "Filtry ↓", sale_tag: "PROMOCJA", cats: {all: "Wszystkie", sale: "Promocje %", female: "Damskie", male: "Męskie", uniseks: "Unisex", set: "Zestawy"} }
    };

    async function init() {
        try {
            const response = await fetch(SPREADSHEET_URL);
            const text = await response.text();
            allProducts = parseCSV(text);
            setLang('uk');
        } catch(e) { console.error("CSV Load Error"); }
    }

    function parseCSV(csv) {
        const lines = csv.split('\n');
        const headers = lines[0].split(',').map(h => h.trim());
        let result = [];
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i]) continue;
            const currentline = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); 
            const obj = {};
            headers.forEach((header, index) => {
                obj[header] = currentline[index] ? currentline[index].trim().replace(/^"|"$/g, '') : "";
            });
            result.push(obj);
        }
        return result.sort((a, b) => (a.brand || "").localeCompare(b.brand || ""));
    }

    function setLang(l) {
        curLang = l;
        document.querySelectorAll('.lang-switch button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + l).classList.add('active');
        document.getElementById('h-sub').innerText = UI[l].sub;
        document.getElementById('searchInput').placeholder = UI[l].search;
        document.getElementById('filter-label').innerText = UI[l].filter;
        renderFilterMenu();
        refreshDisplay();
    }

    function renderFilterMenu() {
        document.getElementById('filterMenu').innerHTML = Object.keys(UI[curLang].cats).map(key => `
            <button class="f-btn ${curCat === key ? 'active' : ''}" onclick="setCategory('${key}')">${UI[curLang].cats[key]}</button>
        `).join('');
    }

    function toggleFilterMenu() {
        document.getElementById('filterMenu').classList.toggle('active');
    }

    function setCategory(c) {
        curCat = c;
        renderFilterMenu();
        refreshDisplay();
        if(c !== 'all') document.getElementById('filterMenu').classList.remove('active');
    }

    function refreshDisplay() {
        const hits = allProducts.filter(p => p.isBest?.toLowerCase() === 'yes');
        const news = allProducts.filter(p => p.isNew?.toLowerCase() === 'yes');
        
        let carouselHtml = '';
        if(curCat === 'all') {
            if(hits.length) carouselHtml += `<div class="section-header fade-in"><h2 class="section-title">${UI[curLang].hits}</h2></div><div class="carousel fade-in">${hits.map(p => getCardHTML(p)).join('')}</div>`;
            if(news.length) carouselHtml += `<div class="section-header fade-in"><h2 class="section-title">${UI[curLang].news}</h2></div><div class="carousel fade-in">${news.map(p => getCardHTML(p)).join('')}</div>`;
            carouselHtml += `<div class="section-header fade-in"><h2 class="section-title">${UI[curLang].catalog}</h2></div>`;
        }
        document.getElementById('home-carousels').innerHTML = carouselHtml;
        filterProducts();
    }

    function filterProducts() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allProducts.filter(p => {
            const matchSearch = (p.brand + p.nameUK + p.namePL).toLowerCase().includes(q);
            let matchCat = (curCat === 'all' || p.category === curCat);
            if(curCat === 'sale') matchCat = (p.old2ml || p.old5ml || p.old10ml || p.oldFull);
            return matchSearch && matchCat;
        });
        document.getElementById('productGrid').innerHTML = filtered.map((p, i) => getCardHTML(p, i)).join('');
    }

    function getCardHTML(p, index = 0) {
        const imgPath = p.photo.includes('http') ? p.photo : 'img/' + p.photo;
        const hasSale = (p.old2ml || p.old5ml || p.old10ml || p.oldFull);
        let st = UI[curLang].in;
        if(p.status === 'out') st = UI[curLang].out;
        if(p.status === 'order') st = UI[curLang].order;

        return `
            <div class="card fade-in" style="animation-delay: ${index * 0.05}s" onclick='openModal(${JSON.stringify(p)})'>
                ${hasSale ? `<div class="sale-badge">${UI[curLang].sale_tag}</div>` : ''}
                <div class="status-badge">${st}</div>
                <div class="card-img"><img src="${imgPath}" onerror="this.src='https://via.placeholder.com/150?text=Perfume'"></div>
                <div class="brand">${p.brand}</div>
                <div class="title">${curLang === 'uk' ? p.nameUK : p.namePL}</div>
                <div class="price-wrapper">
                    <span class="price ${hasSale?'sale':''}">${UI[curLang].from} ${p.price2ml || p.price10ml} zł</span>
                </div>
            </div>`;
    }

    function openModal(p) {
        const imgPath = p.photo.includes('http') ? p.photo : 'img/' + p.photo;
        const name = curLang === 'uk' ? p.nameUK : p.namePL;
        document.getElementById('m-img').src = imgPath;
        document.getElementById('m-brand').innerText = p.brand;
        document.getElementById('m-title').innerText = name;
        document.getElementById('m-desc').innerText = curLang === 'uk' ? p.descUK : p.descPL;
        
        let pr = '';
        const sizes = [
            {v: '2 ml', p: p.price2ml, o: p.old2ml},
            {v: '5 ml', p: p.price5ml, o: p.old5ml},
            {v: '10 ml', p: p.price10ml, o: p.old10ml},
            {v: `Full Bottle (${p.fullVol})`, p: p.fullPrice, o: p.oldFull}
        ];

        sizes.forEach(s => {
            if(parseFloat(s.p) > 0) {
                pr += `<div class="price-row">
                    <span>${s.v}</span>
                    <div>
                        ${s.o ? `<span class="m-old-p">${s.o} zł</span>` : ''}
                        <span class="${s.o ? 'm-new-p' : ''}">${s.p} zł</span>
                    </div>
                </div>`;
            }
        });
        
        document.getElementById('m-prices').innerHTML = pr;
        document.getElementById('m-tg').href = `https://t.me/${TG_NICK}?text=Вітаю! Хочу замовити: ${p.brand} ${name}`;
        document.getElementById('m-inst').href = INSTA_URL;
        document.getElementById('pModal').style.display = "block";
    }

    function closeModal() { document.getElementById('pModal').style.display = "none"; }
    init();
</script>
</body>
</html>
