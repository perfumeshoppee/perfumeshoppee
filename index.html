<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>perfume.shoppee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap');
        :root { --brand-deep: #062C22; --brand-accent: #C5A059; --bg-light: #FDFCFB; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-light); color: var(--brand-deep); margin: 0; overflow-x: hidden; }
        .logo-font { font-family: 'Playfair Display', serif; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(6, 44, 34, 0.08); position: sticky; top: 0; z-index: 50; }
        
        .img-container { 
            display: flex; align-items: center; justify-content: center; 
            background: #f9f9f9; border-radius: 20px; padding: 12px; 
            height: 180px; width: 100%; position: relative; overflow: hidden;
        }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .product-card { background: white; border-radius: 24px; border: 1px solid rgba(0,0,0,0.03); padding: 16px; transition: all 0.3s; }
        .product-title { font-size: 11px; font-weight: 700; height: 32px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 8px; }

        .scroll-x { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 15px; scroll-snap-type: x mandatory; }
        .scroll-x::-webkit-scrollbar { display: none; }
        .scroll-item { flex: 0 0 160px; scroll-snap-align: start; }

        #sidebar { fixed top-0 left-0 h-full w-[280px] bg-[#062C22] z-[1002] transform: translateX(-100%); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); padding: 32px; color: white; }
        #sidebar.open { transform: translateX(0); }
        #overlay { fixed inset-0 bg-black/40 backdrop-blur-sm z-[1001] hidden; }
        
        .cat-btn.active { background: var(--brand-deep) !important; color: white !important; }
        .lang-node.active { background: var(--brand-accent); border-color: var(--brand-accent); }
        .out-of-stock { opacity: 0.5; filter: grayscale(1); }
        .stock-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; font-size: 7px; padding: 4px 8px; border-radius: 6px; font-weight: 800; }
        
        .price-new { color: #ef4444; font-weight: 900; }
        .price-old { color: #a3a3a3; text-decoration: line-through; font-size: 0.85em; margin-left: 4px; font-weight: 400; }
    </style>
</head>
<body>

<nav class="glass-nav px-6 py-4">
  <div class="flex justify-between items-center max-w-7xl mx-auto">
    <button onclick="toggleSidebar()" class="text-2xl"><i class="fa-solid fa-bars-staggered"></i></button>
    <span onclick="goHome()" class="text-xl font-bold logo-font cursor-pointer">perfume.shoppee</span>
    <button onclick="toggleCart()" class="relative"><i class="fa-solid fa-bag-shopping text-xl"></i><span id="cart-count" class="absolute -top-2 -right-2 bg-[#C5A059] text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center hidden">0</span></button>
  </div>
</nav>

<div class="px-6 py-4">
    <div class="relative max-w-2xl mx-auto">
        <input id="searchInput" type="text" onkeyup="refreshCatalog()" class="w-full bg-neutral-100 rounded-2xl py-4 px-12 text-sm outline-none" placeholder="Пошук аромату...">
        <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-neutral-300"></i>
    </div>
</div>

<div id="overlay" onclick="toggleSidebar()"></div>
<div id="sidebar" class="fixed top-0 left-0 h-full">
    <div class="flex justify-between items-center mb-8">
        <span class="logo-font text-lg">perfume.shoppee</span>
        <button onclick="toggleSidebar()"><i class="fa-solid fa-xmark text-xl text-white/30"></i></button>
    </div>
    <div class="flex gap-2 mb-8">
        <button onclick="setLang('UA')" id="btn-ua" class="lang-node flex-1 py-2 rounded-xl border border-white/10 text-[10px] active">UA</button>
        <button onclick="setLang('PL')" id="btn-pl" class="lang-node flex-1 py-2 rounded-xl border border-white/10 text-[10px]">PL</button>
    </div>
    <nav class="space-y-6 text-[11px] uppercase tracking-widest font-semibold">
        <a href="#" onclick="goHome(); toggleSidebar(); return false;" class="block">Головна</a>
        <a href="#" onclick="showAllCatalog(); toggleSidebar(); return false;" class="block">Каталог</a>
        <a href="#" onclick="filterBy('hit'); toggleSidebar(); return false;" class="block">Хіти</a>
        <a href="#" onclick="filterBy('new'); toggleSidebar(); return false;" class="block">Новинки</a>
    </nav>
</div>

<main class="max-w-7xl mx-auto pb-20">
    <div id="catalog-filters" class="hidden px-6 mb-6 overflow-x-auto flex gap-2">
      <button onclick="setCategory('all')" id="cat-all" class="cat-btn px-6 py-2 bg-white border border-neutral-100 rounded-xl text-[9px] font-bold active">УСІ</button>
      <button onclick="setCategory('female')" id="cat-female" class="cat-btn px-6 py-2 bg-white border border-neutral-100 rounded-xl text-[9px] font-bold">ЖІНОЧІ</button>
      <button onclick="setCategory('male')" id="cat-male" class="cat-btn px-6 py-2 bg-white border border-neutral-100 rounded-xl text-[9px] font-bold">ЧОЛОВІЧІ</button>
      <button onclick="setCategory('uniseks')" id="cat-uniseks" class="cat-btn px-6 py-2 bg-white border border-neutral-100 rounded-xl text-[9px] font-bold">УНІСЕКС</button>
    </div>
    <div id="catalog-area" class="px-6">
        <div class="flex flex-col items-center py-20 text-neutral-300">
            <i class="fa-solid fa-circle-notch fa-spin text-2xl mb-4"></i>
            <p class="text-[10px] uppercase tracking-widest">Завантаження даних...</p>
        </div>
    </div>
</main>

<div id="pModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md z-[9999] flex items-center justify-center p-4" onclick="closeModal()">
    <div class="bg-white rounded-[32px] p-6 w-full max-w-sm relative" onclick="event.stopPropagation()">
        <div class="img-container mb-4"><img id="m-img" src=""></div>
        <div id="m-brand" class="text-[8px] font-black text-[#C5A059] uppercase tracking-widest"></div>
        <h2 id="m-title" class="text-lg font-bold logo-font mb-4"></h2>
        <div id="m-prices" class="space-y-2 mb-6"></div>
        <button id="add-btn" onclick="addToCart()" class="w-full bg-[#062C22] text-white py-4 rounded-2xl text-[10px] font-bold uppercase opacity-20" disabled>Додати в кошик</button>
    </div>
</div>

<script>
const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/17lsowoX7ko9bhSjNjHcMUypha_PKMsj_uuUhCPwTKhA/export?format=csv&gid=0';
let allProducts = [], cart = [], currentLang = 'UA', currentFilter = 'home', curCat = 'all', selectedOption = null;

async function init() {
    const area = document.getElementById('catalog-area');
    const timeout = setTimeout(() => {
        if(allProducts.length === 0) area.innerHTML = `<div class="text-center py-20 text-red-400 text-[10px]">Помилка завантаження. Перевірте доступ до таблиці.</div>`;
    }, 8000);

    try {
        const res = await fetch(SPREADSHEET_URL);
        const csvText = await res.text();
        
        // Надежный парсинг
        const rows = csvText.split(/\r?\n/).map(row => {
            const matches = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
            return matches ? matches.map(m => m.replace(/^"|"$/g, '').trim()) : [];
        });

        const headers = rows[0].map(h => h.trim().toLowerCase());
        allProducts = rows.slice(1).map(row => {
            let obj = {};
            headers.forEach((h, i) => obj[h] = row[i] || "");
            return obj;
        }).filter(p => p.brand);

        clearTimeout(timeout);
        refreshCatalog();
    } catch (e) {
        area.innerHTML = `<div class="text-center py-20 text-red-400 text-[10px]">Помилка з'єднання з базою.</div>`;
    }
}

function refreshCatalog() {
    const area = document.getElementById('catalog-area');
    const q = document.getElementById('searchInput').value.toLowerCase();
    
    if (currentFilter === 'home' && q === '') {
        const hits = allProducts.filter(p => p.isbest?.toLowerCase() === 'yes');
        const news = allProducts.filter(p => p.isnew?.toLowerCase() === 'yes');
        area.innerHTML = `
            <div class="mb-10"><h2 class="text-[10px] font-bold uppercase opacity-40 mb-4">Хіти продажу</h2><div class="scroll-x">${renderCards(hits, true)}</div></div>
            <div class="mb-10"><h2 class="text-[10px] font-bold uppercase opacity-40 mb-4">Новинки</h2><div class="scroll-x">${renderCards(news, true)}</div></div>
        `;
    } else {
        document.getElementById('catalog-filters').classList.remove('hidden');
        let filtered = allProducts.filter(p => {
            const name = (p.nameuk || p.name || "").toLowerCase();
            const brand = (p.brand || "").toLowerCase();
            const matchSearch = (brand + ' ' + name).includes(q);
            const matchCat = curCat === 'all' || p.category?.toLowerCase() === curCat;
            return matchSearch && matchCat;
        });
        area.innerHTML = `<div class="grid grid-cols-2 gap-4">${renderCards(filtered, false)}</div>`;
    }
}

function renderCards(list, isScroll) {
    return list.map((p, i) => {
        const avail = p.status?.toLowerCase() !== 'out';
        return `
            <div onclick="openModal('${p.brand}', '${p.nameuk || p.name}')" class="${isScroll ? 'scroll-item' : ''} product-card ${!avail ? 'out-of-stock' : ''}">
                <div class="img-container mb-3">
                    ${!avail ? `<div class="stock-badge">SOLD</div>` : ''}
                    <img src="${p.photo}">
                </div>
                <div class="text-[7px] font-black text-[#C5A059] uppercase">${p.brand}</div>
                <div class="product-title">${p.nameuk || p.name}</div>
                <div class="text-[10px] font-bold">${p.price2ml || p.fullprice} zł</div>
            </div>
        `;
    }).join('');
}

function openModal(brand, name) {
    const p = allProducts.find(x => x.brand === brand && (x.nameuk === name || x.name === name));
    if(!p) return;
    document.getElementById('m-img').src = p.photo;
    document.getElementById('m-brand').innerText = p.brand;
    document.getElementById('m-title').innerText = p.nameuk || p.name;
    
    let pricesHtml = '';
    const options = [
        {size: '2ml', price: p.price2ml}, 
        {size: '5ml', price: p.price5ml}, 
        {size: '10ml', price: p.price10ml}, 
        {size: 'Full', price: p.fullprice}
    ];
    
    options.forEach(opt => {
        if(opt.price && opt.price !== '---') {
            pricesHtml += `
                <div onclick="selectSize(this, '${opt.size}', '${opt.price}')" class="border p-3 rounded-xl flex justify-between text-xs font-bold cursor-pointer">
                    <span>${opt.size}</span><span>${opt.price} zł</span>
                </div>`;
        }
    });
    
    document.getElementById('m-prices').innerHTML = pricesHtml;
    document.getElementById('pModal').classList.remove('hidden');
}

function selectSize(el, size, price) {
    document.querySelectorAll('#m-prices div').forEach(d => d.classList.remove('border-[#C5A059]'));
    el.classList.add('border-[#C5A059]');
    selectedOption = { size, price };
    const btn = document.getElementById('add-btn');
    btn.disabled = false;
    btn.classList.remove('opacity-20');
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
function closeModal() { document.getElementById('pModal').classList.add('hidden'); }
function goHome() { currentFilter = 'home'; refreshCatalog(); }
function showAllCatalog() { currentFilter = 'all'; refreshCatalog(); }
function setCategory(c) { 
    curCat = c; 
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('cat-'+c).classList.add('active');
    refreshCatalog(); 
}

init();
</script>
</body>
</html>
