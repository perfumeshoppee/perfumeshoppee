<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>perfume.shoppee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .logo-font { font-family: 'Georgia', serif; letter-spacing: -1px; }
    </style>
</head>
<body class="bg-gray-50">

  <!-- HEADER -->
  <header class="bg-black text-white">
    <div class="max-w-7xl mx-auto">
      <div class="flex items-center justify-between px-4 py-4">
        <button class="text-2xl"><i class="fas fa-bars"></i></button>
        
        <div class="flex items-center gap-2">
          <span class="text-2xl font-bold logo-font tracking-tight">perfume.shoppee</span>
        </div>

        <div class="flex items-center gap-6">
          <i class="fas fa-heart text-xl"></i>
          <i class="fas fa-balance-scale text-xl"></i>
          <div class="relative">
            <i class="fas fa-shopping-bag text-xl"></i>
            <span class="absolute -top-1 -right-1 bg-teal-500 text-[10px] rounded-full w-4 h-4 flex items-center justify-center">0</span>
          </div>
        </div>
      </div>

      <!-- Search -->
      <div class="px-4 pb-4">
        <div class="relative">
          <input type="text" id="searchInput" 
                 class="w-full bg-white text-black rounded-full py-3 px-6 pl-12 focus:outline-none"
                 placeholder="Що ви шукаєте?" onkeyup="refresh()">
          <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
        </div>
      </div>

      <!-- Category tabs -->
      <div class="flex border-b border-gray-800">
        <button onclick="setCategory('all')" id="tab-all"
                class="flex-1 py-4 text-center font-medium border-b-2 border-white">Усі</button>
        <button onclick="setCategory('female')" id="tab-female"
                class="flex-1 py-4 text-center font-medium text-gray-400">Для неї</button>
        <button onclick="setCategory('male')" id="tab-male"
                class="flex-1 py-4 text-center font-medium text-gray-400">Для нього</button>
      </div>
    </div>
  </header>

  <!-- BREADCRUMBS -->
  <div class="max-w-7xl mx-auto px-4 py-3 text-sm text-gray-500">
    Головна • Духи
  </div>

  <div class="max-w-7xl mx-auto px-4">
    <h1 class="text-3xl font-bold">Духи</h1>
  </div>

  <!-- PRODUCTS -->
  <div class="max-w-7xl mx-auto px-4 py-6">
    <div id="productGrid" class="grid grid-cols-2 gap-6"></div>
  </div>

  <!-- FOOTER (як у Brocard) -->
  <footer class="bg-black text-white py-10 text-sm">
    <div class="max-w-7xl mx-auto px-4">
      <div class="text-center mb-8">
        <div class="text-3xl font-bold logo-font">perfume.shoppee</div>
      </div>
      
      <div class="border-t border-gray-800 pt-6">
        <div class="flex justify-between">
          <div>
            <div class="text-gray-400">Горяча лінія</div>
            <a href="tel:0800508880" class="text-xl font-medium">0 800 508 880</a>
            <div class="text-xs text-gray-500 mt-1">9:00 – 21:00 щодня</div>
          </div>
          <div class="text-right">
            <div>Київ</div>
          </div>
        </div>
      </div>

      <div class="flex justify-center gap-8 mt-10 text-2xl">
        <i class="fab fa-facebook"></i>
        <i class="fab fa-instagram"></i>
        <i class="fab fa-youtube"></i>
        <i class="fab fa-telegram"></i>
      </div>

      <div class="text-center text-xs text-gray-500 mt-12">
        © 2026 perfume.shoppee<br>
        Усі права захищені
      </div>
    </div>
  </footer>

<script>
// === ТВОЇ ДАНІ ===
const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQA6BrgyLNH6Jw3BOZKxMQ2X2MAJed7xT6CBepxG-c9D3qjKJJmPzwTPypMM3fxCLipzxHrq4exkdKS/pub?output=csv';

let allProducts = [];
let currentCategory = 'all';

async function loadProducts() {
  try {
    const res = await fetch(SPREADSHEET_URL);
    const csv = await res.text();
    allProducts = parseCSV(csv);
    renderProducts();
  } catch(e) {
    console.error(e);
    alert("Не вдалося завантажити товари 😔");
  }
}

function parseCSV(csv) {
  // той самий парсер, що працював раніше
  const rows = [];
  let cur = '', inQ = false, row = [];
  for (let i = 0; i < csv.length; i++) {
    let c = csv[i], n = csv[i+1];
    if (c === '"' && inQ && n === '"') { cur += '"'; i++; }
    else if (c === '"') inQ = !inQ;
    else if (c === ',' && !inQ) { row.push(cur); cur = ''; }
    else if ((c === '\n' || c === '\r') && !inQ) { 
      row.push(cur); rows.push(row); cur = ''; row = [];
      if(c==='\\r' && n==='\\n') i++;
    } else cur += c;
  }
  if(cur || row.length) { row.push(cur); rows.push(row); }

  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = r[i] ? r[i].trim() : '');
    return obj;
  });
}

function setCategory(cat) {
  currentCategory = cat;
  
  // Підсвітка активної вкладки
  document.querySelectorAll('button[id^="tab-"]').forEach(btn => {
    btn.classList.toggle('border-white', btn.id === 'tab-' + cat);
    btn.classList.toggle('text-gray-400', btn.id !== 'tab-' + cat);
  });
  
  renderProducts();
}

function renderProducts() {
  const container = document.getElementById('productGrid');
  let filtered = allProducts;

  if (currentCategory !== 'all') {
    filtered = allProducts.filter(p => p.category === currentCategory);
  }

  const q = document.getElementById('searchInput').value.toLowerCase();
  if (q) {
    filtered = filtered.filter(p => 
      (p.brand + ' ' + p.nameUK).toLowerCase().includes(q)
    );
  }

  let html = '';
  filtered.forEach(p => {
    const inStock = p.status && p.status.toLowerCase() !== 'out';
    html += `
      <div onclick='showProduct(${JSON.stringify(p)})' class="bg-white rounded-2xl overflow-hidden shadow-sm cursor-pointer">
        <div class="h-64 bg-gray-100 flex items-center justify-center p-4">
          <img src="${p.photo || 'https://via.placeholder.com/300'}" class="max-h-full max-w-full object-contain">
        </div>
        <div class="p-4">
          <div class="text-xs text-gray-500">${p.brand}</div>
          <div class="font-semibold mt-1 line-clamp-2">${p.nameUK}</div>
          <div class="mt-3 flex justify-between items-end">
            <div>
              <span class="text-teal-600 font-bold">${p.price2ml || p.price10ml || '—'} грн</span>
            </div>
            <span class="text-xs ${inStock ? 'text-green-600' : 'text-gray-400'}">
              ${inStock ? 'В наявності' : 'Немає'}
            </span>
          </div>
        </div>
      </div>
    `;
  });

  container.innerHTML = html || '<p class="col-span-2 text-center py-10 text-gray-500">Нічого не знайдено</p>';
}

function showProduct(p) {
  alert(`Відкрили товар:\n\n${p.brand} ${p.nameUK}\nЦіна: ${p.price2ml || p.price10ml} грн\n\n(Тут можна зробити гарну модалку пізніше)`);
}

// Запуск
loadProducts();
</script>
</body>
</html>
