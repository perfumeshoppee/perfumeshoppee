<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>perfume.shoppee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #ffffff; }
        body.lock-scroll { overflow: hidden; }
        
        .logo-font { font-family: 'Georgia', serif; letter-spacing: -0.5px; }
        
        #sidebar { 
            transform: translateX(-100%); 
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        #sidebar.open { transform: translateX(0); }
        
        .overlay { 
            display: none; 
            background: rgba(0,0,0,0.3); 
            position: fixed; 
            inset: 0; 
            z-index: 1001; 
            backdrop-filter: blur(8px); 
        }
        .overlay.show { display: block; }

        .btn-select {
            transition: all 0.2s ease;
            border: 1px solid #e5e7eb;
        }
        .btn-select.active {
            border-color: #000;
            background-color: #000;
            color: #fff;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .product-card {
            transition: transform 0.3s ease;
        }
        .product-card:active { transform: scale(0.98); }
        
        .menu-link {
            position: relative;
            transition: all 0.3s ease;
        }
        .menu-link::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 0; height: 1px;
            background: #000;
            transition: width 0.3s ease;
        }
        .menu-link:hover::after { width: 100%; }
    </style>
</head>
<body class="text-neutral-900">

<nav class="bg-white/80 backdrop-blur-md border-b border-neutral-100 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <button onclick="toggleSidebar()" class="text-xl p-1"><i class="fa-solid fa-align-left"></i></button>
    <span onclick="goHome()" class="text-xl font-semibold logo-font cursor-pointer tracking-tighter">perfume.shoppee</span>
    <button onclick="toggleCart()" class="relative p-1">
        <i class="fa-solid fa-bag-shopping text-xl"></i>
        <span id="cart-count" class="absolute -top-1 -right-1 bg-black text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
    </button>
  </div>
</nav>

<div class="px-6 py-4">
    <div class="relative max-w-2xl mx-auto">
        <input id="searchInput" type="text" onkeyup="refreshCatalog()" 
               class="w-full bg-neutral-100 rounded-full py-3 px-6 pl-12 text-sm outline-none focus:bg-neutral-200 transition-all" 
               placeholder="Пошук аромату чи бренду">
        <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-neutral-400 text-xs"></i>
    </div>
</div>

<div id="overlay" onclick="toggleSidebar()" class="overlay"></div>
<div id="sidebar" class="fixed top-0 left-0 h-full w-[80%] max-w-[300px] bg-white z-[1002] shadow-sm flex flex-col">
  <div class="p-8 flex justify-between items-center border-b border-neutral-50">
    <span class="text-lg font-bold logo-font">Меню</span>
    <button onclick="toggleSidebar()" class="text-neutral-400"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="flex-1 px-8 py-10 space-y-8">
    <nav class="flex flex-col space-y-6 text-sm font-medium tracking-wide uppercase">
        <a href="#" onclick="goHome(); toggleSidebar(); return false;" class="menu-link py-2">Головна</a>
        <a href="#" onclick="showAllCatalog(); toggleSidebar(); return false;" class="menu-link py-2">Каталог</a>
        <a href="#" onclick="showBrandList(); toggleSidebar(); return false;" class="menu-link py-2">Бренди</a>
        <a href="#" onclick="filterBy('hit'); toggleSidebar(); return false;" class="menu-link py-2">Хіти</a>
        <a href="#" onclick="filterBy('new'); toggleSidebar(); return false;" class="menu-link py-2">Новинки</a>
        <a href="#" onclick="filterBy('sale'); toggleSidebar(); return false;" class="menu-link py-2 text-red-500">Акції</a>
    </nav>
  </div>
</div>

<main class="max-w-7xl mx-auto pb-20">
    <div id="catalog-filters" class="hidden px-6 mb-8 overflow-x-auto no-scrollbar flex gap-3">
      <button onclick="setCategory('all')" id="cat-all" class="cat-btn px-6 py-2 bg-black text-white rounded-full text-[10px] font-bold uppercase tracking-widest transition-all">Усі</button>
      <button onclick="setCategory('female')" id="cat-female" class="cat-btn px-6 py-2 bg-neutral-100 text-neutral-500 rounded-full text-[10px] font-bold uppercase tracking-widest">Жіночі</button>
      <button onclick="setCategory('male')" id="cat-male" class="cat-btn px-6 py-2 bg-neutral-100 text-neutral-500 rounded-full text-[10px] font-bold uppercase tracking-widest">Чоловічі</button>
      <button onclick="setCategory('unisex')" id="cat-unisex" class="cat-btn px-6 py-2 bg-neutral-100 text-neutral-500 rounded-full text-[10px] font-bold uppercase tracking-widest">Унісекс</button>
    </div>

    <div id="catalog-area" class="px-6"></div>
</main>

<div id="cart-panel" class="fixed top-0 right-0 h-full w-full max-w-md bg-white z-[10000] shadow-2xl transform translate-x-full transition-transform duration-500 flex flex-col">
    <div class="p-6 border-b flex justify-between items-center">
        <h2 class="text-sm font-bold uppercase tracking-widest">Ваш кошик</h2>
        <button onclick="toggleCart()" class="p-2"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
    <div class="p-8 border-t border-neutral-100">
        <div class="flex justify-between items-center mb-6">
            <span class="text-xs text-neutral-400 font-bold uppercase">Сума</span>
            <span id="cart-total" class="text-xl font-bold">0 zł</span>
        </div>
        <button onclick="sendOrder()" class="w-full bg-black text-white py-5 rounded-full text-[11px] font-bold uppercase tracking-widest hover:bg-neutral-800 transition-all">Оформити замовлення</button>
    </div>
</div>

<div id="pModal" class="hidden fixed inset-0 bg-white z-[9999] md:bg-black/20 md:backdrop-blur-sm flex items-end md:items-center justify-center" onclick="closeModal()">
  <div class="bg-white w-full max-w-lg rounded-t-[32px] md:rounded-[32px] p-8 relative max-h-[90vh] overflow-y-auto shadow-xl" onclick="event.stopPropagation()">
    <button onclick="closeModal()" class="absolute top-6 right-6 text-neutral-300 hover:text-black transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
    
    <div class="flex flex-col items-center">
        <img id="m-img" class="w-48 h-48 object-contain mb-6" src="">
        <div id="m-brand" class="text-[10px] font-bold text-neutral-400 uppercase tracking-[0.2em] mb-2"></div>
        <h2 id="m-title" class="text-xl font-bold text-center mb-6 tracking-tight"></h2>
        <p id="m-desc" class="text-center text-xs text-neutral-500 leading-relaxed px-4 mb-8"></p>
        
        <div class="w-full space-y-3 mb-8" id="m-prices">
            </div>
        
        <button id="add-to-cart-btn" class="w-full bg-black text-white py-5 rounded-full text-[11px] font-bold uppercase tracking-widest opacity-30 cursor-not-allowed transition-all">
            Додати в кошик
        </button>
    </div>
  </div>
</div>

<script>
const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQA6BrgyLNH6Jw3BOZKxMQ2X2MAJed7xT6CBepxG-c9D3qjKJJmPzwTPypMM3fxCLipzxHrq4exkdKS/pub?output=csv';
const TG_NICK = 'elenafragrance';

let allProducts = [];
let cart = JSON.parse(localStorage.getItem('ps_cart')) || [];
let curCat = 'all';
let currentFilter = 'home';
let selectedOption = null;

async function init() {
    try {
        const res = await fetch(SPREADSHEET_URL);
        const text = await res.text();
        allProducts = parseCSV(text);
        allProducts.sort((a, b) => a.brand.localeCompare(b.brand));
        refreshCatalog();
        renderCart();
    } catch (e) { console.error("Помилка завантаження:", e); }
}

function parseCSV(text) {
    let rows = [], row = [], col = '', q = false;
    for (let i = 0; i < text.length; i++) {
        let c = text[i], n = text[i+1];
        if (c === '"' && q && n === '"') { col += '"'; i++; }
        else if (c === '"') q = !q;
        else if (c === ',' && !q) { row.push(col.trim()); col = ''; }
        else if ((c === '\r' || c === '\n') && !q) {
            if (col || row.length) { row.push(col.trim()); rows.push(row); }
            row = []; col = ''; if (c === '\r' && n === '\n') i++;
        } else col += c;
    }
    if (col || row.length) { row.push(col.trim()); rows.push(row); }
    const h = rows[0];
    return rows.slice(1).map(r => {
        let o = {}; h.forEach((k, i) => o[k] = r[i] || "");
        return o;
    });
}

function refreshCatalog() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const area = document.getElementById('catalog-area');
    const filters = document.getElementById('catalog-filters');
    
    // Відображати фільтри статі ТІЛЬКИ в "Каталозі"
    filters.classList.toggle('hidden', currentFilter !== 'all');

    if (currentFilter === 'home' && q === '') {
        const hits = allProducts.filter(p => p.isBest?.toLowerCase() === 'yes').slice(0, 8);
        const news = allProducts.filter(p => p.isNew?.toLowerCase() === 'yes').slice(0, 8);
        area.innerHTML = `
            <div class="mb-12">
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-xs font-bold uppercase tracking-widest">Хіти продажу</h2>
                    <span onclick="filterBy('hit')" class="text-[10px] text-neutral-400 uppercase font-bold cursor-pointer">Дивитись всі</span>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">${renderList(hits)}</div>
            </div>
            <div class="mb-12">
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-xs font-bold uppercase tracking-widest">Новинки</h2>
                    <span onclick="filterBy('new')" class="text-[10px] text-neutral-400 uppercase font-bold cursor-pointer">Дивитись всі</span>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">${renderList(news)}</div>
            </div>
        `;
        return;
    }

    let filtered = allProducts.filter(p => {
        const matchSearch = (p.brand + ' ' + (p.nameUK || p.name)).toLowerCase().includes(q);
        const catValue = p.category?.toLowerCase().trim();
        let matchSpecial = true;
        
        if (currentFilter === 'new') matchSpecial = p.isNew?.toLowerCase() === 'yes';
        if (currentFilter === 'hit') matchSpecial = p.isBest?.toLowerCase() === 'yes';
        if (currentFilter === 'sale') matchSpecial = !!(p.old2ml || p.oldFull);
        if (currentFilter === 'brand') matchSpecial = p.brand === curCat;

        const isUnisex = (curCat === 'unisex') && (catValue === 'unisex' || catValue === 'uniseks');
        const matchCat = (curCat === 'all' || currentFilter === 'brand' || currentFilter === 'new' || currentFilter === 'hit' || currentFilter === 'sale') || isUnisex || (catValue === curCat);
        return matchSearch && matchCat && matchSpecial;
    });

    area.innerHTML = `<div class="grid grid-cols-2 md:grid-cols-4 gap-4">${renderList(filtered)}</div>`;
}

function renderList(list) {
    if (list.length === 0) return `<p class="col-span-full text-center py-10 text-neutral-400 text-xs uppercase tracking-widest">Нічого не знайдено</p>`;
    return list.map((p, i) => `
    <div onclick="openModal(${allProducts.indexOf(p)})" class="product-card group cursor-pointer">
        <div class="aspect-[4/5] mb-4 bg-neutral-50 rounded-2xl flex items-center justify-center p-6 group-hover:bg-neutral-100 transition-colors">
            <img src="${p.photo}" class="max-h-full object-contain mix-blend-multiply" loading="lazy">
        </div>
        <div class="text-[8px] text-neutral-400 font-bold uppercase tracking-widest mb-1">${p.brand}</div>
        <div class="text-[11px] font-semibold leading-tight mb-2 truncate">${p.nameUK || p.name}</div>
        <div class="text-xs font-bold">${p.price2ml || p.fullPrice} zł</div>
    </div>`).join('');
}

function showAllCatalog() { currentFilter = 'all'; curCat = 'all'; document.getElementById('searchInput').value = ''; refreshCatalog(); }

function showBrandList() {
    currentFilter = 'brand';
    const brands = [...new Set(allProducts.map(p => p.brand))].sort();
    const area = document.getElementById('catalog-area');
    area.innerHTML = `<h2 class="text-xs font-bold uppercase tracking-widest mb-6">Бренди</h2><div class="grid grid-cols-1 gap-1">` + brands.map(b => `
        <button onclick="filterBy('brand', '${b}')" class="w-full text-left py-4 border-b border-neutral-50 flex justify-between items-center text-sm font-medium hover:pl-2 transition-all">
            ${b} <i class="fa-solid fa-chevron-right text-[10px] text-neutral-300"></i>
        </button>
    `).join('') + `</div>`;
}

function filterBy(type, val = null) { 
    currentFilter = type; 
    if (val) curCat = val; 
    window.scrollTo({top: 0, behavior: 'smooth'});
    refreshCatalog(); 
}

function goHome() { currentFilter = 'home'; curCat = 'all'; document.getElementById('searchInput').value = ''; refreshCatalog(); }

function setCategory(c) { 
    curCat = c; 
    document.querySelectorAll('.cat-btn').forEach(b => {
        b.classList.remove('bg-black', 'text-white');
        b.classList.add('bg-neutral-100', 'text-neutral-500');
    });
    const active = document.getElementById('cat-'+c);
    active.classList.replace('bg-neutral-100', 'bg-black');
    active.classList.replace('text-neutral-500', 'text-white');
    refreshCatalog(); 
}

function openModal(idx) {
    const p = allProducts[idx]; 
    selectedOption = null;
    
    // Скидаємо стан кнопки
    const btn = document.getElementById('add-to-cart-btn');
    btn.classList.add('opacity-30', 'cursor-not-allowed');
    btn.innerText = "Додати в кошик";

    document.getElementById('m-img').src = p.photo;
    document.getElementById('m-brand').innerText = p.brand;
    document.getElementById('m-title').innerText = p.nameUK || p.name;
    document.getElementById('m-desc').innerText = p.descUK || p.desc || "Оригінальний аромат високої якості.";
    
    let html = '';
    const sizes = [
        {l:'2ml', p:p.price2ml}, 
        {l:'5ml', p:p.price5ml}, 
        {l:'10ml', p:p.price10ml}, 
        {l:'Full', p:p.fullPrice}
    ];

    sizes.forEach(o => {
        if(o.p && o.p !== '---' && o.p !== '') {
            html += `
            <div onclick="selectSize(this, '${o.l}', '${o.p}', '${p.brand}', '${p.nameUK || p.name}', '${p.photo}')" 
                 class="btn-select w-full flex justify-between items-center p-4 rounded-2xl cursor-pointer text-sm font-medium">
                <span>${o.l}</span>
                <span class="font-bold">${o.p} zł</span>
            </div>`;
        }
    });
    
    document.getElementById('m-prices').innerHTML = html;
    document.getElementById('pModal').classList.remove('hidden');
    document.body.classList.add('lock-scroll');
}

function selectSize(el, size, price, brand, name, img) {
    document.querySelectorAll('.btn-select').forEach(d => d.classList.remove('active'));
    el.classList.add('active');
    
    selectedOption = { size, price, brand, name, img, id: Date.now() };
    
    // Активуємо кнопку
    const btn = document.getElementById('add-to-cart-btn');
    btn.classList.remove('opacity-30', 'cursor-not-allowed');
    btn.innerText = `Додати ${size} • ${price} zł`;
}

function addToCart() {
    if(!selectedOption) return;
    cart.push(selectedOption);
    localStorage.setItem('ps_cart', JSON.stringify(cart));
    renderCart();
    closeModal();
    toggleCart(true);
}

function renderCart() {
    const c = document.getElementById('cart-items');
    const b = document.getElementById('cart-count');
    b.innerText = cart.length; b.classList.toggle('hidden', cart.length === 0);
    let total = 0;
    
    if (cart.length === 0) {
        c.innerHTML = `<div class="text-center py-20 text-neutral-400 text-[10px] uppercase font-bold tracking-widest">Ваш кошик порожній</div>`;
    } else {
        c.innerHTML = cart.map((item, i) => {
            total += parseFloat(item.price);
            return `
            <div class="flex gap-4 items-center">
                <div class="w-16 h-16 bg-neutral-50 rounded-xl flex-shrink-0 p-2"><img src="${item.img}" class="w-full h-full object-contain mix-blend-multiply"></div>
                <div class="flex-1 min-w-0">
                    <div class="text-[8px] font-bold text-neutral-400 uppercase tracking-widest">${item.brand}</div>
                    <div class="text-[11px] font-bold truncate">${item.name}</div>
                    <div class="text-[10px] text-neutral-500">${item.size} • ${item.price} zł</div>
                </div>
                <button onclick="removeFromCart(${i})" class="text-neutral-300 hover:text-red-500 p-2"><i class="fa-solid fa-trash-can text-xs"></i></button>
            </div>`;
        }).join('');
    }
    document.getElementById('cart-total').innerText = total.toFixed(2) + ' zł';
}

function removeFromCart(i) { 
    cart.splice(i, 1); 
    localStorage.setItem('ps_cart', JSON.stringify(cart)); 
    renderCart(); 
}

function sendOrder() {
    if (cart.length === 0) return;
    let t = "👋 Нове замовлення!\n\n";
    cart.forEach((it, i) => t += `${i+1}. ${it.brand} ${it.name} (${it.size}) - ${it.price} zł\n`);
    t += `\n💰 Разом: ${document.getElementById('cart-total').innerText}`;
    window.open(`https://t.me/${TG_NICK}?text=${encodeURIComponent(t)}`, '_blank');
}

function toggleSidebar() { 
    const s = document.getElementById('sidebar');
    s.classList.toggle('open'); 
    document.getElementById('overlay').classList.toggle('show');
    document.body.classList.toggle('lock-scroll');
}

function toggleCart(st) { 
    const p = document.getElementById('cart-panel');
    if (st === true) p.classList.remove('translate-x-full'); else p.classList.toggle('translate-x-full');
    document.body.classList.toggle('lock-scroll', !p.classList.contains('translate-x-full'));
}

function closeModal() { 
    document.getElementById('pModal').classList.add('hidden'); 
    document.body.classList.remove('lock-scroll'); 
}

document.getElementById('add-to-cart-btn').onclick = addToCart;

init();
</script>
</body>
</html>
