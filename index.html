<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>perfume.shoppee • Luxury Edition</title>
    <style>
        :root { 
            --bg: #ffffff; 
            --card-bg: #f9f9f9; 
            --text: #1a1a1a; 
            --sub-text: #777; 
            --border: #eee;
            --gold-gradient: linear-gradient(135deg, #fdfc47 0%, #bf9b30 50%, #fdfc47 100%);
            --gold-shine: linear-gradient(to right, #bf9b30 20%, #fdfc47 40%, #fdfc47 60%, #bf9b30 80%);
            --gold-text: #d4af37; --sale-red: #c8102e; --stock-green: #2ecc71;
        }

        body.dark-theme { 
            --bg: #0a0a0a; 
            --card-bg: #161616; 
            --text: #ffffff; 
            --sub-text: #888; 
            --border: #222; 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Playfair Display', serif; 
            margin: 0; background: var(--bg); color: var(--text); 
        }
        body.modal-open { overflow: hidden; }

        .hero {
            height: 460px;
            background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.65)), url('https://picsum.photos/id/1015/2000/1200') center/cover;
            display: flex; align-items: center; justify-content: center; text-align: center; color: white; position: relative;
        }
        .hero-content h1 {
            font-size: 3.8rem; font-weight: 900; letter-spacing: -3.5px; margin: 0;
            background: var(--gold-shine); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero-content p { font-size: 1.2rem; max-width: 480px; margin: 18px auto 0; }

        header { padding: 20px 20px 10px; text-align: center; position: relative; }
        .top-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 8px; }
        .lang-switch button, .theme-toggle { background: var(--card-bg); border: 1px solid var(--border); padding: 10px 18px; border-radius: 30px; font-size: 11.5px; font-weight: 800; color: var(--sub-text); cursor: pointer; }
        .lang-switch button.active { background: var(--gold-gradient); color: #000; border: none; }

        .logo { font-size: 2.7em; font-weight: 900; letter-spacing: -2.8px; margin: 0; text-transform: lowercase; background: var(--gold-shine); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 5s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }

        .subtitle { font-size: 12.5px; color: var(--sub-text); text-transform: uppercase; letter-spacing: 2px; margin: 10px auto 30px; }

        .section-header { padding: 40px 20px 12px; text-align: center; }
        .section-title { font-size: 19px; font-weight: 900; text-transform: uppercase; letter-spacing: 2.5px; color: var(--sub-text); }

        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); 
            gap: 16px; 
            padding: 15px 20px; 
        }
        
        .card { 
            background: var(--card-bg); 
            border-radius: 26px; 
            padding: 14px; 
            text-align: center; 
            border: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            min-height: 310px; 
            position: relative; 
            transition: all 0.4s; 
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 45px rgba(191,155,48,0.25); }

        .sale-badge { position: absolute; top: 12px; left: 12px; background: var(--sale-red); color: white; padding: 5px 12px; border-radius: 15px; font-size: 10px; font-weight: 900; }
        
        .card-img { height: 135px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .card img { max-width: 90%; max-height: 90%; object-fit: contain; transition: 0.5s; }
        .card:hover img { transform: scale(1.08); }

        .brand { font-size: 10.5px; text-transform: uppercase; color: var(--sub-text); font-weight: 800; }
        .title { font-size: 14.5px; font-weight: 700; margin: 8px 0 6px; line-height: 1.25; height: 2.6em; overflow: hidden; }
        .price { font-weight: 900; font-size: 17px; color: var(--gold-text); margin-top: auto; }

        .add-to-cart { 
            margin-top: 10px; 
            padding: 11px; 
            background: var(--gold-gradient); 
            color: #000; 
            border: none; 
            border-radius: 25px; 
            font-weight: 900; 
            font-size: 13px; 
            cursor: pointer;
        }

        .show-all-btn {
            display: block;
            margin: 45px auto 70px;
            padding: 16px 45px;
            background: var(--gold-gradient);
            color: #000;
            border: none;
            border-radius: 50px;
            font-size: 15.5px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(191,155,48,0.25);
        }

        .modal { display: none; position: fixed; z-index: 3000; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--bg); width: 100%; max-width: 440px; border-radius: 36px; padding: 40px 25px 30px; border: 1px solid var(--border); text-align: center; position: relative; }

        .close-modal { position: absolute; top: 22px; right: 22px; width: 40px; height: 40px; background: var(--card-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 23px; cursor: pointer; }
    </style>
</head>
<body>

<div class="hero">
    <div class="hero-content">
        <h1>perfume.shoppee</h1>
        <p>Люксова колекція ароматів • Тільки оригінал</p>
    </div>
</div>

<header>
    <div class="top-bar">
        <div class="lang-switch">
            <button id="btn-pl" onclick="setLang('pl')">PL</button>
            <button id="btn-uk" onclick="setLang('uk')" class="active">UA</button>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>
    <h1 class="logo">perfume.shoppee</h1>
    <p class="subtitle" id="h-sub"></p>
    <div style="position:absolute;top:25px;right:22px;font-size:26px;cursor:pointer;" onclick="alert('Кошик у розробці ❤️')">🛍️ <span id="cart-count" style="position:absolute;top:-6px;right:-8px;background:#c8102e;color:white;font-size:10px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;">0</span></div>
</header>

<div id="hits-section"></div>
<div id="news-section"></div>
<div id="sales-section"></div>

<div style="text-align:center;">
    <button onclick="showFullCatalog()" class="show-all-btn">ПЕРЕГЛЯНУТИ ВЕСЬ КАТАЛОГ →</button>
</div>

<div id="full-catalog" style="display:none;">
    <div class="section-header"><h2 class="section-title" id="catalog-title"></h2></div>
    <div id="full-grid" class="product-grid"></div>
</div>

<div id="pModal" class="modal" onclick="if(event.target == this) closeModal()">
    <div class="modal-content">
        <div class="close-modal" onclick="closeModal()">✕</div>
        <img id="m-img" src="" style="max-height:170px;">
        <div id="m-brand" style="margin-top:12px;font-size:11px;text-transform:uppercase;letter-spacing:1px;"></div>
        <h2 id="m-title" style="margin:10px 0;font-size:1.55rem;"></h2>
        <div id="m-stock" style="font-size:11px;font-weight:800;margin:8px 0;"></div>
        <p id="m-desc" style="font-size:13.5px;color:var(--sub-text);margin:18px 0;line-height:1.45;"></p>
        <div id="m-prices" style="background:var(--card-bg);padding:18px;border-radius:22px;margin:18px 0;border:1px solid var(--border);text-align:left;"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <a href="#" id="m-tg" style="padding:15px;background:#229ED9;color:white;border-radius:26px;text-decoration:none;font-weight:900;">Telegram</a>
            <a href="#" id="m-inst" target="_blank" style="padding:15px;background:var(--gold-gradient);color:#000;border-radius:26px;text-decoration:none;font-weight:900;">Instagram</a>
        </div>
    </div>
</div>

<footer style="background:#111;color:#aaa;padding:50px 20px 35px;text-align:center;">
    <p style="font-size:17px;color:#ddd;font-weight:700;">perfume.shoppee • Luxury Edition</p>
    <p>© 2026 • Тільки оригінальна продукція</p>
</footer>

<script>
    const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQA6BrgyLNH6Jw3BOZKxMQ2X2MAJed7xT6CBepxG-c9D3qjKJJmPzwTPypMM3fxCLipzxHrq4exkdKS/pub?output=csv';
    const INSTA_URL = 'https://www.instagram.com/perfume.shoppee';
    const TG_NICK = "elenafragrance";

    let allProducts = [];
    let curLang = 'uk';
    let cart = JSON.parse(localStorage.getItem('perfumeCart')) || [];

    const UI = {
        uk: { sub: "Твоя колекція ароматів починається тут • Тільки оригінал", 
              hits: "Хіти продажу", news: "Новинки", sales: "Знижки", 
              catalog: "Весь каталог", from: "від", sale_tag: "ЗНИЖКА", 
              stock_in: "✓ В наявності", stock_out: "✕ Немає" },
        pl: { sub: "Twoja kolekcja zapachów zaczyna się tutaj • Tylko oryginały", 
              hits: "Hity sprzedaży", news: "Nowości", sales: "Promocje", 
              catalog: "Cały katalog", from: "od", sale_tag: "PROMOCJA", 
              stock_in: "✓ Dostępny", stock_out: "✕ Brak" }
    };

    function toggleTheme() {
        document.body.classList.toggle('dark-theme');
        document.getElementById('themeBtn').innerText = document.body.classList.contains('dark-theme') ? '☀️' : '🌙';
    }

    async function init() {
        const resp = await fetch(SPREADSHEET_URL);
        const text = await resp.text();
        allProducts = parseCSV(text);
        updateCartCount();
        setLang('uk');
    }

    function parseCSV(csv) {
        const rows = []; let cur = '', inQ = false, row = [];
        for (let i = 0; i < csv.length; i++) {
            let c = csv[i], n = csv[i+1];
            if (c === '"' && inQ && n === '"') { cur += '"'; i++; }
            else if (c === '"') inQ = !inQ;
            else if (c === ',' && !inQ) { row.push(cur); cur = ''; }
            else if ((c === '\n' || c === '\r') && !inQ) { 
                row.push(cur); rows.push(row); cur = ''; row = []; if(c==='\r' && n==='\n') i++;
            } else cur += c;
        }
        if(cur || row.length) { row.push(cur); rows.push(row); }
        const h = rows[0].map(v => v.trim());
        return rows.slice(1).map(r => {
            let o = {}; h.forEach((k, idx) => o[k] = r[idx]?.trim() || ''); return o;
        });
    }

    function setLang(l) {
        curLang = l;
        document.querySelectorAll('.lang-switch button').forEach(b => b.classList.toggle('active', b.id === 'btn-'+l));
        document.getElementById('h-sub').innerText = UI[l].sub;
        renderHomeSections();
    }

    function updateCartCount() {
        document.getElementById('cart-count').innerText = cart.length;
    }

    function addToCart(p, e) {
        e.stopImmediatePropagation();
        const n = curLang==='uk' ? p.nameUK : p.namePL;
        cart.push({brand: p.brand, name: n});
        localStorage.setItem('perfumeCart', JSON.stringify(cart));
        updateCartCount();
        
        const btn = e.currentTarget;
        btn.innerText = '✓ Додано!';
        setTimeout(() => btn.innerText = '🛍️ ДО КОШИКА', 1600);
    }

    function getCard(p) {
        const hasSale = (p.old2ml || p.old5ml || p.old10ml || p.oldFull);
        const inStock = p.status?.toLowerCase() !== 'out';
        const n = curLang==='uk' ? p.nameUK : p.namePL;
        
        return `<div class="card" onclick='openModal(${JSON.stringify(p)})'>
            ${hasSale ? `<div class="sale-badge">${UI[curLang].sale_tag}</div>` : ''}
            <div class="card-img"><img src="${p.photo}"></div>
            <div class="brand">${p.brand}</div>
            <div class="title">${n}</div>
            <div class="price">${UI[curLang].from} ${p.price2ml || p.price10ml} zł</div>
            <button class="add-to-cart" onclick="addToCart(${JSON.stringify(p)}, event)">🛍️ ДО КОШИКА</button>
        </div>`;
    }

    function renderHomeSections() {
        const hits = allProducts.filter(p => p.isBest?.toLowerCase() === 'yes');
        let html = `<div class="section-header"><h2 class="section-title">${UI[curLang].hits}</h2></div><div class="product-grid">${hits.map(p => getCard(p)).join('')}</div>`;
        
        const news = allProducts.filter(p => p.isNew?.toLowerCase() === 'yes');
        if (news.length) html += `<div class="section-header"><h2 class="section-title">${UI[curLang].news}</h2></div><div class="product-grid">${news.map(p => getCard(p)).join('')}</div>`;
        
        const sales = allProducts.filter(p => p.old2ml || p.old5ml || p.old10ml || p.oldFull);
        if (sales.length) html += `<div class="section-header"><h2 class="section-title">${UI[curLang].sales}</h2></div><div class="product-grid">${sales.map(p => getCard(p)).join('')}</div>`;

        document.getElementById('hits-section').innerHTML = html;
        document.getElementById('news-section').innerHTML = '';
        document.getElementById('sales-section').innerHTML = '';
        if (news.length) document.getElementById('news-section').innerHTML = `<div class="section-header"><h2 class="section-title">${UI[curLang].news}</h2></div><div class="product-grid">${news.map(p => getCard(p)).join('')}</div>`;
        if (sales.length) document.getElementById('sales-section').innerHTML = `<div class="section-header"><h2 class="section-title">${UI[curLang].sales}</h2></div><div class="product-grid">${sales.map(p => getCard(p)).join('')}</div>`;
    }

    function showFullCatalog() {
        document.getElementById('full-catalog').style.display = 'block';
        document.querySelector('.show-all-btn').style.display = 'none';
        
        const filtered = allProducts;
        document.getElementById('catalog-title').innerText = UI[curLang].catalog;
        document.getElementById('full-grid').innerHTML = filtered.map(p => getCard(p)).join('');
    }

    function openModal(p) {
        const n = curLang==='uk' ? p.nameUK : p.namePL;
        const inStock = p.status?.toLowerCase() !== 'out';
        
        document.getElementById('m-img').src = p.photo;
        document.getElementById('m-brand').innerText = p.brand;
        document.getElementById('m-title').innerText = n;
        document.getElementById('m-stock').innerText = inStock ? UI[curLang].stock_in : UI[curLang].stock_out;
        document.getElementById('m-desc').innerText = (curLang==='uk' ? p.descUK : p.descPL) || '';
        
        let pr = '';
        [{l:'2ml',v:p.price2ml,o:p.old2ml},{l:'5ml',v:p.price5ml,o:p.old5ml},{l:'10ml',v:p.price10ml,o:p.old10ml},{l:'Повний флакон',v:p.fullPrice,o:p.oldFull}].forEach(s => {
            if(s.v && parseFloat(s.v)>0) {
                pr += `<div style="display:flex;justify-content:space-between;margin:10px 0;font-size:14px;">
                    <span>${s.l}</span>
                    <span style="font-weight:900;color:var(--gold-text)">${s.v} zł</span>
                    ${s.o ? `<span style="text-decoration:line-through;color:#999;margin-left:8px;">${s.o}</span>` : ''}
                </div>`;
            }
        });
        document.getElementById('m-prices').innerHTML = pr;
        document.getElementById('m-tg').href = `https://t.me/${TG_NICK}?text=Хочу: ${p.brand} ${n}`;
        document.getElementById('m-inst').href = INSTA_URL;
        
        document.getElementById('pModal').style.display = 'flex';
        document.body.classList.add('modal-open');
    }

    function closeModal() {
        document.getElementById('pModal').style.display = 'none';
        document.body.classList.remove('modal-open');
    }

    init();
</script>
</body>
</html>
